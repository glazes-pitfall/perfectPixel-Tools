          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          if (data.error) throw new Error(data.error);

          // 4. 解码返回的 RGB 图像
          const img = new Image();
          await new Promise((resolve, reject) => {
            img.onload = resolve; img.onerror = reject;
            img.src = 'data:image/png;base64,' + data.output;
          });
          const resultCanvas = document.createElement('canvas');
          resultCanvas.width = EditorState.width;
          resultCanvas.height = EditorState.height;
          const rCtx = resultCanvas.getContext('2d', { willReadFrequently: true });
          rCtx.drawImage(img, 0, 0);
          const resultData = rCtx.getImageData(0, 0, EditorState.width, EditorState.height).data;

          // 5. 写回 EditorState.pixels，保留原透明像素
          for (let i = 0; i < px.length; i += 4) {
            const a = origAlpha[i >> 2];
            if (a <= 127) {
              px[i] = 0; px[i+1] = 0; px[i+2] = 0; px[i+3] = 0;
            } else {
              px[i] = resultData[i]; px[i+1] = resultData[i+1]; px[i+2] = resultData[i+2]; px[i+3] = 255;
            }
          }
          flushPixels();
          pushHistory();
          palShowStatus('色卡已应用（色卡替换）', 'success');
        } catch (err) {
          palShowStatus('色卡替换失败：' + err.message, 'error');
        }
      }
    }

    // ── DOM ready ─────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      // Acquire canvas element references before any operations
      pixelCanvas  = document.getElementById('pixel-canvas');
      selCanvas    = document.getElementById('selection-canvas');
      cursorCanvas = document.getElementById('cursor-canvas');

      // Load image; wire pixel-inspector and pointer events after image is ready
      loadPlaceholderImage().then(() => {
        // Save initial state as history[0] so undo can return to it
        pushHistory();
        // ── Pixel Inspector (reads EditorState.pixels — never canvas) ─────────
        cursorCanvas.addEventListener('pointermove', e => {
          if (!EditorState.pixels) return;
          const [cx, cy] = viewportToCanvas(e.clientX, e.clientY);
          const [r, g, b, a] = getPixel(cx, cy);
          document.getElementById('insp-x').textContent = cx;
          document.getElementById('insp-y').textContent = cy;
          document.getElementById('insp-r').textContent = r;
          document.getElementById('insp-g').textContent = g;
          document.getElementById('insp-b').textContent = b;
          document.getElementById('insp-a').textContent = a;
          document.getElementById('insp-swatch').style.background =
            `rgba(${r},${g},${b},${a / 255})`;
        });

        // Reset inspector when cursor leaves canvas
        cursorCanvas.addEventListener('pointerleave', () => {
          ['insp-x', 'insp-y', 'insp-r', 'insp-g', 'insp-b', 'insp-a'].forEach(id => {
            document.getElementById(id).textContent = '—';
          });
          document.getElementById('insp-swatch').style.background = 'transparent';
        });
      });

      // Initialize history button references and event listeners
      initHistoryButtons();

      // ── Tool dispatch — replaces Phase 2 TEMP SCAFFOLD ───────────────────────
      const tools = {
        pencil:     { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },
        eraser:     { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },
        bucket:     { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },
        eyedropper: { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },  // replaced below
        marquee:    { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },  // replaced below
        wand:       { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },  // Phase 05-02
      };
      let isDrawing = false;

      cursorCanvas.addEventListener('pointerdown', e => {
        e.preventDefault();
        cursorCanvas.setPointerCapture(e.pointerId);
        if (!EditorState.pixels) return;
        isDrawing = true;
        const [cx, cy] = viewportToCanvas(e.clientX, e.clientY);
        tools[EditorState.activeTool]?.onDown(cx, cy, e);
      });
      cursorCanvas.addEventListener('pointermove', e => {
        if (!EditorState.pixels) return;
        const [cx, cy] = viewportToCanvas(e.clientX, e.clientY);
        tools[EditorState.activeTool]?.onCursor(cx, cy, e);
        if (isDrawing) tools[EditorState.activeTool]?.onMove(cx, cy, e);
      });
      cursorCanvas.addEventListener('pointerup', e => {
        if (!isDrawing) return;
        isDrawing = false;
        const [cx, cy] = viewportToCanvas(e.clientX, e.clientY);
        tools[EditorState.activeTool]?.onUp(cx, cy, e);
      });
      cursorCanvas.addEventListener('pointercancel', () => { isDrawing = false; });

      document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
        btn.addEventListener('click', () => setActiveTool(btn.dataset.tool));
      });
      setActiveTool('pencil');

      // ── Color Picker Panel init ───────────────────────────────────────────────

      pickerCanvas = document.getElementById('picker-canvas');
      pickerCtx = pickerCanvas.getContext('2d');
      // 基于当前默认前景色初始化 HSL 与指针位置
      [currentHue, currentSat, currentLit] = rgbToHsl(...EditorState.foregroundColor.slice(0, 3));
      _slCursorX = currentSat / 100;
      _slCursorY = 1 - currentLit / 100;
      redrawPicker();

      // handlePickerDrag: update color from drag position on ring or square
      function handlePickerDrag(px, py) {
        if (_pickerDragZone === 'ring') {
          const dx = px - PICKER_CX, dy = py - PICKER_CY;
          // Hue: atan2, offset +90 so top = 0°, normalized to 0–360
          currentHue = ((Math.atan2(dy, dx) * 180 / Math.PI) + 90 + 360) % 360;
          EditorState.foregroundColor = [...hslToRgb(currentHue, currentSat, currentLit), 255];
          syncColorUI();
        } else if (_pickerDragZone === 'square') {
          _slCursorX = Math.max(0, Math.min(1, (px - SQ_X) / SQ_W));
          _slCursorY = Math.max(0, Math.min(1, (py - SQ_Y) / SQ_H));
          currentSat = _slCursorX * 100;
          currentLit = (1 - _slCursorY) * 100;
          EditorState.foregroundColor = [...hslToRgb(currentHue, currentSat, currentLit), 255];
          _syncFromDrag = true;
          syncColorUI();
          _syncFromDrag = false;
        }
      }

      // Picker canvas pointer events (hue ring vs SL square)
      pickerCanvas.addEventListener('pointerdown', e => {
        e.preventDefault();
        pickerCanvas.setPointerCapture(e.pointerId);
        const rect = pickerCanvas.getBoundingClientRect();
        const px = e.clientX - rect.left, py = e.clientY - rect.top;
        const dx = px - PICKER_CX, dy = py - PICKER_CY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist >= RING_INNER && dist <= RING_OUTER) {
          _pickerDragZone = 'ring';
        } else if (px >= SQ_X && px <= SQ_X + SQ_W && py >= SQ_Y && py <= SQ_Y + SQ_H) {
          _pickerDragZone = 'square';
        } else {
          _pickerDragZone = null;
        }
        handlePickerDrag(px, py);
      });
      pickerCanvas.addEventListener('pointermove', e => {
        if (!_pickerDragZone) return;
        const rect = pickerCanvas.getBoundingClientRect();
        handlePickerDrag(e.clientX - rect.left, e.clientY - rect.top);
      });
      pickerCanvas.addEventListener('pointerup', () => { _pickerDragZone = null; });
      pickerCanvas.addEventListener('pointercancel', () => { _pickerDragZone = null; });

      // ── Multi-panel color picker bindings ─────────────────────────────────────

      // Parse hex (6-char with or without '#') → apply foreground color
      function applyHexStr(rawHex) {
        const v = rawHex.trim().replace(/^#/, '');
        if (!/^[0-9a-fA-F]{6}$/.test(v)) { syncColorUI(); return; }
        EditorState.foregroundColor = [
          parseInt(v.slice(0, 2), 16), parseInt(v.slice(2, 4), 16), parseInt(v.slice(4, 6), 16), 255,
        ];
        syncColorUI();
      }

      function bindHexInput(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('keydown', e => { if (e.key === 'Enter') applyHexStr(el.value); });
        el.addEventListener('blur', () => applyHexStr(el.value));
      }

      function bindRgbGroup(rId, gId, bId) {
        [rId, gId, bId].forEach(id => {
          const el = document.getElementById(id);
          if (!el) return;
          el.addEventListener('input', () => {
            const rr = Math.max(0, Math.min(255, parseInt(document.getElementById(rId).value) || 0));
            const gg = Math.max(0, Math.min(255, parseInt(document.getElementById(gId).value) || 0));
            const bb = Math.max(0, Math.min(255, parseInt(document.getElementById(bId).value) || 0));
            EditorState.foregroundColor = [rr, gg, bb, 255];
            syncColorUI();
          });
        });
      }

      function bindCopyBtn(btnId) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        btn.addEventListener('click', () => {
          const [r, g, b] = EditorState.foregroundColor;
          const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
          navigator.clipboard.writeText(hex).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = hex;
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          });
        });
      }

      bindHexInput('pc-hex'); bindRgbGroup('pc-r', 'pc-g', 'pc-b'); bindCopyBtn('pc-copy');

      // Style C RGB 数值：支持按住输入框左右拖动来调整数值
      function attachPcChannelDrag(id) {
        const el = document.getElementById(id);
        if (!el) return;
        let startX = 0;
        let startValue = 0;
        const SPEED = 0.5; // 每移动 2px 改变约 1 个数值

        el.addEventListener('pointerdown', e => {
          if (e.button !== 0) return;
          e.preventDefault();
          el.setPointerCapture(e.pointerId);
          startX = e.clientX;
          startValue = parseInt(el.value, 10) || 0;
        });

        el.addEventListener('pointermove', e => {
          if (!el.hasPointerCapture(e.pointerId)) return;
          const dx = e.clientX - startX;
          let next = Math.round(startValue + dx * SPEED);
          next = Math.max(0, Math.min(255, next));
          if (parseInt(el.value, 10) === next) return;
          el.value = next;
          // 从 pc-r / pc-g / pc-b 三个输入框统一读取并应用到前景色
          const rr = Math.max(0, Math.min(255, parseInt(document.getElementById('pc-r').value, 10) || 0));
          const gg = Math.max(0, Math.min(255, parseInt(document.getElementById('pc-g').value, 10) || 0));
          const bb = Math.max(0, Math.min(255, parseInt(document.getElementById('pc-b').value, 10) || 0));
          EditorState.foregroundColor = [rr, gg, bb, 255];
          syncColorUI();
        });

        function endDrag(e) {
          if (el.hasPointerCapture(e.pointerId)) {
            el.releasePointerCapture(e.pointerId);
          }
        }

        el.addEventListener('pointerup', endDrag);
        el.addEventListener('pointercancel', endDrag);
      }

      ['pc-r', 'pc-g', 'pc-b'].forEach(attachPcChannelDrag);

      // 进入页面时立即用当前前景色同步所有 UI（含 HEX 区域描边 / 背景、复制按钮描边，以及色轮 / 调色盘指针）
      syncColorUI();

      // 点击 Style C 的 "#" 前缀时，自动切换到 Eyedropper 工具，方便快速取色
      const pcHashEl = document.querySelector('.pc-hash');
      if (pcHashEl) {
        pcHashEl.addEventListener('click', () => {
          setActiveTool('eyedropper');
        });
      }

      // ── Tool settings UI bindings ─────────────────────────────────────────────

      // Brush size (pencil)
      document.getElementById('opt-brush-size').addEventListener('input', e => {
        EditorState.toolOptions.brushSize = Math.max(1, Math.min(32, parseInt(e.target.value) || 1));
      });
      // Brush shape (pencil)
      document.getElementById('opt-brush-shape').addEventListener('change', e => {
        EditorState.toolOptions.brushShape = e.target.value;
      });
      // Pixel-perfect
      document.getElementById('opt-pixel-perfect').addEventListener('change', e => {
        EditorState.toolOptions.pixelPerfect = e.target.checked;
      });
      // Eraser size
      document.getElementById('opt-eraser-size').addEventListener('input', e => {
        EditorState.toolOptions.brushSize = Math.max(1, Math.min(32, parseInt(e.target.value) || 1));
      });
      // Eraser shape
      document.getElementById('opt-eraser-shape').addEventListener('change', e => {
        EditorState.toolOptions.brushShape = e.target.value;
      });
      // Eraser pixel-perfect
      document.getElementById('opt-eraser-pixel-perfect').addEventListener('change', e => {
        EditorState.toolOptions.eraserPixelPerfect = e.target.checked;
      });
      // Bucket tolerance
      document.getElementById('opt-bucket-tolerance').addEventListener('input', e => {
        EditorState.toolOptions.bucketTolerance = Math.max(0, Math.min(255, parseInt(e.target.value) || 0));
      });
      // Contiguous
      document.getElementById('opt-contiguous').addEventListener('change', e => {
        EditorState.toolOptions.contiguous = e.target.checked;
      });

      // Wand tolerance
      const optWandTol = document.getElementById('opt-wand-tolerance');
      const optWandCont = document.getElementById('opt-wand-contiguous');
      if (optWandTol) optWandTol.addEventListener('input', () => {
        EditorState.toolOptions.wandTolerance = parseInt(optWandTol.value) || 0;
      });
      if (optWandCont) optWandCont.addEventListener('change', () => {
        EditorState.toolOptions.wandContiguous = optWandCont.checked;
      });

      // Deselect and Inverse buttons
      const btnDeselect = document.getElementById('btn-deselect');
      const btnInverse  = document.getElementById('btn-inverse');
      if (btnDeselect) btnDeselect.addEventListener('click', () => clearSelection());
      if (btnInverse)  btnInverse.addEventListener('click', () => invertSelection());

      // ── Pencil tool implementation ────────────────────────────────────────────
      let _pencilStamp = null;
      let _lastPencilX = null, _lastPencilY = null;

      tools.pencil = {
        onDown(x, y) {
          _pencilStamp = getBrushStamp(EditorState.toolOptions.brushSize, EditorState.toolOptions.brushShape);
          resetPixelPerfect();
          _lastPencilX = x; _lastPencilY = y;
          applyStamp(x, y, _pencilStamp, [...EditorState.foregroundColor]);
          _ppHistory.push([x, y]);
          // NO pushHistory here — save-after: push on pointerup
        },
        onMove(x, y) {
          if (_lastPencilX === null) return;
          const pts = bresenhamLine(_lastPencilX, _lastPencilY, x, y);
          // Skip first point (already drawn by onDown or previous onMove)
          for (let i = 1; i < pts.length; i++) {
            const [px, py] = pts[i];
            if (EditorState.toolOptions.pixelPerfect && shouldSkipPixelPerfect(px, py)) continue;
            applyStamp(px, py, _pencilStamp, [...EditorState.foregroundColor]);
          }
          _lastPencilX = x; _lastPencilY = y;
        },
        onUp() {
          pushHistory();  // save-after model: push AFTER stroke completes
          _lastPencilX = null; _lastPencilY = null;
          resetPixelPerfect();
        },
        onCursor(x, y) { drawCursorPreview(x, y, EditorState.foregroundColor); },
      };

      // ── Eraser tool implementation ────────────────────────────────────────────
      let _eraserStamp = null;
      let _lastEraserX = null, _lastEraserY = null;

      tools.eraser = {
        onDown(x, y) {
          _eraserStamp = getBrushStamp(EditorState.toolOptions.brushSize, EditorState.toolOptions.brushShape);
          if (EditorState.toolOptions.eraserPixelPerfect) { resetPixelPerfect(); _ppHistory.push([x, y]); }
          _lastEraserX = x; _lastEraserY = y;
          // alpha MUST be 0 — global color mode constraint
          applyStamp(x, y, _eraserStamp, [0, 0, 0, 0]);
        },
        onMove(x, y) {
          if (_lastEraserX === null) return;
          const pts = bresenhamLine(_lastEraserX, _lastEraserY, x, y);
          for (let i = 1; i < pts.length; i++) {
            const [px, py] = pts[i];
            if (EditorState.toolOptions.eraserPixelPerfect && shouldSkipPixelPerfect(px, py)) continue;
            applyStamp(px, py, _eraserStamp, [0, 0, 0, 0]);
          }
          _lastEraserX = x; _lastEraserY = y;
        },
        onUp() {
          pushHistory();  // save-after
          _lastEraserX = null; _lastEraserY = null;
          if (EditorState.toolOptions.eraserPixelPerfect) resetPixelPerfect();
        },
        onCursor(x, y) {
          // Eraser preview: semi-transparent white to indicate erase (not draw)
          drawCursorPreview(x, y, [200, 200, 200, 128]);
        },
      };

      // Clear cursor preview when pointer leaves canvas
      cursorCanvas.addEventListener('pointerleave', () => { clearCursorPreview(); });

      // ── Paint Bucket tool implementation ─────────────────────────────────────

      tools.bucket = {
        onDown(x, y) {
          pushHistory();  // save-before: push BEFORE fill (bucket is instant-apply)
          floodFill(
            x, y,
            [...EditorState.foregroundColor],  // alpha=255, enforced by color picker
            EditorState.toolOptions.bucketTolerance,
            EditorState.toolOptions.contiguous
          );
        },
        onMove() {},  // bucket has no drag behavior
        onUp() {},
        onCursor(x, y) {
          // 1px foreground-color pixel stamp (fixed size regardless of brush size setting)
          cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
          if (!EditorState.pixels) return;
          const [r, g, b, a] = EditorState.foregroundColor;
          cursorCtx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (a / 255) + ')';
          cursorCtx.fillRect(x, y, 1, 1);
        },
      };

      // ── Eyedropper tool implementation ───────────────────────────────────────
      tools.eyedropper = {
        onDown(x, y) {
          const [r, g, b, a] = getPixel(x, y);
          if (a === 0) {
          // Transparent pixel: do NOT change foreground color
            return;
          }
          EditorState.foregroundColor = [r, g, b, 255];
          syncColorUI();
          // Stay on eyedropper — user picks the next action manually
        },
        onMove() {},
        onUp() {},
        onCursor(x, y) {
          // 仅保留画布上的十字光标预览，颜色反馈交给底部像素检查器
          clearCursorPreview();
        },
      };

      // ── Rectangle Marquee tool implementation ────────────────────────────────

      let _marqueeStartX = null, _marqueeStartY = null;
      let _marqueeCurrentX = null, _marqueeCurrentY = null;

      function _marqueeGetSnappedRect(ax, ay, bx, by) {
        const gW = EditorState.gridW || 1;
        const gH = EditorState.gridH || 1;
        const x0 = snapToGrid(ax, gW), y0 = snapToGrid(ay, gH);
        const x1 = snapToGrid(bx, gW), y1 = snapToGrid(by, gH);
        return {
          rx: Math.min(x0, x1), ry: Math.min(y0, y1),
          rw: Math.abs(x1 - x0), rh: Math.abs(y1 - y0)
        };
      }

      function _marqueeDrawPreview(rx, ry, rw, rh) {
        const dpr = window.devicePixelRatio || 1;
        selCtx.clearRect(0, 0, selCanvas.width / dpr, selCanvas.height / dpr);
        if (rw <= 0 || rh <= 0) return;

        // Convert canvas pixels → canvas-area CSS coordinates (same as drawAnts)
        const caRect  = document.getElementById('canvas-area').getBoundingClientRect();
        const pixRect = pixelCanvas.getBoundingClientRect();
        const originX = pixRect.left - caRect.left;
        const originY = pixRect.top  - caRect.top;
        const ps = pixRect.width / EditorState.width;  // CSS px per canvas pixel

        // 边界四条边的像素坐标列表（画布逻辑像素）
        const border = [];
        const x0 = rx, y0 = ry, x1 = rx + rw - 1, y1 = ry + rh - 1;
        for (let px = x0; px <= x1; px++) {
          border.push([px, y0]);
          if (rh > 1) border.push([px, y1]);
        }
        for (let py = y0 + 1; py <= y1 - 1; py++) {
          border.push([x0, py]);
          if (rw > 1) border.push([x1, py]);
        }

        // 对每个边界像素，读取 EditorState.pixels 的颜色，绘制反色方块（screen space）
        selCtx.globalCompositeOperation = 'source-over';
        selCtx.setLineDash([]);
        for (const [px, py] of border) {
          if (px < 0 || py < 0 || px >= EditorState.width || py >= EditorState.height) continue;
          const [r, g, b] = getPixel(px, py);
          selCtx.fillStyle = `rgb(${255 - r},${255 - g},${255 - b})`;
          // Draw a block exactly the size of one canvas pixel in screen space
          selCtx.fillRect(originX + px * ps, originY + py * ps, ps, ps);
        }
      }

      tools.marquee = {
        onDown(x, y, e) {
          // Clear existing selection unless Shift (Shift-union appends)
          if (!e.shiftKey) {
            // Cancel existing ants but don't call clearSelection — we'll set a new one on up
            if (antsRafId) { cancelAnimationFrame(antsRafId); antsRafId = null; }
            const _dpr = window.devicePixelRatio || 1;
            selCtx.clearRect(0, 0, selCanvas.width / _dpr, selCanvas.height / _dpr);
          }
          _marqueeStartX = x; _marqueeStartY = y;
          _marqueeCurrentX = x; _marqueeCurrentY = y;
        },
        onMove(x, y) {
          if (_marqueeStartX === null) return;
          _marqueeCurrentX = x; _marqueeCurrentY = y;
          const { rx, ry, rw, rh } = _marqueeGetSnappedRect(
            _marqueeStartX, _marqueeStartY, x, y
          );
          if (rw > 0 && rh > 0) _marqueeDrawPreview(rx, ry, rw, rh);
        },
        onUp(x, y, e) {
          if (_marqueeStartX === null) return;
          const { rx, ry, rw, rh } = _marqueeGetSnappedRect(
            _marqueeStartX, _marqueeStartY, x, y
          );
          _marqueeStartX = null; _marqueeCurrentX = null;

          if (rw === 0 || rh === 0) {
            // Zero-size selection: deselect (a click with no drag)
            clearSelection();
            return;
          }

          // Build mask for snapped rectangle
          const W = EditorState.width, H = EditorState.height;
          const newMask = new Uint8Array(W * H);
          for (let py = ry; py < ry + rh; py++) {
            for (let px = rx; px < rx + rw; px++) {
              if (px >= 0 && px < W && py >= 0 && py < H) {
                newMask[px + py * W] = 1;
              }
            }
          }

          // Shift: union with existing mask; no Shift: replace
          const finalMask = e.shiftKey
            ? unionMasks(EditorState.selectionMask, newMask, W * H)
            : newMask;
          const bbox = computeBoundingBox(finalMask, W, H);
          if (bbox) setSelection(finalMask, bbox);
        },
        onCursor(x, y) {
          cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
          // CSS cursor:crosshair handles visual feedback; no canvas drawing needed here
        },
      };

      // ── Magic Wand tool implementation ───────────────────────────────────────

      tools.wand = {
        onDown(x, y, e) {
          if (!EditorState.pixels) return;
          const tolerance = EditorState.toolOptions.wandTolerance;
          const contiguous = EditorState.toolOptions.wandContiguous;
          const result = wandSelect(x, y, tolerance, contiguous);
          if (!result) {
            if (!e.shiftKey) clearSelection();
            return;
          }
          const W = EditorState.width, H = EditorState.height;
          if (e.shiftKey) {
            // Union with existing selection
            const unified = unionMasks(EditorState.selectionMask, result.mask, W * H);
            const bbox = computeBoundingBox(unified, W, H);
            if (bbox) setSelection(unified, bbox);
          } else {
            setSelection(result.mask, result.bbox);
          }
        },
        onMove() {},   // Wand is click-only; no drag behavior
        onUp() {},
        onCursor(x, y) {
          // Crosshair cursor handled via CSS (set in setActiveTool)
          cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
        },
      };

      // ── Transform: helper functions ───────────────────────────────────────────

      function _getSelCanvasCoords() {
        const caRect  = document.getElementById('canvas-area').getBoundingClientRect();
        const pixRect = pixelCanvas.getBoundingClientRect();
        return {
          originX: pixRect.left - caRect.left,
          originY: pixRect.top  - caRect.top,
          ps:      pixRect.width / EditorState.width,
        };
      }

      // B3 fix: _selCanvasPointerDown — forwards drag events that land outside cursorCanvas
      // back into the existing tools.move onMove/onUp handlers.
      // selCanvas covers the full canvas-area (including outside the pixel canvas), so
      // enabling its pointer-events while transform is active lets the user continue
      // dragging a float that has been moved outside the canvas boundary.
      function _selCanvasPointerDown(e) {
        const ts = EditorState.transformState;
        if (!ts) return;
        e.preventDefault();

        const hitResult = hitTestHandle(e.clientX, e.clientY);
        if (hitResult !== null && hitResult.type === 'scale') {
          const handleIdx = hitResult.handleIdx;
          // Handle hit — set up handle drag state (mirrors tools.move.onDown handle branch)
          ts._origFloatPixels  = ts.floatPixels.slice();
          ts._origFloatW       = ts.floatW;
          ts._origFloatH       = ts.floatH;
          ts._dragStartScaleX  = ts.scaleX;
          ts._dragStartScaleY  = ts.scaleY;
          ts._dragMode         = 'handle-' + handleIdx;
          ts._dragStartClientX = e.clientX;
          ts._dragStartClientY = e.clientY;
          ts._dragStartFloatX  = ts.floatX;
          ts._dragStartFloatY  = ts.floatY;
          const anchorFrac = [[1,1],[0.5,1],[0,1],[1,0.5],[0,0.5],[1,0],[0.5,0],[0,0]];
          const [ax, ay] = anchorFrac[handleIdx];
          ts._dragAnchorX     = ts.floatX + ax * ts.floatW;
          ts._dragAnchorY     = ts.floatY + ay * ts.floatH;
          ts._dragAnchorFracX = ax;
          ts._dragAnchorFracY = ay;
        } else if (hitResult !== null && hitResult.type === 'rotate') {
          // Rotate via corner handle outer zone (Task 2 — delegate to tools.move.onDown)
          tools.move.onDown(0, 0, e);
        } else {
          // No handle — start move drag
          ts._dragMode         = 'move';
          ts._dragStartClientX = e.clientX;
          ts._dragStartClientY = e.clientY;
          ts._dragStartFloatX  = ts.floatX;
          ts._dragStartFloatY  = ts.floatY;
        }
        selCanvas.setPointerCapture(e.pointerId);

        // Delegate pointermove / pointerup to existing tool handlers
        function onSelMove(ev) { tools.move.onMove(0, 0, ev); }
        function onSelUp(ev) {
          tools.move.onUp(0, 0, ev);
          selCanvas.removeEventListener('pointermove', onSelMove);
          selCanvas.removeEventListener('pointerup', onSelUp);
        }
        selCanvas.addEventListener('pointermove', onSelMove);
        selCanvas.addEventListener('pointerup', onSelUp);
      }

      function activateTransform() {
        if (!EditorState.selectionMask || !EditorState.selection) return;
        if (EditorState.transformState) return;  // already active

        const bb   = EditorState.selection;
        const W    = EditorState.width;
        const mask = EditorState.selectionMask;

        // 1. Snapshot originalPixels BEFORE any pixel writes (critical for ESC restore)
        const originalPixels = EditorState.pixels.slice();

        // 2. Extract float pixels from selection bounding box
        const floatPx = new Uint8ClampedArray(bb.w * bb.h * 4);
        for (let fy = 0; fy < bb.h; fy++) {
          for (let fx = 0; fx < bb.w; fx++) {
            const cx = bb.x + fx, cy = bb.y + fy;
            if (mask[cx + cy * W]) {
              const srcI = (cy * W + cx) * 4;
              const dstI = (fy * bb.w + fx) * 4;
              floatPx[dstI]   = EditorState.pixels[srcI];
              floatPx[dstI+1] = EditorState.pixels[srcI+1];
              floatPx[dstI+2] = EditorState.pixels[srcI+2];
              floatPx[dstI+3] = EditorState.pixels[srcI+3];
            }
          }
        }

        // 3. Erase selected pixels from canvas (alpha=0) — AFTER snapshot
        for (let i = 0; i < mask.length; i++) {
          if (mask[i]) {
            const px = i % W, py = (i / W) | 0;
            setPixel(px, py, [0, 0, 0, 0]);
          }
        }
        flushPixels();

        // 4. Stop ants animation
        if (antsRafId) { cancelAnimationFrame(antsRafId); antsRafId = null; }

        // 5. Initialize transformState
        EditorState.transformState = {
          originalPixels,
          floatPixels:      floatPx,
          floatW:           bb.w,
          floatH:           bb.h,
          floatX:           bb.x,
          floatY:           bb.y,
          scaleX:           1.0,
          scaleY:           1.0,
          angleDeg:         0,
          origBbox:         { ...bb },
          _dragMode:        null,
          _dragStartClientX: 0, _dragStartClientY: 0,
          _dragStartFloatX:  0, _dragStartFloatY:  0,
        };

        // 6. Draw static transform UI + show top-bar
        _drawTransformUI();
        _showTransformTopBar();

        // B3 fix: enable selCanvas pointer capture so dragging outside cursorCanvas works
        selCanvas.style.pointerEvents = 'auto';
        selCanvas.addEventListener('pointerdown', _selCanvasPointerDown);
      }

      // ── Plan 06-02: scaleNearestNeighbor ─────────────────────────────────────
      function scaleNearestNeighbor(pixels, srcW, srcH, dstW, dstH) {
        const out = new Uint8ClampedArray(dstW * dstH * 4);
        const xRatio = srcW / dstW;
        const yRatio = srcH / dstH;
        for (let dy = 0; dy < dstH; dy++) {
          const sy = Math.min(srcH - 1, Math.floor(dy * yRatio));
          for (let dx = 0; dx < dstW; dx++) {
            const sx = Math.min(srcW - 1, Math.floor(dx * xRatio));
            const srcI = (sy * srcW + sx) * 4;
            const dstI = (dy * dstW + dx) * 4;
            out[dstI]   = pixels[srcI];
            out[dstI+1] = pixels[srcI+1];
            out[dstI+2] = pixels[srcI+2];
            out[dstI+3] = pixels[srcI+3];
          }
        }
        return out;
      }

      // ── Plan 06-03: _showStatus (toast notification) ─────────────────────────
      // editor.html has no persistent status bar; show a short-lived toast overlay
      let _statusTimer = null;
      function _showStatus(msg) {
        let toast = document.getElementById('editor-status-toast');
        if (!toast) {
          toast = document.createElement('div');
          toast.id = 'editor-status-toast';
          toast.style.cssText = [
            'position:fixed', 'bottom:24px', 'left:50%', 'transform:translateX(-50%)',
            'background:rgba(40,38,58,0.95)', 'color:#e0ddf8',
            'border:1px solid #7c6af7', 'border-radius:8px',
            'padding:8px 18px', 'font-size:13px', 'z-index:9999',
            'pointer-events:none', 'white-space:nowrap',
          ].join(';');
          document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.display = 'block';
        clearTimeout(_statusTimer);
        _statusTimer = setTimeout(() => { toast.style.display = 'none'; }, 3000);
        console.info('[status]', msg);
      }

      // ── Plan 06-03: colorEq ───────────────────────────────────────────────────
      function colorEq(pixels, i1, i2) {
        // Both fully transparent → equal (CLAUDE.md: alpha-aware equality)
        if (pixels[i1+3] === 0 && pixels[i2+3] === 0) return true;
        // One transparent, one opaque → unequal
        if (pixels[i1+3] === 0 || pixels[i2+3] === 0) return false;
        return pixels[i1]   === pixels[i2]   &&
               pixels[i1+1] === pixels[i2+1] &&
               pixels[i1+2] === pixels[i2+2] &&
               pixels[i1+3] === pixels[i2+3];
      }

      // ── Plan 06-03: scale2x (single 2× upscale pass; apply 3× for 8×) ────────
      function scale2x(pixels, w, h) {
        const OW  = w * 2;
        const out = new Uint8ClampedArray(OW * h * 2 * 4);

        function copyPixel(src, dst) {
          out[dst]   = pixels[src];
          out[dst+1] = pixels[src+1];
          out[dst+2] = pixels[src+2];
          out[dst+3] = pixels[src+3];
        }

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            // Official Scale2x neighborhood: B=top, D=left, E=center, F=right, H=bottom
            const B = (Math.max(0, y-1) * w + x)              * 4;  // top
            const D = (y * w + Math.max(0, x-1))               * 4;  // left
            const E = (y * w + x)                               * 4;  // center (current)
            const F = (y * w + Math.min(w-1, x+1))             * 4;  // right
            const H = (Math.min(h-1, y+1) * w + x)             * 4;  // bottom

            const oy = y * 2, ox = x * 2;
            const E0 = (oy * OW + ox)         * 4;  // top-left of output 2×2 block
            const E1 = (oy * OW + ox + 1)     * 4;  // top-right
            const E2 = ((oy+1) * OW + ox)     * 4;  // bottom-left
            const E3 = ((oy+1) * OW + ox + 1) * 4;  // bottom-right

            if (!colorEq(pixels, B, H) && !colorEq(pixels, D, F)) {
              // E0 = D==B ? D : E
              copyPixel(colorEq(pixels, D, B) ? D : E, E0);
              // E1 = B==F ? F : E
              copyPixel(colorEq(pixels, B, F) ? F : E, E1);
              // E2 = D==H ? D : E
              copyPixel(colorEq(pixels, D, H) ? D : E, E2);
              // E3 = H==F ? F : E
              copyPixel(colorEq(pixels, H, F) ? F : E, E3);
            } else {
              copyPixel(E, E0); copyPixel(E, E1);
              copyPixel(E, E2); copyPixel(E, E3);
            }
          }
        }
        return out;
      }

      // ── Plan 06-03: rotSprite (3× scale2x → NN rotate → 8× downsample) ───────
      function rotSprite(pixels, w, h, angleDeg) {
        // Step 1: 8× upscale via 3 passes of scale2x
        let buf = pixels, bw = w, bh = h;
        for (let pass = 0; pass < 3; pass++) {
          buf = scale2x(buf, bw, bh);
          bw *= 2; bh *= 2;
        }
        // bw === w * 8, bh === h * 8

        // Step 2: nearest-neighbor rotate at 8× scale (inverse mapping)
        const rad = -angleDeg * Math.PI / 180;  // negative = clockwise in Y-down coords
        const cos = Math.cos(rad), sin = Math.sin(rad);
        const cx = bw / 2, cy = bh / 2;
        const rotBuf = new Uint8ClampedArray(bw * bh * 4);

        for (let dy = 0; dy < bh; dy++) {
          for (let dx = 0; dx < bw; dx++) {
            const relX = dx - cx, relY = dy - cy;
            const srcX = Math.round(relX * cos - relY * sin + cx);
            const srcY = Math.round(relX * sin + relY * cos + cy);
            if (srcX >= 0 && srcX < bw && srcY >= 0 && srcY < bh) {
              const si = (srcY * bw + srcX) * 4;
              const di = (dy * bw + dx) * 4;
              rotBuf[di]   = buf[si];
              rotBuf[di+1] = buf[si+1];
              rotBuf[di+2] = buf[si+2];
              rotBuf[di+3] = buf[si+3];
            }
            // Out of bounds → stays transparent (Uint8ClampedArray default 0)
          }
        }

        // Step 3: 8× downsample → center-sample of each 8×8 block (matches Aseprite)
        const out = new Uint8ClampedArray(w * h * 4);
        for (let oy = 0; oy < h; oy++) {
          for (let ox = 0; ox < w; ox++) {
            const sx = ox * 8 + 4;  // center of 8×8 block
            const sy = oy * 8 + 4;
            if (sx < bw && sy < bh) {
              const si = (sy * bw + sx) * 4;
              const di = (oy * w + ox) * 4;
              out[di]   = rotBuf[si];
              out[di+1] = rotBuf[si+1];
              out[di+2] = rotBuf[si+2];
              out[di+3] = rotBuf[si+3];
            }
          }
        }
        return out;
      }

      // ── Plan 06-03: _applyRotationPreview ────────────────────────────────────
      // Compound order: scale to scaleX/scaleY first, then rotSprite
      function _applyRotationPreview() {
        const ts = EditorState.transformState;
        if (!ts) return;

        const angleDeg = ts.angleDeg;

        // 128×128 hard limit check on ORIGINAL selection (not post-scale)
        if (ts.origBbox.w * ts.origBbox.h > 128 * 128) {
          _showStatus('Selection too large for rotation — max 128\u00d7128px');
          return;
        }

        // Compound order: scale first, then rotate
        const srcPx = ts._origFloatPixels || ts.floatPixels;
        const srcW  = ts._origFloatW      || ts.origBbox.w;
        const srcH  = ts._origFloatH      || ts.origBbox.h;

        let scaledPx = srcPx;
        let scaledW  = srcW;
        let scaledH  = srcH;

        // Apply scale if non-unity
        if (Math.abs(ts.scaleX - 1.0) > 0.001 || Math.abs(ts.scaleY - 1.0) > 0.001) {
          scaledW = Math.max(1, Math.round(ts.origBbox.w * ts.scaleX));
          scaledH = Math.max(1, Math.round(ts.origBbox.h * ts.scaleY));
          scaledPx = scaleNearestNeighbor(srcPx, srcW, srcH, scaledW, scaledH);
        }

        // Apply rotation
        const rotated = rotSprite(scaledPx, scaledW, scaledH, angleDeg);

        // Update float to rotated result
        ts.floatPixels = rotated;
        ts.floatW      = scaledW;
        ts.floatH      = scaledH;

        _drawTransformUI();
      }

      // ── Plan 06-02/06-05: hitTestHandle ──────────────────────────────────────
      // Returns {type: 'scale'|'rotate', handleIdx: number} | null
      // Scale zone: ±6px from handle center (inner box)
      // Rotate zone: 6~20px from handle center, corners only (outer ring)
      function hitTestHandle(clientX, clientY) {
        if (!EditorState.transformState) return null;
        const ts = EditorState.transformState;
        const caRect  = document.getElementById('canvas-area').getBoundingClientRect();
        const pixRect = pixelCanvas.getBoundingClientRect();
        const originX = pixRect.left - caRect.left;
        const originY = pixRect.top  - caRect.top;
        const ps      = pixRect.width / EditorState.width;

        const lx = clientX - caRect.left;
        const ly = clientY - caRect.top;

        const sx = originX + ts.floatX * ps;
        const sy = originY + ts.floatY * ps;
        const sw = ts.floatW * ps;
        const sh = ts.floatH * ps;

        const INNER = 6;   // scale zone: ±6px from handle center
        const OUTER = 20;  // rotate zone: 6~20px from handle center (corners only)

        const cornerIndices = [0, 2, 5, 7]; // TL TR BL BR

        const handlePositions = [
          [sx,        sy       ],  // 0 TL
          [sx + sw/2, sy       ],  // 1 TC
          [sx + sw,   sy       ],  // 2 TR
          [sx,        sy + sh/2],  // 3 ML
          [sx + sw,   sy + sh/2],  // 4 MR
          [sx,        sy + sh  ],  // 5 BL
          [sx + sw/2, sy + sh  ],  // 6 BC
          [sx + sw,   sy + sh  ],  // 7 BR
        ];
        for (let i = 0; i < handlePositions.length; i++) {
          const [hx, hy] = handlePositions[i];
          const dx = Math.abs(lx - hx);
          const dy = Math.abs(ly - hy);
          if (dx <= INNER && dy <= INNER) {
            return { type: 'scale', handleIdx: i };
          }
          // Rotation zone: only for corner handles, in the outer ring
          if (cornerIndices.includes(i) && dx <= OUTER && dy <= OUTER) {
            return { type: 'rotate', handleIdx: i };
          }
        }
        return null;
      }

      function _drawTransformUI() {
        if (!EditorState.transformState) return;
        const ts  = EditorState.transformState;
        const dpr = window.devicePixelRatio || 1;
        selCtx.clearRect(0, 0, selCanvas.width / dpr, selCanvas.height / dpr);

        const { originX, originY, ps } = _getSelCanvasCoords();
        const sx = originX + ts.floatX * ps;
        const sy = originY + ts.floatY * ps;
        const sw = ts.floatW * ps;
        const sh = ts.floatH * ps;

        // Render float content preview (offscreen canvas → drawImage, safe: source is EditorState pixels)
        if (ts.floatW > 0 && ts.floatH > 0) {
          const off = document.createElement('canvas');
          off.width = ts.floatW; off.height = ts.floatH;
          const offCtx = off.getContext('2d');
          offCtx.putImageData(new ImageData(ts.floatPixels.slice(), ts.floatW, ts.floatH), 0, 0);
          selCtx.imageSmoothingEnabled = false;
          selCtx.drawImage(off, sx, sy, sw, sh);
        }

        // Static dashed border (lineWidth=2, gray-purple, matching Phase 5.1 convention)
        selCtx.strokeStyle = 'rgba(160,150,220,0.9)';
        selCtx.lineWidth   = 2;
        selCtx.setLineDash([4, 3]);
        selCtx.beginPath();
        selCtx.strokeRect(sx - 1, sy - 1, sw + 2, sh + 2);
        selCtx.setLineDash([]);

        // 8 handles: TL, TC, TR, ML, MR, BL, BC, BR (indices 0-7)
        const HALF = 4;  // 8px visual size
        const handlePositions = [
          [sx,        sy       ],  // 0 TL
          [sx + sw/2, sy       ],  // 1 TC
          [sx + sw,   sy       ],  // 2 TR
          [sx,        sy + sh/2],  // 3 ML
          [sx + sw,   sy + sh/2],  // 4 MR
          [sx,        sy + sh  ],  // 5 BL
          [sx + sw/2, sy + sh  ],  // 6 BC
          [sx + sw,   sy + sh  ],  // 7 BR
        ];
        selCtx.fillStyle   = '#7c6af7';  // gray-purple, matches --accent
        selCtx.strokeStyle = '#fff';
        selCtx.lineWidth   = 1;
        selCtx.setLineDash([]);
        for (const [hx, hy] of handlePositions) {
          selCtx.fillRect(hx - HALF, hy - HALF, HALF * 2, HALF * 2);
          selCtx.strokeRect(hx - HALF, hy - HALF, HALF * 2, HALF * 2);
        }
      }

      function _showTransformTopBar() {
        const panel = document.getElementById('tool-settings-move');
        if (panel) panel.style.display = 'flex';
        // Sync top-bar inputs to current transformState
        const ts = EditorState.transformState;
        if (!ts) return;
        const sxEl = document.getElementById('opt-scale-x');
        const syEl = document.getElementById('opt-scale-y');
        const aEl  = document.getElementById('opt-rotate-angle');
        if (sxEl) sxEl.value = Math.round(ts.scaleX * 100);
        if (syEl) syEl.value = Math.round(ts.scaleY * 100);
        if (aEl)  aEl.value  = ts.angleDeg;
      }

      function _hideTransformTopBar() {
        const panel = document.getElementById('tool-settings-move');
        if (panel) panel.style.display = 'none';
      }

      function _hideDistanceLabel() {
        const label = document.getElementById('transform-distance-label');
        if (label) label.style.display = 'none';
      }

      function _updateDistanceLabel() {
        const ts = EditorState.transformState;
        if (!ts) return;
        const label = document.getElementById('transform-distance-label');
        if (!label) return;

        const left   = ts.floatX;
        const top    = ts.floatY;
        const right  = EditorState.width  - (ts.floatX + ts.floatW);
        const bottom = EditorState.height - (ts.floatY + ts.floatH);
        label.textContent = `\u2190${left} \u2191${top} \u2192${right} \u2193${bottom}`;

        const pixRect = pixelCanvas.getBoundingClientRect();
        const ps      = pixRect.width / EditorState.width;
        const screenX = pixRect.left + ts.floatX * ps;
        const screenY = pixRect.top  + (ts.floatY + ts.floatH) * ps + 6;
        label.style.left    = screenX + 'px';
        label.style.top     = screenY + 'px';
        label.style.display = 'block';
      }

      function applyTransform() {
        const ts = EditorState.transformState;
        if (!ts) return;
        pushHistory();  // one undo step for the entire compound transform

        const W = EditorState.width, H = EditorState.height;
        for (let fy = 0; fy < ts.floatH; fy++) {
          for (let fx = 0; fx < ts.floatW; fx++) {
            const cx = ts.floatX + fx, cy = ts.floatY + fy;
            if (cx < 0 || cx >= W || cy < 0 || cy >= H) continue;  // clip overflow
            const si = (fy * ts.floatW + fx) * 4;
            if (ts.floatPixels[si + 3] === 0) continue;  // transparent → skip
            setPixel(cx, cy, [
              ts.floatPixels[si], ts.floatPixels[si+1],
              ts.floatPixels[si+2], ts.floatPixels[si+3],
            ]);
          }
        }
        flushPixels();
        EditorState.transformState = null;
        clearSelection();
        _hideTransformTopBar();
        _hideDistanceLabel();
        // B3 fix: disable selCanvas pointer capture now that transform is done
        selCanvas.style.pointerEvents = 'none';
        selCanvas.removeEventListener('pointerdown', _selCanvasPointerDown);
      }

      function cancelTransform() {
        const ts = EditorState.transformState;
        if (!ts) return;
        // Restore original pixels (no history push)
        EditorState.pixels = ts.originalPixels;
        flushPixels();
        EditorState.transformState = null;
        clearSelection();
        _hideTransformTopBar();
        _hideDistanceLabel();
        // B3 fix: disable selCanvas pointer capture now that transform is cancelled
        selCanvas.style.pointerEvents = 'none';
        selCanvas.removeEventListener('pointerdown', _selCanvasPointerDown);
      }

      // ── tools.move ────────────────────────────────────────────────────────────

      tools.move = {
        onDown(x, y, e) {
          // Case 1: transform already active → check handle hit-test first
          const existingTs = EditorState.transformState;
          if (existingTs) {
            const hitResult = hitTestHandle(e.clientX, e.clientY);
            if (hitResult !== null && hitResult.type === 'scale') {
              const handleIdx = hitResult.handleIdx;
              // Store original floatPixels for scale operations (source of truth)
              existingTs._origFloatPixels  = existingTs.floatPixels.slice();
              existingTs._origFloatW       = existingTs.floatW;
              existingTs._origFloatH       = existingTs.floatH;
              existingTs._dragMode         = 'handle-' + handleIdx;
              existingTs._dragStartClientX = e.clientX;
              existingTs._dragStartClientY = e.clientY;
              existingTs._dragStartScaleX  = existingTs.scaleX;
              existingTs._dragStartScaleY  = existingTs.scaleY;
              existingTs._dragStartFloatX  = existingTs.floatX;
              existingTs._dragStartFloatY  = existingTs.floatY;
              // B1 fix: record anchor point (opposite corner/edge stays fixed during resize)
              // anchorFrac: fraction of the current bbox where the anchor sits
              // [TL, TC, TR, ML, MR, BL, BC, BR] = indices 0-7
              const anchorFrac = [
                [1, 1],   // 0 TL → anchor at BR
                [0.5, 1], // 1 TC → anchor at BC-center
                [0, 1],   // 2 TR → anchor at BL
                [1, 0.5], // 3 ML → anchor at MR-center
                [0, 0.5], // 4 MR → anchor at ML-center
                [1, 0],   // 5 BL → anchor at TR
                [0.5, 0], // 6 BC → anchor at TC-center
                [0, 0],   // 7 BR → anchor at TL
              ];
              const [ax, ay] = anchorFrac[handleIdx];
              existingTs._dragAnchorX     = existingTs.floatX + ax * existingTs.floatW;
              existingTs._dragAnchorY     = existingTs.floatY + ay * existingTs.floatH;
              existingTs._dragAnchorFracX = ax;
              existingTs._dragAnchorFracY = ay;
              return;
            } else if (hitResult !== null && hitResult.type === 'rotate') {
              // Rotation via corner handle outer zone
              const pixRect = pixelCanvas.getBoundingClientRect();
              const ps = pixRect.width / EditorState.width;
              const centerClientX = pixRect.left + (existingTs.floatX + existingTs.floatW / 2) * ps;
              const centerClientY = pixRect.top  + (existingTs.floatY + existingTs.floatH / 2) * ps;

              existingTs._dragMode         = 'rotate';
              existingTs._rotCenterX       = centerClientX;
              existingTs._rotCenterY       = centerClientY;
              existingTs._rotRefAngle      = Math.atan2(e.clientY - centerClientY, e.clientX - centerClientX);
              existingTs._rotStartAngleDeg = existingTs.angleDeg;
              return;
            }
            // No handle hit → treat as move drag
            existingTs._dragMode         = 'move';
            existingTs._dragStartClientX = e.clientX;
            existingTs._dragStartClientY = e.clientY;
            existingTs._dragStartFloatX  = existingTs.floatX;
            existingTs._dragStartFloatY  = existingTs.floatY;
            return;
          }
          // Case 2: no transform yet → activate (requires a selection)
          if (!EditorState.selection) return;
          activateTransform();
          if (EditorState.transformState) {
            EditorState.transformState._dragMode         = 'move';
            EditorState.transformState._dragStartClientX = e.clientX;
            EditorState.transformState._dragStartClientY = e.clientY;
            EditorState.transformState._dragStartFloatX  = EditorState.transformState.floatX;
            EditorState.transformState._dragStartFloatY  = EditorState.transformState.floatY;
          }
        },
        onMove(x, y, e) {
          const ts = EditorState.transformState;
          if (!ts) return;

          if (ts._dragMode === 'move') {
            const pixRect = pixelCanvas.getBoundingClientRect();
            const ps      = pixRect.width / EditorState.width;
            const dx = Math.round((e.clientX - ts._dragStartClientX) / ps);
            const dy = Math.round((e.clientY - ts._dragStartClientY) / ps);
            ts.floatX = ts._dragStartFloatX + dx;
            ts.floatY = ts._dragStartFloatY + dy;
            _drawTransformUI();
            _updateDistanceLabel();
            return;
          }

          if (ts._dragMode && ts._dragMode.startsWith('handle-')) {
            const handleIdx = parseInt(ts._dragMode.split('-')[1], 10);
            const pixRect   = pixelCanvas.getBoundingClientRect();
            const ps        = pixRect.width / EditorState.width;

            // Delta in canvas pixels
            const dxPx = Math.round((e.clientX - ts._dragStartClientX) / ps);
            const dyPx = Math.round((e.clientY - ts._dragStartClientY) / ps);

            // Original bbox dimensions
            const origW = ts.origBbox.w;
            const origH = ts.origBbox.h;
            const lockAspect = document.getElementById('opt-scale-lock')?.checked ?? true;

            // Compute new scale based on which handle is dragged
            // Corners: both axes; TC/BC: Y only; ML/MR: X only
            let newScaleX = ts._dragStartScaleX;
            let newScaleY = ts._dragStartScaleY;

            const corners = [0, 2, 5, 7];  // TL TR BL BR
            const yOnlyH  = [1, 6];         // TC BC
            const xOnlyH  = [3, 4];         // ML MR

            if (corners.includes(handleIdx)) {
              // Right-side corners (2, 7): drag right = increase X; left-side (0, 5): drag right = decrease X
              const xSign = [2, 4, 7].includes(handleIdx) ? 1 : -1;
              const ySign = [5, 6, 7].includes(handleIdx) ? 1 : -1;
              newScaleX = Math.max(0.0625, (origW * ts._dragStartScaleX + dxPx * xSign) / origW);
              newScaleY = Math.max(0.0625, (origH * ts._dragStartScaleY + dyPx * ySign) / origH);
              if (lockAspect) {
                const relX = Math.abs(newScaleX - ts._dragStartScaleX);
                const relY = Math.abs(newScaleY - ts._dragStartScaleY);
                if (relX > relY) newScaleY = newScaleX;
                else             newScaleX = newScaleY;
              }
            } else if (yOnlyH.includes(handleIdx)) {
              const ySign = handleIdx === 6 ? 1 : -1;
              newScaleY = Math.max(0.0625, (origH * ts._dragStartScaleY + dyPx * ySign) / origH);
              if (lockAspect) newScaleX = newScaleY;
            } else if (xOnlyH.includes(handleIdx)) {
              const xSign = handleIdx === 4 ? 1 : -1;
              newScaleX = Math.max(0.0625, (origW * ts._dragStartScaleX + dxPx * xSign) / origW);
              if (lockAspect) newScaleY = newScaleX;
            }

            ts.scaleX = newScaleX;
            ts.scaleY = newScaleY;

            // Resample from _origFloatPixels (captured at drag start, not from last frame)
            const newW = Math.max(1, Math.round(ts.origBbox.w * ts.scaleX));
            const newH = Math.max(1, Math.round(ts.origBbox.h * ts.scaleY));
            ts.floatPixels = scaleNearestNeighbor(ts._origFloatPixels, ts._origFloatW, ts._origFloatH, newW, newH);
            ts.floatW = newW;
            ts.floatH = newH;
            // B1 fix: re-anchor floatX/Y so the opposite handle stays stationary
            if (ts._dragAnchorFracX !== undefined) {
              ts.floatX = ts._dragAnchorX - ts._dragAnchorFracX * newW;
              ts.floatY = ts._dragAnchorY - ts._dragAnchorFracY * newH;
            }

            // Sync top-bar inputs
            const sxEl = document.getElementById('opt-scale-x');
            const syEl = document.getElementById('opt-scale-y');
            if (sxEl) sxEl.value = Math.round(ts.scaleX * 100);
            if (syEl) syEl.value = Math.round(ts.scaleY * 100);

            _drawTransformUI();
            return;
          }

          if (ts._dragMode === 'rotate') {
            const curAngle = Math.atan2(
              e.clientY - ts._rotCenterY,
              e.clientX - ts._rotCenterX
            );
            const deltaDeg = (curAngle - ts._rotRefAngle) * 180 / Math.PI;
            ts.angleDeg = ts._rotStartAngleDeg + deltaDeg;

            // Sync Angle° input
            const aEl = document.getElementById('opt-rotate-angle');
            if (aEl) aEl.value = Math.round(ts.angleDeg);

            // Live RotSprite preview (128×128 limit check is inside _applyRotationPreview)
            _applyRotationPreview();
            return;
          }
        },
        onUp(x, y, e) {
          const ts = EditorState.transformState;
          if (!ts) return;
          ts._dragMode = null;
          _updateDistanceLabel();
        },
        onCursor(x, y, e) {
          if (!EditorState.transformState || !e) return;
          const hit = hitTestHandle(e.clientX, e.clientY);
          if (!hit) {
            cursorCanvas.style.cursor = 'move';
            return;
          }
          if (hit.type === 'rotate') {
            cursorCanvas.style.cursor = 'crosshair';
            return;
          }
          // Scale cursor: direction depends on handle index
          const scaleCursors = [
            'nw-resize', 'n-resize', 'ne-resize',
            'w-resize',              'e-resize',
            'sw-resize', 's-resize', 'se-resize',
          ];
          cursorCanvas.style.cursor = scaleCursors[hit.handleIdx] ?? 'move';
        },
      };

      // Apply/Cancel button bindings
      const btnApplyTransform  = document.getElementById('btn-apply-transform');
      const btnCancelTransform = document.getElementById('btn-cancel-transform');
      if (btnApplyTransform)  btnApplyTransform.addEventListener('click', applyTransform);
      if (btnCancelTransform) btnCancelTransform.addEventListener('click', cancelTransform);

      // ── Plan 06-02: Transform top-bar input bindings ──────────────────────────
      let _scaleInputTimer = null;

      function _applyScaleFromInputs() {
        const ts = EditorState.transformState;
        if (!ts) return;

        const sxVal = parseFloat(document.getElementById('opt-scale-x')?.value) || 100;
        const syVal = parseFloat(document.getElementById('opt-scale-y')?.value) || 100;

        ts.scaleX = Math.max(0.0625, Math.min(16, sxVal / 100));
        ts.scaleY = Math.max(0.0625, Math.min(16, syVal / 100));

        // Resample from _origFloatPixels (snapshot at drag start, or fall back to activation state)
        const srcPx = ts._origFloatPixels || ts.floatPixels;
        const srcW  = ts._origFloatW      || ts.origBbox.w;
        const srcH  = ts._origFloatH      || ts.origBbox.h;

        const newW = Math.max(1, Math.round(ts.origBbox.w * ts.scaleX));
        const newH = Math.max(1, Math.round(ts.origBbox.h * ts.scaleY));

        ts.floatPixels = scaleNearestNeighbor(srcPx, srcW, srcH, newW, newH);
        ts.floatW      = newW;
        ts.floatH      = newH;

        _drawTransformUI();
      }

      const scaleXInput  = document.getElementById('opt-scale-x');
      const scaleYInput  = document.getElementById('opt-scale-y');
      const scaleLockChk = document.getElementById('opt-scale-lock');

      if (scaleXInput) {
        scaleXInput.addEventListener('input', () => {
          if (scaleLockChk?.checked) {
            if (scaleYInput) scaleYInput.value = scaleXInput.value;
          }
          clearTimeout(_scaleInputTimer);
          _scaleInputTimer = setTimeout(_applyScaleFromInputs, 300);
        });
      }
      if (scaleYInput) {
        scaleYInput.addEventListener('input', () => {
          if (scaleLockChk?.checked) {
            if (scaleXInput) scaleXInput.value = scaleYInput.value;
          }
          clearTimeout(_scaleInputTimer);
          _scaleInputTimer = setTimeout(_applyScaleFromInputs, 300);
        });
      }

      // ── Plan 06-03: Angle° input binding (debounce 300ms) ───────────────────
      let _rotateInputTimer = null;
      const rotateAngleInput = document.getElementById('opt-rotate-angle');
      if (rotateAngleInput) {
        rotateAngleInput.addEventListener('input', () => {
          const ts = EditorState.transformState;
          if (!ts) return;
          ts.angleDeg = parseFloat(rotateAngleInput.value) || 0;
          clearTimeout(_rotateInputTimer);
          _rotateInputTimer = setTimeout(_applyRotationPreview, 300);
        });
      }

      // ── END Tool dispatch ─────────────────────────────────────────────────────

      // B2 fix: wire zoom hook — redraws transform overlay when applyZoom is called.
      // _drawTransformUI is defined above in this DOMContentLoaded closure; _onZoomChanged
      // is declared in outer scope so applyZoom (also outer scope) can call it.
      _onZoomChanged = () => {
        if (EditorState.transformState) _drawTransformUI();
      };

      // ── Zoom controls (all via applyZoom — scroll-adjusted) ──────────────────
      // canvasArea: receives wheel events (entire area incl. result panel)
      // zoomScrollEl: actual scroll container for canvas pan/zoom
      const canvasArea   = document.getElementById('canvas-area');
      const zoomScrollEl = document.getElementById('zoom-scroll-content');

      // Wheel / trackpad events (passive:false required for preventDefault)
      // Eyedropper: open EyeDropper API when cursor leaves the editor area entirely
      // (moves to left/right sidebar, top bar, or outside the browser window)
      canvasArea.addEventListener('pointerleave', () => {
        if (EditorState.activeTool === 'eyedropper' && window.EyeDropper && !_eyedropperAborter) {
          _eyedropperAborter = new AbortController();
          new window.EyeDropper().open({ signal: _eyedropperAborter.signal })
            .then(result => {
              _eyedropperAborter = null;
              const h = result.sRGBHex.replace('#', '');
              EditorState.foregroundColor = [
                parseInt(h.slice(0, 2), 16),
                parseInt(h.slice(2, 4), 16),
                parseInt(h.slice(4, 6), 16),
                255,
              ];
              syncColorUI();
            })
            .catch(() => { _eyedropperAborter = null; });
        }
      });

      canvasArea.addEventListener('wheel', e => {
        e.preventDefault();

        // Trackpad pinch (and Ctrl+scroll) → zoom
        // Browser synthesizes pinch as wheel event with e.ctrlKey = true
        if (e.ctrlKey) {
          // Trackpad pinch — continuous zoom, factor ≈ 50% of original 1.1
          const factor = e.deltaY < 0 ? 1.05 : 1 / 1.05;
          applyZoom(EditorState.zoom * factor, e.clientX, e.clientY);
          return;
        }

        // Two-finger scroll → pan (translate scroll position)
        // deltaMode 0 = pixels (trackpad), 1 = lines, 2 = pages
        const pixelDeltaX = e.deltaMode === 0 ? e.deltaX : e.deltaX * 20;
        const pixelDeltaY = e.deltaMode === 0 ? e.deltaY : e.deltaY * 20;
        zoomScrollEl.scrollLeft += pixelDeltaX;
        zoomScrollEl.scrollTop  += pixelDeltaY;
        clampScroll(zoomScrollEl);
      }, { passive: false });

      // Top bar Zoom + / - buttons (snap to power-of-2 levels: 0.25/0.5/1/2/4/8/16/32/64)
      document.getElementById('btn-zoom-in').addEventListener('click', () => {
        const rect = zoomScrollEl.getBoundingClientRect();
        applyZoom(snapZoomIn(EditorState.zoom), rect.left + rect.width / 2, rect.top + rect.height / 2);
      });
      document.getElementById('btn-zoom-out').addEventListener('click', () => {
        const rect = zoomScrollEl.getBoundingClientRect();
        applyZoom(snapZoomOut(EditorState.zoom), rect.left + rect.width / 2, rect.top + rect.height / 2);
      });

      // Keyboard zoom (Cmd+= / Cmd+-, snap to power-of-2 levels)
      document.addEventListener('keydown', e => {
        if (e.target.matches('input, textarea')) return;
        if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '+')) {
          e.preventDefault();
          const rect = zoomScrollEl.getBoundingClientRect();
          applyZoom(snapZoomIn(EditorState.zoom), rect.left + rect.width / 2, rect.top + rect.height / 2);
        }
        if ((e.ctrlKey || e.metaKey) && e.key === '-') {
          e.preventDefault();
          const rect = zoomScrollEl.getBoundingClientRect();
          applyZoom(snapZoomOut(EditorState.zoom), rect.left + rect.width / 2, rect.top + rect.height / 2);
        }
        // Undo: Cmd+Z (Mac) or Ctrl+Z
        if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') {
          e.preventDefault();
          undo();
        }
        // Redo: Shift+Cmd+Z (Mac) or Ctrl+Shift+Z
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'z') {
          e.preventDefault();
          redo();
        }
        // Cmd+D → Deselect
        if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'd') {
          e.preventDefault();
          clearSelection();
        }
        // Shift+Cmd+I → Inverse selection
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'i') {
          e.preventDefault();
          invertSelection();
        }
        // Delete / Backspace → clear selected pixels (fill with transparent)
        if ((e.key === 'Delete' || e.key === 'Backspace') && !e.altKey && EditorState.selectionMask) {
          e.preventDefault();
          deleteSelection();
        }
        // Option+Delete (Alt+Backspace on some systems) → fill selected pixels with foreground color
        if ((e.key === 'Delete' || e.key === 'Backspace') && e.altKey && EditorState.selectionMask) {
          e.preventDefault();
          fillSelection();
        }
        // Tool shortcuts (no modifier — guard against text inputs handled above)
        if (!e.ctrlKey && !e.metaKey) {
          if (e.key === 'b' || e.key === 'B') setActiveTool('pencil');
          if (e.key === 'e' || e.key === 'E') setActiveTool('eraser');
          if (e.key === 'g' || e.key === 'G') setActiveTool('bucket');
          if (e.key === 'i' || e.key === 'I') setActiveTool('eyedropper');
          if (e.key === 'm' || e.key === 'M') setActiveTool('marquee');
          if (e.key === 'w' || e.key === 'W') setActiveTool('wand');
          if (e.key === 'v' || e.key === 'V') setActiveTool('move');
        }
        // Enter → apply transform (if active)
        if (e.key === 'Enter' && EditorState.transformState) {
          e.preventDefault();
          applyTransform();
        }
        // Eyedropper cancel: Escape restores _prevTool (fall back to pencil if _prevTool was null)
        if (e.key === 'Escape' && EditorState.activeTool === 'eyedropper') {
          setActiveTool(EditorState._prevTool || 'pencil');
        }
        // Escape → cancel transform (if active, and not eyedropper)
        if (e.key === 'Escape' && EditorState.transformState && EditorState.activeTool !== 'eyedropper') {
          cancelTransform();
        }
        // Escape → clear selection (no transform, no eyedropper, modal closed)
        if (e.key === 'Escape' && EditorState.selectionMask && !EditorState.transformState && EditorState.activeTool !== 'eyedropper') {
          const modalOpen = document.getElementById('shortcut-modal')?.style.display === 'flex';
          if (!modalOpen) { e.preventDefault(); clearSelection(); }
        }
        // Escape → deactivate all tools (nothing else to cancel, modal closed)
        if (e.key === 'Escape' && !EditorState.selectionMask && !EditorState.transformState && EditorState.activeTool !== 'eyedropper') {
          const modalOpen = document.getElementById('shortcut-modal')?.style.display === 'flex';
          if (!modalOpen) { e.preventDefault(); setActiveTool(null); }
        }
      });

      // ── Keyboard shortcut help modal ────────────────────────────────────────
      (function() {
        // Platform detection: macOS uses symbols; others use text labels
        const isMac = /Mac|iPhone|iPad/.test(navigator.platform || navigator.userAgent);
        const mod   = isMac ? '⌘' : 'Ctrl';
        const alt   = isMac ? '⌥' : 'Alt';
        const shift = isMac ? '⇧' : 'Shift';

        // Shortcut data grouped by section
        const SECTIONS = [
          {
            title: '工具',
            rows: [
              { desc: '选框（矩形）', keys: ['M'], icon: '/icons/Marquee_icon.png' },
              { desc: '魔棒',         keys: ['W'], icon: '/icons/Wand_icon.png' },
              { desc: '移动',         keys: ['V'], icon: '/icons/Move_icon.png' },
              { desc: '铅笔',         keys: ['B'], icon: '/icons/Pencil_icon.png' },
              { desc: '油漆桶',       keys: ['G'], icon: '/icons/Bucket_icon.png' },
              { desc: '橡皮擦',       keys: ['E'], icon: '/icons/Eraser_icon.png' },
              { desc: '吸管（取色）', keys: ['I'], icon: '/icons/Eyedropper_icon.png' },
              { desc: '取消',         keys: ['Esc'] },
            ],
          },
          {
            title: '历史',
            rows: [
              { desc: '撤销', keys: [mod, 'Z'] },
              { desc: '重做', keys: [mod, shift, 'Z'] },
            ],
          },
          {
            title: '视图',
            rows: [
              { desc: '放大', keys: [mod, '+'] },
              { desc: '缩小', keys: [mod, '−'] },
            ],
          },
          {
            title: '选区',
            rows: [
              { desc: '取消选区',         keys: [mod, 'D'] },
              { desc: '反选',             keys: [mod, shift, 'I'] },
              { desc: '删除选区内像素',   keys: ['Delete', '/', 'Backspace'] },
              { desc: '用前景色填充选区', keys: [alt, 'Delete', '/', alt, 'Backspace'] },
            ],
          },
        ];

        function buildShortcutList() {
          const container = document.getElementById('shortcut-list');
          if (!container) return;
          container.innerHTML = '';
          SECTIONS.forEach(section => {
            const title = document.createElement('div');
            title.className = 'sc-section-title';
            title.textContent = section.title;
            container.appendChild(title);
            section.rows.forEach(row => {
              const rowEl = document.createElement('div');
              rowEl.className = 'sc-row';
              const descEl = document.createElement('span');
              descEl.className = 'sc-desc';
              if (row.icon) {
                const iconEl = document.createElement('img');
                iconEl.src = row.icon;
                iconEl.width = 16; iconEl.height = 16;
                iconEl.style.cssText = 'vertical-align:middle;margin-right:6px;opacity:0.75';
                descEl.appendChild(iconEl);
              }
              descEl.appendChild(document.createTextNode(row.desc));
              const keysEl = document.createElement('span');
              keysEl.className = 'sc-keys';
              row.keys.forEach(k => {
                if (k === '/') {
                  const sep = document.createElement('span');
                  sep.textContent = '/';
                  sep.style.cssText = 'color:var(--text-muted);align-self:center;padding:0 2px';
                  keysEl.appendChild(sep);
                } else {
                  const keyEl = document.createElement('kbd');
                  keyEl.className = 'sc-key';
                  keyEl.textContent = k;
                  keysEl.appendChild(keyEl);
                }
              });
              rowEl.appendChild(descEl);
              rowEl.appendChild(keysEl);
              container.appendChild(rowEl);
            });
          });
        }

        function showHelpModal() {
          buildShortcutList();
          const modal = document.getElementById('shortcut-modal');
          if (modal) { modal.style.display = 'flex'; }
        }
        function closeHelpModal() {
          const modal = document.getElementById('shortcut-modal');
          if (modal) { modal.style.display = 'none'; }
        }

        // Button binding
        const helpBtn = document.getElementById('help-btn');
        if (helpBtn) helpBtn.addEventListener('click', showHelpModal);

        // Close button
        const helpCloseBtn = document.getElementById('help-close-btn');
        if (helpCloseBtn) helpCloseBtn.addEventListener('click', closeHelpModal);

        // Click-outside-to-close (click on backdrop overlay)
        const modal = document.getElementById('shortcut-modal');
        if (modal) {
          modal.addEventListener('click', e => {
            if (e.target === modal) closeHelpModal();
          });
        }

        // Keyboard: ? opens modal; Escape closes modal
        document.addEventListener('keydown', e => {
          if (e.target.matches('input, textarea')) return;
          if (e.key === '?' && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            const isOpen = document.getElementById('shortcut-modal')?.style.display === 'flex';
            if (isOpen) closeHelpModal(); else showHelpModal();
          }
          if (e.key === 'Escape') {
            closeHelpModal();
          }
        });
      })();

      // ── Palette Panel: DOM event bindings ─────────────────────────────────────

      // paletteHeader click → toggle body visibility + chevron
      const paletteHeader = document.getElementById('paletteHeader');
      const paletteBody   = document.getElementById('paletteBody');
      if (paletteHeader && paletteBody) {
        paletteHeader.addEventListener('click', () => {
          const isOpen = !paletteBody.classList.contains('hidden');
          paletteBody.classList.toggle('hidden', isOpen);
          paletteHeader.classList.toggle('open', !isOpen);
        });
      }

      // nColors slider ↔ number input sync
      const nColorsSlider = document.getElementById('nColors');
      const nColorsInput  = document.getElementById('nColorsInput');
      if (nColorsSlider && nColorsInput) {
        nColorsSlider.addEventListener('input', () => { nColorsInput.value = nColorsSlider.value; });
        nColorsInput.addEventListener('input', () => {
          const v = parseInt(nColorsInput.value);
          if (!isNaN(v) && v >= 1) nColorsSlider.value = Math.min(64, Math.max(2, v));
        });
      }

      // minRegionPct slider ↔ number input sync
      const minRegPctSlider = document.getElementById('minRegionPct');
      const minRegPctInput  = document.getElementById('minRegionPctInput');
      if (minRegPctSlider && minRegPctInput) {
        minRegPctSlider.addEventListener('input', () => { minRegPctInput.value = parseFloat(minRegPctSlider.value).toFixed(2); });
        minRegPctInput.addEventListener('input', () => {
          const v = parseFloat(minRegPctInput.value);
          if (!isNaN(v) && v >= 0.01) minRegPctSlider.value = Math.min(5, Math.max(0.01, v));
        });
      }

      // genAlgorithm → show/hide boost params
      const genAlgorithmEl = document.getElementById('genAlgorithm');
      const boostParamsEl  = document.getElementById('boostParams');
      if (genAlgorithmEl && boostParamsEl) {
        genAlgorithmEl.addEventListener('change', () => {
          boostParamsEl.style.display = genAlgorithmEl.value === 'boost' ? 'block' : 'none';
        });
      }

      // Generate palette button
      const generateBtn = document.getElementById('generateBtn');
      if (generateBtn) {
        const ALGO_NAMES = { fastoctree: '八叉树', mediancut: '中值切割', boost: '覆盖增强' };
        generateBtn.addEventListener('click', async () => {
          const algo = genAlgorithmEl ? genAlgorithmEl.value : 'fastoctree';
          palShowStatus(`正在生成色卡（${ALGO_NAMES[algo] || algo}）...`);
          const n = nColorsInput ? (parseInt(nColorsInput.value) || 16) : 16;
          const fd = new FormData();
          fd.append('algorithm', algo);
          fd.append('n_colors', n);
          if (algo === 'boost' && minRegPctInput) {
            fd.append('min_region_pct', minRegPctInput.value || '1.0');
          }
          // Use EditorState pixels as base64 if available, else no image available
          if (!EditorState.pixels) {
            palShowStatus('请先加载图像', 'warning'); return;
          }
          // Convert EditorState.pixels to base64 PNG via off-screen canvas
          const offCanvas = document.createElement('canvas');
          offCanvas.width = EditorState.width; offCanvas.height = EditorState.height;
          const offCtx = offCanvas.getContext('2d');
          // PAL-03: 写入前规范化 alpha — alpha >= 128 强制 255，alpha <= 127 清零（避免 Flask IMREAD_COLOR 合成出虚假黑色）
          const src = EditorState.pixels;
          const filtered = new Uint8ClampedArray(src.length);
          for (let i = 0; i < src.length; i += 4) {
            const a = src[i + 3];
            if (a >= 128) {
              filtered[i]   = src[i];
              filtered[i+1] = src[i+1];
              filtered[i+2] = src[i+2];
              filtered[i+3] = 255;
            } else {
              filtered[i] = filtered[i+1] = filtered[i+2] = filtered[i+3] = 0;
            }
          }
          offCtx.putImageData(new ImageData(filtered, EditorState.width, EditorState.height), 0, 0);
          const b64 = offCanvas.toDataURL('image/png').split(',')[1];
          fd.append('image', b64);
          try {
            const res = await fetch('/api/generate-palette', { method: 'POST', body: fd });
            const data = await res.json();
            if (!res.ok) { palShowStatus('生成失败：' + (data.error || ''), 'error'); return; }
            currentPaletteMeta = { name: '', source: 'generate', algorithm: algo, count: data.count };
            setCurrentPalette(data.palette);
            palShowStatus(`色卡已生成：${data.count} 色（${ALGO_NAMES[algo] || algo}）`, 'success');
            const paletteNameEl = document.getElementById('paletteName');
            if (paletteNameEl) paletteNameEl.value = '未命名色卡';
          } catch (err) {
            palShowStatus('生成色卡失败：' + err.message, 'error');
          }
        });
      }

      // Palette file upload
      const palFileInputEl = document.getElementById('palFileInput');
      if (palFileInputEl) {
        palFileInputEl.addEventListener('change', async () => {
          const file = palFileInputEl.files[0];
          if (file) await uploadPaletteFile(file);
        });
      }

      // Color popup event bindings
      const popupColorPickerEl = document.getElementById('popupColorPicker');
      const popupREl = document.getElementById('popupR');
      const popupGEl = document.getElementById('popupG');
      const popupBEl = document.getElementById('popupB');
      const popupHexEl = document.getElementById('popupHex');
      const popupDoneEl = document.getElementById('popupDone');
      const popupDeleteEl = document.getElementById('popupDelete');
      if (popupColorPickerEl) popupColorPickerEl.addEventListener('input', _popupSyncFromPicker);
      if (popupREl) popupREl.addEventListener('input', _popupSyncFromRgb);
      if (popupGEl) popupGEl.addEventListener('input', _popupSyncFromRgb);
      if (popupBEl) popupBEl.addEventListener('input', _popupSyncFromRgb);
      if (popupHexEl) popupHexEl.addEventListener('input', _popupSyncFromHex);
      if (popupDoneEl) popupDoneEl.addEventListener('click', closeColorEditor);
      if (popupDeleteEl) popupDeleteEl.addEventListener('click', () => {
        if (editingSwatchIdx !== null) deleteSwatch(editingSwatchIdx);
      });

      // Close popup on outside click
      document.addEventListener('click', e => {
        const popup = document.getElementById('colorPopup');
        if (popup && !popup.contains(e.target) && !e.target.classList.contains('swatch')) {
          closeColorEditor();
        }
      });

      // palDropBtn：新 combobox 下拉触发器（替代旧 savedPalettesTriggerEl）
      const palDropBtnEl = document.getElementById('palDropBtn');
      const savedPaletteOptionsEl = document.getElementById('savedPaletteOptions');
      if (palDropBtnEl && savedPaletteOptionsEl) {
        palDropBtnEl.addEventListener('click', e => {
          e.stopPropagation();
          refreshSavedDropdown();
          const isOpen = savedPaletteOptionsEl.style.display !== 'none';
          savedPaletteOptionsEl.style.display = isOpen ? 'none' : 'block';
        });
        document.addEventListener('click', e => {
          if (!e.target.closest('#savedPaletteOptions') && e.target !== palDropBtnEl)
            savedPaletteOptionsEl.style.display = 'none';
        });
      }

      // Save palette button
      const savePaletteBtnEl = document.getElementById('savePaletteBtn');
      if (savePaletteBtnEl) {
        savePaletteBtnEl.addEventListener('click', () => {
          const nameEl = document.getElementById('paletteName');
          const name = nameEl ? nameEl.value.trim() : '';
          if (!name) { palShowStatus('请输入色卡名称', 'warning'); return; }
          if (currentPalette.length === 0) { palShowStatus('当前色卡为空', 'warning'); return; }
          const saved = getSavedPalettes();
          saved[name] = currentPalette;
          setSavedPalettes(saved);
          selectedPaletteKey = name;
          const trigText = document.getElementById('savedPaletteTriggerText');
          if (trigText) trigText.textContent = `${name}  (${currentPalette.length} 色)`;
          refreshSavedDropdown();
          palShowStatus(`色卡「${name}」已保存`, 'success');
        });
      }

      // 导出下拉按钮（exportDropBtn 开关逻辑）
      const exportDropBtnEl = document.getElementById('exportDropBtn');
      const exportMenuEl = document.getElementById('exportMenu');
      if (exportDropBtnEl && exportMenuEl) {
        exportDropBtnEl.addEventListener('click', e => {
          e.stopPropagation();
          exportMenuEl.style.display = exportMenuEl.style.display === 'none' ? 'block' : 'none';
        });
        document.addEventListener('click', () => { exportMenuEl.style.display = 'none'; });
      }

      // Export buttons（exportAct/Gpl/Pal id 不变，绑定保持不变）
      const exportActEl = document.getElementById('exportAct');
      const exportGplEl = document.getElementById('exportGpl');
      const exportPalEl = document.getElementById('exportPal');
      if (exportActEl) exportActEl.addEventListener('click', () => exportPalette('act'));
      if (exportGplEl) exportGplEl.addEventListener('click', () => exportPalette('gpl'));
      if (exportPalEl) exportPalEl.addEventListener('click', () => exportPalette('pal'));

      // Apply palette button (PAL-02 full implementation)
      const applyPaletteBtnEl = document.getElementById('applyPaletteBtn');
      if (applyPaletteBtnEl) {
        applyPaletteBtnEl.addEventListener('click', applyPalette);
      }

      // Initialize saved palettes dropdown on load
      refreshSavedDropdown();

    });
  </script>
</body>
</html>
