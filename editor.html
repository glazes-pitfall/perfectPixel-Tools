<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PerfectPixel Editor</title>
  <link rel="stylesheet" href="editor/shared.css">
  <link rel="stylesheet" href="editor/editor.css">
</head>
<body>

  <!-- ── Top Bar ──────────────────────────────────────────────────────────── -->
  <header id="top-bar">
    <span style="font-weight:700; font-size:15px;">PerfectPixel Editor</span>

    <!-- Tool settings: shown/hidden by setActiveTool -->
    <div id="tool-settings-pencil" style="display:none; align-items:center; gap:8px;">
      <label style="font-size:12px; color:var(--text-muted);">Size</label>
      <input id="opt-brush-size" type="number" min="1" max="32" value="1"
        style="width:48px; padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
      <label style="font-size:12px; color:var(--text-muted);">Shape</label>
      <select id="opt-brush-shape"
        style="padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
        <option value="round">Round</option>
        <option value="square">Square</option>
      </select>
      <label style="font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input id="opt-pixel-perfect" type="checkbox">Pixel-perfect
      </label>
    </div>

    <div id="tool-settings-eraser" style="display:none; align-items:center; gap:8px;">
      <label style="font-size:12px; color:var(--text-muted);">Size</label>
      <input id="opt-eraser-size" type="number" min="1" max="32" value="1"
        style="width:48px; padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
      <label style="font-size:12px; color:var(--text-muted);">Shape</label>
      <select id="opt-eraser-shape"
        style="padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
        <option value="round">Round</option>
        <option value="square">Square</option>
      </select>
      <label style="font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input id="opt-eraser-pixel-perfect" type="checkbox">Pixel-perfect
      </label>
    </div>

    <div id="tool-settings-bucket" style="display:none; align-items:center; gap:8px;">
      <label style="font-size:12px; color:var(--text-muted);">Tolerance</label>
      <input id="opt-bucket-tolerance" type="number" min="0" max="255" value="15"
        style="width:52px; padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
      <label style="font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input id="opt-contiguous" type="checkbox" checked>Contiguous
      </label>
    </div>

    <div id="tool-settings-wand" style="display:none; align-items:center; gap:8px;">
      <label style="font-size:12px; color:var(--text-muted);">Tolerance</label>
      <input id="opt-wand-tolerance" type="number" min="0" max="255" value="15"
        style="width:52px; padding:3px 6px; border-radius:5px; border:1px solid var(--border);
               background:var(--surface2); color:var(--text); font-size:12px;">
      <label style="font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input id="opt-wand-contiguous" type="checkbox" checked>Contiguous
      </label>
    </div>
    <div id="tool-settings-marquee" style="display:none; align-items:center; gap:8px;">
      <span style="font-size:12px; color:var(--text-muted);">Grid-snapped selection</span>
    </div>
    <div id="tool-settings-move" style="display:none; align-items:center; gap:8px;">
      <span style="font-size:12px; color:var(--text-muted);">X%</span>
      <input id="opt-scale-x" type="number" min="1" max="1600" value="100" style="width:56px; padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
      <button id="btn-scale-link" title="Link X/Y scale" style="padding:2px 7px; font-size:14px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; line-height:1; transition:background .1s,border-color .1s,color .1s;">&#128279;</button>
      <span style="font-size:12px; color:var(--text-muted);">Y%</span>
      <input id="opt-scale-y" type="number" min="1" max="1600" value="100" style="width:56px; padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
      <span style="font-size:12px; color:var(--text-muted);">Angle&#176;</span>
      <input id="opt-rotate-angle" type="number" min="-180" max="180" value="0" style="width:56px; padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
      <button class="btn btn-primary" id="btn-apply-transform" style="padding:4px 10px; font-size:12px;">Apply &#10003;</button>
      <button class="btn btn-ghost"   id="btn-cancel-transform" style="padding:4px 10px; font-size:12px;">Cancel &#10005;</button>
    </div>
    <div id="tool-settings-canvas-size" style="display:none;"></div>
    <button class="btn btn-ghost" id="btn-deselect" style="display:none" title="Deselect (Cmd+D)">Deselect</button>
    <button class="btn btn-ghost" id="btn-inverse"  style="display:none" title="Inverse (Shift+Cmd+I)">Inverse</button>
    <span style="flex:1"></span>
    <!-- Zoom controls -->
    <button class="btn btn-ghost" id="btn-zoom-out" title="Zoom out (Ctrl+-)">&#8722;</button>
    <span id="zoom-display" style="font-size:13px; min-width:36px; text-align:center; font-variant-numeric:tabular-nums;">4x</span>
    <button class="btn btn-ghost" id="btn-zoom-in"  title="Zoom in (Ctrl+=)">+</button>
    <!-- Undo/Redo -->
    <button class="btn btn-ghost" id="btn-undo" disabled title="Undo (Cmd+Z)">&#8617; Undo</button>
    <button class="btn btn-ghost" id="btn-redo" disabled title="Redo (Shift+Cmd+Z)">&#8618; Redo</button>
  </header>

  <!-- ── Main Layout ─────────────────────────────────────────────────────── -->
  <div id="layout">

    <!-- Left Panel -->
    <div id="left-panel">

      <!-- Scrollable area: palette panel -->
      <div id="left-scroll">

        <!-- ── Palette Restriction Panel ── -->
        <div class="palette-section" id="paletteSection">
          <div class="palette-header" id="paletteHeader">
            <span class="title">&#33394;&#21345;&#38480;&#21046;</span>
            <span class="chevron" id="palChevron">&#9660;</span>
          </div>

          <div class="palette-body hidden" id="paletteBody">

            <div class="pal-scroll-area">

              <div>
                <div class="swatches-label">
                  <div style="display:flex;align-items:center;gap:4px;">
                    <span class="section-label" style="margin:0;">&#24403;&#21069;&#33394;&#21345;</span>
                    <span class="swatch-info-icon" title="" data-tooltip="&#21452;&#20987;&#33394;&#22359;&#21487;&#26356;&#25913;&#39068;&#33394;">&#9432;</span>
                  </div>
                  <div style="display:flex;align-items:center;gap:6px;">
                    <span class="swatches-count" id="swatchCount">0 &#33394;</span>
                    <div class="export-dropdown" id="exportDropdown">
                      <button class="btn btn-ghost" id="exportDropBtn" style="font-size:10px;padding:2px 6px;" title="&#23548;&#20986;&#33394;&#21345;">&#23548;&#20986;&#9660;</button>
                      <div class="export-menu" id="exportMenu" style="display:none;">
                        <button class="export-menu-item" id="exportAct">.act</button>
                        <button class="export-menu-item" id="exportGpl">.gpl</button>
                        <button class="export-menu-item" id="exportPal">.pal</button>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="swatches-outer">
                  <div class="swatches-grid" id="swatchesGrid">
                    <span class="swatches-empty">&#33394;&#21345;&#20026;&#31354;</span>
                  </div>
                </div>
              </div>

              <div style="position:relative;">
                <div class="combobox-row">
                  <input type="text" id="paletteName" placeholder="&#26410;&#21629;&#21517;&#33394;&#21345;">
                  <button class="btn btn-ghost combobox-drop-btn" id="palDropBtn" title="&#36873;&#25321;/&#19978;&#20256;&#33394;&#21345;">&#9660;</button>
                  <button class="btn btn-ghost" id="savePaletteBtn" title="&#20445;&#23384;&#33394;&#21345;">&#128190;</button>
                </div>
                <div class="custom-select-options" id="savedPaletteOptions" style="display:none; position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:100;"></div>
                <input type="file" id="palFileInput" accept=".act,.gpl,.pal,.png" style="display:none;">
              </div>

              <div style="display:flex;flex-direction:column;gap:8px;">
                <div class="control-group">
                  <label>&#39068;&#33394;&#25968;&#37327;</label>
                  <div class="slider-row">
                    <input type="range" id="nColors" min="2" max="64" step="1" value="16">
                    <input type="number" id="nColorsInput" class="n-colors-input" value="16" min="1">
                  </div>
                </div>
                <div class="control-group">
                  <label>&#29983;&#25104;&#31639;&#27861;</label>
                  <select id="genAlgorithm" style="padding:4px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
                    <option value="fastoctree">&#24555;&#36895;&#20843;&#21449;&#26641;&#65288;&#40664;&#35748;&#65289;</option>
                    <option value="mediancut">&#20013;&#20540;&#20999;&#21106;</option>
                    <option value="boost">&#35206;&#30422;&#22686;&#24378; &#9733;</option>
                  </select>
                </div>
                <div id="boostParams" class="control-group" style="display:none;">
                  <label>&#22122;&#28857;&#36807;&#28388;&#38408;&#20540;</label>
                  <div class="slider-row">
                    <input type="range" id="minRegionPct" min="0.01" max="5" step="0.01" value="1.0">
                    <input type="number" id="minRegionPctInput" class="n-colors-input" value="1.0" min="0.01" max="100" step="0.01">
                  </div>
                  <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">&#20165;&#20445;&#30041;&#38754;&#31215; &#8805; X% &#30340;&#36830;&#36890;&#33394;&#22359;&#21306;&#22495;</div>
                </div>
                <button class="btn btn-secondary" id="generateBtn" style="width:100%;">&#29983;&#25104;&#33394;&#21345;</button>
              </div>

            </div><!-- /pal-scroll-area -->

            <div class="pal-sticky-bottom">
              <div class="mapping-row">
                <span class="section-label" style="margin:0; white-space:nowrap;">&#26144;&#23556;</span>
                <select id="mappingModeSelect" style="flex:1; padding:4px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
                  <option value="vector">&#21521;&#37327;&#21305;&#37197;&#65288;RGB &#27431;&#27663;&#36317;&#31163;&#65289;</option>
                  <option value="perceptual">&#24863;&#30693;&#21305;&#37197;&#65288;LAB &#33394;&#24425;&#31354;&#38388;&#65289;</option>
                  <option value="swap">&#33394;&#21345;&#26367;&#25442;&#65288;&#37327;&#21270;&#38450;&#25166;&#22534;&#65289;</option>
                </select>
              </div>
              <button class="btn btn-primary" id="applyPaletteBtn" disabled style="width:100%;">&#24212;&#29992;&#33394;&#21345;</button>
            </div>

          </div><!-- /palette-body -->
        </div><!-- /palette-section -->

        <!-- ── Canvas Size Panel ── -->
        <div class="palette-section" id="canvasSizeSection">
          <div class="palette-header" id="canvasSizeHeader">
            <span class="title">&#20462;&#25913;&#30011;&#24067;</span>
            <span class="chevron" id="canvasSizeChevron">&#9660;</span>
          </div>
          <div class="palette-body hidden" id="canvasSizeBody">
            <div style="padding:10px; display:flex; flex-direction:column; gap:10px;">

              <div>
                <div style="font-size:10px; font-weight:700; color:var(--text-muted); letter-spacing:0.4px; margin-bottom:6px;">&#30011;&#24067;&#22823;&#23567;</div>
                <div style="display:flex; align-items:center; gap:4px;">
                  <label style="font-size:11px; color:var(--text-muted); min-width:46px; flex-shrink:0;">Width</label>
                  <input id="cfg-width" type="number" min="1" value="64"
                    style="flex:1; min-width:0; padding:3px 5px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:12px; cursor:ew-resize;">
                  <label style="font-size:11px; color:var(--text-muted); min-width:46px; flex-shrink:0; margin-left:4px;">Height</label>
                  <input id="cfg-height" type="number" min="1" value="64"
                    style="flex:1; min-width:0; padding:3px 5px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:12px; cursor:ew-resize;">
                </div>
              </div>

              <div>
                <div style="font-size:10px; font-weight:700; color:var(--text-muted); letter-spacing:0.4px; margin-bottom:6px;">&#36793;&#30028;&#35843;&#25972;</div>
                <div style="display:flex; flex-direction:column; gap:5px;">
                  <div style="display:flex; align-items:center; gap:4px;">
                    <label style="font-size:11px; color:var(--text-muted); min-width:46px; flex-shrink:0;">Left</label>
                    <input id="cfg-left" type="number" value="0"
                      style="flex:1; min-width:0; padding:3px 5px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:12px; cursor:ew-resize;">
                    <label style="font-size:11px; color:var(--text-muted); min-width:46px; flex-shrink:0; margin-left:4px;">Right</label>
                    <input id="cfg-right" type="number" value="0"
                      style="flex:1; min-width:0; padding:3px 5px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:12px; cursor:ew-resize;">
                  </div>
                  <div style="display:flex; align-items:center; gap:4px;">
                    <label style="font-size:11px; color:var(--text-muted); min-width:46px; flex-shrink:0;">Top</label>
                    <input id="cfg-top" type="number" value="0"
                      style="flex:1; min-width:0; padding:3px 5px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:12px; cursor:ew-resize;">
                    <label style="font-size:11px; color:var(--text-muted); min-width:46px; flex-shrink:0; margin-left:4px;">Bottom</label>
                    <input id="cfg-bottom" type="number" value="0"
                      style="flex:1; min-width:0; padding:3px 5px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:12px; cursor:ew-resize;">
                  </div>
                </div>
              </div>

              <div style="display:flex; gap:6px;">
                <button class="btn btn-primary" id="btn-cfg-apply" style="flex:1; padding:6px 10px; font-size:12px;">&#24212;&#29992; &#10003;</button>
                <button class="btn btn-ghost" id="btn-cfg-restore" style="padding:6px 10px; font-size:12px;">&#36824;&#21407;</button>
              </div>

            </div>
          </div>
        </div><!-- /canvasSizeSection -->

      </div>

      <!-- Color Picker Panel -->
      <div id="color-picker-panel" style="flex-shrink:0; border-top:1px solid var(--border); padding:12px; background:var(--surface);">
        <canvas id="picker-canvas" width="160" height="160"
          style="display:block; margin:0 auto 10px; cursor:crosshair; image-rendering:pixelated;"></canvas>

        <div class="pc-hex-row">
          <span class="pc-hash">#</span>
          <input id="pc-hex" class="pc-hex-input" type="text" maxlength="6" value="000000">
          <button id="pc-copy" class="btn btn-ghost" style="border-radius:0 5px 5px 0; border-left:none; border-color:var(--accent); padding:3px 7px; font-size:11px;" title="Copy hex">&#128203;</button>
        </div>
        <div class="pc-channel-row">
          <span class="pc-channel-label">R</span>
          <div class="pc-channel-bar-wrap">
            <div id="pc-bar-r" class="pc-channel-bar" style="background:#f87171; width:0%;"></div>
          </div>
          <input id="pc-r" class="pc-channel-num" type="number" min="0" max="255" value="0">
        </div>
        <div class="pc-channel-row">
          <span class="pc-channel-label">G</span>
          <div class="pc-channel-bar-wrap">
            <div id="pc-bar-g" class="pc-channel-bar" style="background:#4ade80; width:0%;"></div>
          </div>
          <input id="pc-g" class="pc-channel-num" type="number" min="0" max="255" value="0">
        </div>
        <div class="pc-channel-row">
          <span class="pc-channel-label">B</span>
          <div class="pc-channel-bar-wrap">
            <div id="pc-bar-b" class="pc-channel-bar" style="background:#60a5fa; width:0%;"></div>
          </div>
          <input id="pc-b" class="pc-channel-num" type="number" min="0" max="255" value="0">
        </div>
      </div>

      <!-- Pixel Inspector -->
      <div id="pixel-inspector">
        <div style="font-size:11px; color:var(--text-muted); margin-bottom:4px;">&#20687;&#32032;&#26816;&#26597;&#22120;</div>
        <div style="display:flex; align-items:center; gap:8px;">
          <div id="insp-swatch" style="width:20px;height:20px;border:1px solid var(--border);border-radius:3px;background:#000;flex-shrink:0"></div>
          <div style="display:flex; flex-direction:column; gap:2px; font-size:11px; font-variant-numeric:tabular-nums;">
            <span>X: <span id="insp-x">&#8212;</span>&nbsp; Y: <span id="insp-y">&#8212;</span></span>
            <span>R: <span id="insp-r">&#8212;</span>&nbsp; G: <span id="insp-g">&#8212;</span>&nbsp; B: <span id="insp-b">&#8212;</span>&nbsp; A: <span id="insp-a">&#8212;</span></span>
          </div>
        </div>
      </div>

      <!-- Download trigger button + Home button -->
      <div style="padding:8px 12px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:center;">
        <button id="btn-download-open" class="btn btn-primary"
                style="flex:2; padding:6px 10px; font-size:13px;">&#11015; &#19979;&#36733;</button>
        <button id="btn-go-home" class="btn btn-secondary"
                style="flex:1; padding:6px 6px; font-size:13px;">&#127968; &#20027;&#39029;</button>
      </div>
    </div>

    <!-- Canvas Area -->
    <div id="canvas-area">
      <canvas id="selection-canvas"></canvas>
      <div id="zoom-scroll-content">
        <div id="zoom-scroll-inner">
          <div id="zoom-container">
            <canvas id="pixel-canvas"></canvas>
            <canvas id="cursor-canvas"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Panel (tool strip) -->
    <div id="right-panel">
      <button class="tool-btn" data-tool="marquee"
              data-tip-zh="&#36873;&#26694;" data-tip-en="Marquee" data-tip-key="M"
              data-tip-desc="&#26694;&#36873;&#30697;&#24418;&#21306;&#22495;&#65307;&#32472;&#21046;&#26102;&#38480;&#23450;&#22312;&#36873;&#21306;&#20869;">
        <img src="/icons/Marquee_icon.png" width="28" height="28" alt="&#36873;&#26694; Marquee">
      </button>
      <button class="tool-btn" data-tool="wand"
              data-tip-zh="&#39764;&#26834;" data-tip-en="Wand" data-tip-key="W"
              data-tip-desc="&#25353;&#39068;&#33394;&#33258;&#21160;&#36873;&#21462;&#30456;&#20284;&#20687;&#32032;&#21306;&#22495;">
        <img src="/icons/Wand_icon.png" width="28" height="28" alt="&#39764;&#26834; Wand">
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-tool="move"
              data-tip-zh="&#31227;&#21160;" data-tip-en="Move" data-tip-key="V"
              data-tip-desc="&#25302;&#31227;&#12289;&#32553;&#25918;&#25110;&#26059;&#36716;&#36873;&#21306;&#20869;&#23481;&#65288;&#38656;&#20808;&#26377;&#36873;&#21306;&#65289;">
        <img src="/icons/Move_icon.png" width="28" height="28" alt="&#31227;&#21160; Move">
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-tool="pencil"
              data-tip-zh="&#38085;&#31508;" data-tip-en="Pencil" data-tip-key="B"
              data-tip-desc="&#36880;&#20687;&#32032;&#32472;&#21046;&#65292;&#25903;&#25345;&#31508;&#21047;&#22823;&#23567;&#19982;&#24418;&#29366;">
        <img src="/icons/Pencil_icon.png" width="28" height="28" alt="&#38085;&#31508; Pencil">
      </button>
      <button class="tool-btn" data-tool="bucket"
              data-tip-zh="&#27833;&#28422;&#26742;" data-tip-en="Bucket" data-tip-key="G"
              data-tip-desc="&#22635;&#20805;&#36830;&#32493;&#25110;&#20840;&#23616;&#21516;&#33394;&#21306;&#22495;">
        <img src="/icons/Bucket_icon.png" width="28" height="28" alt="&#27833;&#28422;&#26742; Bucket">
      </button>
      <button class="tool-btn" data-tool="eraser"
              data-tip-zh="&#27233;&#30382;&#25830;" data-tip-en="Eraser" data-tip-key="E"
              data-tip-desc="&#25830;&#38500;&#20687;&#32032;&#20351;&#20854;&#21464;&#20026;&#36879;&#26126;">
        <img src="/icons/Eraser_icon.png" width="28" height="28" alt="&#27233;&#30382;&#25830; Eraser">
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-tool="eyedropper"
              data-tip-zh="&#21560;&#31649;" data-tip-en="Eyedropper" data-tip-key="I"
              data-tip-desc="&#20174;&#30011;&#24067;&#25110;&#23631;&#24149;&#20219;&#24847;&#20301;&#32622;&#21462;&#33394;">
        <img src="/icons/Eyedropper_icon.png" width="28" height="28" alt="&#21560;&#31649; Eyedropper">
      </button>
      <div style="flex:1;"></div>
      <button class="tool-btn" id="help-btn"
              data-tip-zh="&#24110;&#21161;" data-tip-en="Help" data-tip-key="?"
              data-tip-desc="&#26597;&#30475;&#25152;&#26377;&#24555;&#25463;&#38190;">
        <img src="/icons/Help_icon.png" width="28" height="28" alt="&#24110;&#21161; Help">
      </button>
    </div>

    <!-- Instant tooltip for right-panel tool buttons -->
    <div id="tool-tip">
      <div class="tool-tip-name" id="tool-tip-name"></div>
      <div class="tool-tip-desc" id="tool-tip-desc"></div>
    </div>

  </div><!-- /#layout -->

  <!-- Keyboard shortcut help modal -->
  <div id="shortcut-modal" style="display:none; position:fixed; inset:0; z-index:2000;
       background:rgba(0,0,0,.65); backdrop-filter:blur(2px);
       align-items:center; justify-content:center;">
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
         padding:20px 24px; min-width:368px; max-width:552px; max-height:80vh; overflow-y:auto;
         box-shadow:0 8px 32px rgba(0,0,0,.6); position:relative;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <span style="font-size:13px; font-weight:700; color:var(--text);">&#24555;&#25463;&#38190;&#21442;&#32771;</span>
        <button id="help-close-btn" style="background:none; border:none; color:var(--text-muted);
             font-size:18px; cursor:pointer; padding:0 4px; line-height:1;">&#10005;</button>
      </div>
      <div id="shortcut-list"></div>
    </div>
  </div>

  <!-- Color editor popup -->
  <div class="color-popup" id="colorPopup" style="display:none;">
    <div class="popup-title">&#32534;&#36753;&#39068;&#33394;</div>
    <input type="color" id="popupColorPicker">
    <div class="rgb-row">
      <label>R</label><input type="number" id="popupR" min="0" max="255">
      <label>G</label><input type="number" id="popupG" min="0" max="255">
      <label>B</label><input type="number" id="popupB" min="0" max="255">
    </div>
    <div class="hex-row">
      <label>#</label><input type="text" id="popupHex" maxlength="6" placeholder="RRGGBB">
    </div>
    <div class="popup-actions">
      <button class="btn btn-primary" id="popupDone" style="flex:1;">&#23436;&#25104;</button>
      <button class="btn btn-secondary" id="popupDelete" style="flex:1;color:var(--error);">&#21024;&#38500;</button>
    </div>
  </div>

  <div id="transform-distance-label" style="
    position:fixed; display:none; pointer-events:none; z-index:1000;
    font-size:11px; font-family:monospace; color:#e0e0e0;
    background:rgba(0,0,0,0.65); padding:2px 6px; border-radius:4px;
    white-space:nowrap;
  "></div>

  <!-- ── JS modules (load order matters — no ES modules) ─────────────────── -->
  <script src="editor/js/color-utils.js"></script>
  <script src="editor/js/state.js"></script>
  <script src="editor/js/history.js"></script>
  <script src="editor/js/selection.js"></script>
  <script src="editor/js/canvas-render.js"></script>
  <script src="editor/js/palette.js"></script>
  <script src="editor/js/rotsprite.js"></script>
  <script src="editor/js/canvas-size.js"></script>
  <script src="editor/js/tools.js"></script>
  <script src="editor/js/main.js"></script>

<!-- ── Download modal ─────────────────────────────────────────────────── -->
<div id="download-modal" style="display:none; position:fixed; inset:0; z-index:1000;
     background:rgba(0,0,0,.65); align-items:center; justify-content:center;">
  <div style="background:var(--surface); border:1px solid var(--border); border-radius:8px;
              padding:24px; width:360px; max-width:90vw; display:flex; flex-direction:column; gap:16px;
              box-shadow:0 8px 32px rgba(0,0,0,.4);">
    <div style="font-weight:700; font-size:15px; color:var(--text);">&#19979;&#36733;&#22270;&#29255;</div>

    <div style="display:flex; align-items:center; gap:8px;">
      <label style="font-size:12px; color:var(--text-muted); white-space:nowrap;">&#25918;&#22823;&#20493;&#25968;</label>
      <input type="range" id="dl-scale-slider" min="1" max="100" value="1"
             style="flex:1; accent-color:var(--accent);">
      <input type="number" id="dl-scale-num" min="1" max="100" value="1"
             style="width:48px; padding:2px 4px; background:var(--surface2); border:1px solid var(--border);
                    border-radius:3px; color:var(--text); font-size:12px; text-align:center;">
      <span style="font-size:12px; color:var(--text-muted);">&#215;</span>
    </div>

    <div id="dl-preview" style="display:none; text-align:center; background:var(--surface2);
         border-radius:4px; padding:12px; min-height:60px;">
      <img id="dl-preview-img" style="max-width:100%; max-height:240px; image-rendering:pixelated;
           border-radius:4px; display:block; margin:0 auto;">
      <div id="dl-size-info" style="font-size:11px; color:var(--text-muted); margin-top:6px;"></div>
    </div>

    <div style="display:flex; gap:8px; align-items:center; justify-content:flex-end;">
      <button id="dl-btn-cancel" class="btn btn-ghost" style="padding:6px 12px; font-size:13px;">&#21462;&#28040;</button>
      <button id="dl-btn-download" class="btn btn-primary"
              style="font-size:14px; padding:10px 20px; font-weight:700;">&#11015; &#19979;&#36733;</button>
    </div>
  </div>
</div>
</body>
</html>
