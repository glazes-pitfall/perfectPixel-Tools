        el.addEventListener('keydown', e => { if (e.key === 'Enter') applyHexStr(el.value); });
        el.addEventListener('blur', () => applyHexStr(el.value));
      }

      function bindRgbGroup(rId, gId, bId) {
        [rId, gId, bId].forEach(id => {
          const el = document.getElementById(id);
          if (!el) return;
          el.addEventListener('input', () => {
            const rr = Math.max(0, Math.min(255, parseInt(document.getElementById(rId).value) || 0));
            const gg = Math.max(0, Math.min(255, parseInt(document.getElementById(gId).value) || 0));
            const bb = Math.max(0, Math.min(255, parseInt(document.getElementById(bId).value) || 0));
            EditorState.foregroundColor = [rr, gg, bb, 255];
            syncColorUI();
          });
        });
      }

      function bindCopyBtn(btnId) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        btn.addEventListener('click', () => {
          const [r, g, b] = EditorState.foregroundColor;
          const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
          navigator.clipboard.writeText(hex).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = hex;
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          });
        });
      }

      bindHexInput('pc-hex'); bindRgbGroup('pc-r', 'pc-g', 'pc-b'); bindCopyBtn('pc-copy');

      // Style C RGB 数值：支持按住输入框左右拖动来调整数值
      function attachPcChannelDrag(id) {
        const el = document.getElementById(id);
        if (!el) return;
        let startX = 0;
        let startValue = 0;
        const SPEED = 0.5; // 每移动 2px 改变约 1 个数值

        el.addEventListener('pointerdown', e => {
          if (e.button !== 0) return;
          e.preventDefault();
          el.setPointerCapture(e.pointerId);
          startX = e.clientX;
          startValue = parseInt(el.value, 10) || 0;
        });

        el.addEventListener('pointermove', e => {
          if (!el.hasPointerCapture(e.pointerId)) return;
          const dx = e.clientX - startX;
          let next = Math.round(startValue + dx * SPEED);
          next = Math.max(0, Math.min(255, next));
          if (parseInt(el.value, 10) === next) return;
          el.value = next;
          // 从 pc-r / pc-g / pc-b 三个输入框统一读取并应用到前景色
          const rr = Math.max(0, Math.min(255, parseInt(document.getElementById('pc-r').value, 10) || 0));
          const gg = Math.max(0, Math.min(255, parseInt(document.getElementById('pc-g').value, 10) || 0));
          const bb = Math.max(0, Math.min(255, parseInt(document.getElementById('pc-b').value, 10) || 0));
          EditorState.foregroundColor = [rr, gg, bb, 255];
          syncColorUI();
        });

        function endDrag(e) {
          if (el.hasPointerCapture(e.pointerId)) {
            el.releasePointerCapture(e.pointerId);
          }
        }

        el.addEventListener('pointerup', endDrag);
        el.addEventListener('pointercancel', endDrag);
      }

      ['pc-r', 'pc-g', 'pc-b'].forEach(attachPcChannelDrag);

      // 进入页面时立即用当前前景色同步所有 UI（含 HEX 区域描边 / 背景、复制按钮描边，以及色轮 / 调色盘指针）
      syncColorUI();

      // 点击 Style C 的 "#" 前缀时，自动切换到 Eyedropper 工具，方便快速取色
      const pcHashEl = document.querySelector('.pc-hash');
      if (pcHashEl) {
        pcHashEl.addEventListener('click', () => {
          setActiveTool('eyedropper');
        });
      }

      // ── Tool settings UI bindings ─────────────────────────────────────────────

      // Brush size (pencil)
      document.getElementById('opt-brush-size').addEventListener('input', e => {
        EditorState.toolOptions.brushSize = Math.max(1, Math.min(32, parseInt(e.target.value) || 1));
      });
      // Brush shape (pencil)
      document.getElementById('opt-brush-shape').addEventListener('change', e => {
        EditorState.toolOptions.brushShape = e.target.value;
      });
      // Pixel-perfect
      document.getElementById('opt-pixel-perfect').addEventListener('change', e => {
        EditorState.toolOptions.pixelPerfect = e.target.checked;
      });
      // Eraser size
      document.getElementById('opt-eraser-size').addEventListener('input', e => {
        EditorState.toolOptions.brushSize = Math.max(1, Math.min(32, parseInt(e.target.value) || 1));
      });
      // Eraser shape
      document.getElementById('opt-eraser-shape').addEventListener('change', e => {
        EditorState.toolOptions.brushShape = e.target.value;
      });
      // Eraser pixel-perfect
      document.getElementById('opt-eraser-pixel-perfect').addEventListener('change', e => {
        EditorState.toolOptions.eraserPixelPerfect = e.target.checked;
      });
      // Bucket tolerance
      document.getElementById('opt-bucket-tolerance').addEventListener('input', e => {
        EditorState.toolOptions.bucketTolerance = Math.max(0, Math.min(255, parseInt(e.target.value) || 0));
      });
      // Contiguous
      document.getElementById('opt-contiguous').addEventListener('change', e => {
        EditorState.toolOptions.contiguous = e.target.checked;
      });

      // Wand tolerance
      const optWandTol = document.getElementById('opt-wand-tolerance');
      const optWandCont = document.getElementById('opt-wand-contiguous');
      if (optWandTol) optWandTol.addEventListener('input', () => {
        EditorState.toolOptions.wandTolerance = parseInt(optWandTol.value) || 0;
      });
      if (optWandCont) optWandCont.addEventListener('change', () => {
        EditorState.toolOptions.wandContiguous = optWandCont.checked;
      });

      // Deselect and Inverse buttons
      const btnDeselect = document.getElementById('btn-deselect');
      const btnInverse  = document.getElementById('btn-inverse');
      if (btnDeselect) btnDeselect.addEventListener('click', () => clearSelection());
      if (btnInverse)  btnInverse.addEventListener('click', () => invertSelection());

      // ── Pencil tool implementation ────────────────────────────────────────────
      let _pencilStamp = null;
      let _lastPencilX = null, _lastPencilY = null;

      tools.pencil = {
        onDown(x, y) {
          _pencilStamp = getBrushStamp(EditorState.toolOptions.brushSize, EditorState.toolOptions.brushShape);
          resetPixelPerfect();
          _lastPencilX = x; _lastPencilY = y;
          applyStamp(x, y, _pencilStamp, [...EditorState.foregroundColor]);
          _ppHistory.push([x, y]);
          // NO pushHistory here — save-after: push on pointerup
        },
        onMove(x, y) {
          if (_lastPencilX === null) return;
          const pts = bresenhamLine(_lastPencilX, _lastPencilY, x, y);
          // Skip first point (already drawn by onDown or previous onMove)
          for (let i = 1; i < pts.length; i++) {
            const [px, py] = pts[i];
            if (EditorState.toolOptions.pixelPerfect && shouldSkipPixelPerfect(px, py)) continue;
            applyStamp(px, py, _pencilStamp, [...EditorState.foregroundColor]);
          }
          _lastPencilX = x; _lastPencilY = y;
        },
        onUp() {
          pushHistory();  // save-after model: push AFTER stroke completes
          _lastPencilX = null; _lastPencilY = null;
          resetPixelPerfect();
        },
        onCursor(x, y) { drawCursorPreview(x, y, EditorState.foregroundColor); },
      };

      // ── Eraser tool implementation ────────────────────────────────────────────
      let _eraserStamp = null;
      let _lastEraserX = null, _lastEraserY = null;

      tools.eraser = {
        onDown(x, y) {
          _eraserStamp = getBrushStamp(EditorState.toolOptions.brushSize, EditorState.toolOptions.brushShape);
          if (EditorState.toolOptions.eraserPixelPerfect) { resetPixelPerfect(); _ppHistory.push([x, y]); }
          _lastEraserX = x; _lastEraserY = y;
          // alpha MUST be 0 — global color mode constraint
          applyStamp(x, y, _eraserStamp, [0, 0, 0, 0]);
        },
        onMove(x, y) {
          if (_lastEraserX === null) return;
          const pts = bresenhamLine(_lastEraserX, _lastEraserY, x, y);
          for (let i = 1; i < pts.length; i++) {
            const [px, py] = pts[i];
            if (EditorState.toolOptions.eraserPixelPerfect && shouldSkipPixelPerfect(px, py)) continue;
            applyStamp(px, py, _eraserStamp, [0, 0, 0, 0]);
          }
          _lastEraserX = x; _lastEraserY = y;
        },
        onUp() {
          pushHistory();  // save-after
          _lastEraserX = null; _lastEraserY = null;
          if (EditorState.toolOptions.eraserPixelPerfect) resetPixelPerfect();
        },
        onCursor(x, y) {
          // Eraser preview: semi-transparent white to indicate erase (not draw)
          drawCursorPreview(x, y, [200, 200, 200, 128]);
        },
      };

      // Clear cursor preview when pointer leaves canvas
      cursorCanvas.addEventListener('pointerleave', () => { clearCursorPreview(); });

      // ── Paint Bucket tool implementation ─────────────────────────────────────

      tools.bucket = {
        onDown(x, y) {
          pushHistory();  // save-before: push BEFORE fill (bucket is instant-apply)
          floodFill(
            x, y,
            [...EditorState.foregroundColor],  // alpha=255, enforced by color picker
            EditorState.toolOptions.bucketTolerance,
            EditorState.toolOptions.contiguous
          );
        },
        onMove() {},  // bucket has no drag behavior
        onUp() {},
        onCursor(x, y) {
          // 1px foreground-color pixel stamp (fixed size regardless of brush size setting)
          cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
          if (!EditorState.pixels) return;
          const [r, g, b, a] = EditorState.foregroundColor;
          cursorCtx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (a / 255) + ')';
          cursorCtx.fillRect(x, y, 1, 1);
        },
      };

      // ── Eyedropper tool implementation ───────────────────────────────────────
      tools.eyedropper = {
        onDown(x, y) {
          const [r, g, b, a] = getPixel(x, y);
          if (a === 0) {
          // Transparent pixel: do NOT change foreground color
            return;
          }
          EditorState.foregroundColor = [r, g, b, 255];
          syncColorUI();
          // Stay on eyedropper — user picks the next action manually
        },
        onMove() {},
        onUp() {},
        onCursor(x, y) {
          // 仅保留画布上的十字光标预览，颜色反馈交给底部像素检查器
          clearCursorPreview();
        },
      };

      // ── Rectangle Marquee tool implementation ────────────────────────────────

      let _marqueeStartX = null, _marqueeStartY = null;
      let _marqueeCurrentX = null, _marqueeCurrentY = null;

      function _marqueeGetSnappedRect(ax, ay, bx, by) {
        const gW = EditorState.gridW || 1;
        const gH = EditorState.gridH || 1;
        const x0 = snapToGrid(ax, gW), y0 = snapToGrid(ay, gH);
        const x1 = snapToGrid(bx, gW), y1 = snapToGrid(by, gH);
        return {
          rx: Math.min(x0, x1), ry: Math.min(y0, y1),
          rw: Math.abs(x1 - x0), rh: Math.abs(y1 - y0)
        };
      }

      function _marqueeDrawPreview(rx, ry, rw, rh) {
        const dpr = window.devicePixelRatio || 1;
        selCtx.clearRect(0, 0, selCanvas.width, selCanvas.height);
        selCtx.save();
        selCtx.scale(dpr, dpr);
        selCtx.lineWidth = 1;
        selCtx.setLineDash([4, 4]);
        selCtx.strokeStyle = '#ffffff';
        selCtx.lineDashOffset = 0;
        selCtx.strokeRect(rx + 0.5, ry + 0.5, rw, rh);
        selCtx.strokeStyle = '#000000';
        selCtx.lineDashOffset = 4;
        selCtx.strokeRect(rx + 0.5, ry + 0.5, rw, rh);
        selCtx.restore();
      }

      tools.marquee = {
        onDown(x, y, e) {
          // Clear existing selection unless Shift (Shift-union appends)
          if (!e.shiftKey) {
            // Cancel existing ants but don't call clearSelection — we'll set a new one on up
            if (antsRafId) { cancelAnimationFrame(antsRafId); antsRafId = null; }
            selCtx.clearRect(0, 0, selCanvas.width, selCanvas.height);
          }
          _marqueeStartX = x; _marqueeStartY = y;
          _marqueeCurrentX = x; _marqueeCurrentY = y;
        },
        onMove(x, y) {
          if (_marqueeStartX === null) return;
          _marqueeCurrentX = x; _marqueeCurrentY = y;
          const { rx, ry, rw, rh } = _marqueeGetSnappedRect(
            _marqueeStartX, _marqueeStartY, x, y
          );
          if (rw > 0 && rh > 0) _marqueeDrawPreview(rx, ry, rw, rh);
        },
        onUp(x, y, e) {
          if (_marqueeStartX === null) return;
          const { rx, ry, rw, rh } = _marqueeGetSnappedRect(
            _marqueeStartX, _marqueeStartY, x, y
          );
          _marqueeStartX = null; _marqueeCurrentX = null;

          if (rw === 0 || rh === 0) {
            // Zero-size selection: deselect (a click with no drag)
            clearSelection();
            return;
          }

          // Build mask for snapped rectangle
          const W = EditorState.width, H = EditorState.height;
          const newMask = new Uint8Array(W * H);
          for (let py = ry; py < ry + rh; py++) {
            for (let px = rx; px < rx + rw; px++) {
              if (px >= 0 && px < W && py >= 0 && py < H) {
                newMask[px + py * W] = 1;
              }
            }
          }

          // Shift: union with existing mask; no Shift: replace
          const finalMask = e.shiftKey
            ? unionMasks(EditorState.selectionMask, newMask, W * H)
            : newMask;
          const bbox = computeBoundingBox(finalMask, W, H);
          if (bbox) setSelection(finalMask, bbox);
        },
        onCursor(x, y) {
          cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
          // CSS cursor:crosshair handles visual feedback; no canvas drawing needed here
        },
      };

      // ── Magic Wand tool implementation ───────────────────────────────────────

      tools.wand = {
        onDown(x, y, e) {
          if (!EditorState.pixels) return;
          const tolerance = EditorState.toolOptions.wandTolerance;
          const contiguous = EditorState.toolOptions.wandContiguous;
          const result = wandSelect(x, y, tolerance, contiguous);
          if (!result) {
            if (!e.shiftKey) clearSelection();
            return;
          }
          const W = EditorState.width, H = EditorState.height;
          if (e.shiftKey) {
            // Union with existing selection
            const unified = unionMasks(EditorState.selectionMask, result.mask, W * H);
            const bbox = computeBoundingBox(unified, W, H);
            if (bbox) setSelection(unified, bbox);
          } else {
            setSelection(result.mask, result.bbox);
          }
        },
        onMove() {},   // Wand is click-only; no drag behavior
        onUp() {},
        onCursor(x, y) {
          // Crosshair cursor handled via CSS (set in setActiveTool)
          cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
        },
      };

      // ── END Tool dispatch ─────────────────────────────────────────────────────

      // ── Zoom controls (all via applyZoom — scroll-adjusted) ──────────────────
      // canvasArea: receives wheel events (entire area incl. result panel)
      // zoomScrollEl: actual scroll container for canvas pan/zoom
      const canvasArea   = document.getElementById('canvas-area');
      const zoomScrollEl = document.getElementById('zoom-scroll-content');

      // Wheel / trackpad events (passive:false required for preventDefault)
      // Eyedropper: open EyeDropper API when cursor leaves the editor area entirely
      // (moves to left/right sidebar, top bar, or outside the browser window)
      canvasArea.addEventListener('pointerleave', () => {
        if (EditorState.activeTool === 'eyedropper' && window.EyeDropper && !_eyedropperAborter) {
          _eyedropperAborter = new AbortController();
          new window.EyeDropper().open({ signal: _eyedropperAborter.signal })
            .then(result => {
              _eyedropperAborter = null;
              const h = result.sRGBHex.replace('#', '');
              EditorState.foregroundColor = [
                parseInt(h.slice(0, 2), 16),
                parseInt(h.slice(2, 4), 16),
                parseInt(h.slice(4, 6), 16),
                255,
              ];
              syncColorUI();
            })
            .catch(() => { _eyedropperAborter = null; });
        }
      });

      canvasArea.addEventListener('wheel', e => {
        e.preventDefault();

        // Trackpad pinch (and Ctrl+scroll) → zoom
        // Browser synthesizes pinch as wheel event with e.ctrlKey = true
        if (e.ctrlKey) {
          // Trackpad pinch — continuous zoom, factor ≈ 50% of original 1.1
          const factor = e.deltaY < 0 ? 1.05 : 1 / 1.05;
          applyZoom(EditorState.zoom * factor, e.clientX, e.clientY);
          return;
        }

        // Two-finger scroll → pan (translate scroll position)
        // deltaMode 0 = pixels (trackpad), 1 = lines, 2 = pages
        const pixelDeltaX = e.deltaMode === 0 ? e.deltaX : e.deltaX * 20;
        const pixelDeltaY = e.deltaMode === 0 ? e.deltaY : e.deltaY * 20;
        zoomScrollEl.scrollLeft += pixelDeltaX;
        zoomScrollEl.scrollTop  += pixelDeltaY;
        clampScroll(zoomScrollEl);
      }, { passive: false });

      // Top bar Zoom + / - buttons (snap to power-of-2 levels: 0.25/0.5/1/2/4/8/16/32/64)
      document.getElementById('btn-zoom-in').addEventListener('click', () => {
        const rect = zoomScrollEl.getBoundingClientRect();
        applyZoom(snapZoomIn(EditorState.zoom), rect.left + rect.width / 2, rect.top + rect.height / 2);
      });
      document.getElementById('btn-zoom-out').addEventListener('click', () => {
        const rect = zoomScrollEl.getBoundingClientRect();
        applyZoom(snapZoomOut(EditorState.zoom), rect.left + rect.width / 2, rect.top + rect.height / 2);
      });

      // Keyboard zoom (Cmd+= / Cmd+-, snap to power-of-2 levels)
      document.addEventListener('keydown', e => {
        if (e.target.matches('input, textarea')) return;
        if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '+')) {
          e.preventDefault();
          const rect = zoomScrollEl.getBoundingClientRect();
          applyZoom(snapZoomIn(EditorState.zoom), rect.left + rect.width / 2, rect.top + rect.height / 2);
        }
        if ((e.ctrlKey || e.metaKey) && e.key === '-') {
          e.preventDefault();
          const rect = zoomScrollEl.getBoundingClientRect();
          applyZoom(snapZoomOut(EditorState.zoom), rect.left + rect.width / 2, rect.top + rect.height / 2);
        }
        // Undo: Cmd+Z (Mac) or Ctrl+Z
        if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') {
          e.preventDefault();
          undo();
        }
        // Redo: Shift+Cmd+Z (Mac) or Ctrl+Shift+Z
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'z') {
          e.preventDefault();
          redo();
        }
        // Cmd+D → Deselect
        if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'd') {
          e.preventDefault();
          clearSelection();
        }
        // Shift+Cmd+I → Inverse selection
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'i') {
          e.preventDefault();
          invertSelection();
        }
        // Delete → clear selected pixels (fill with transparent)
        if (e.key === 'Delete' && !e.altKey && EditorState.selectionMask) {
          e.preventDefault();
          deleteSelection();
        }
        // Option+Delete (Alt+Backspace on some systems) → fill selected pixels with foreground color
        if ((e.key === 'Delete' || e.key === 'Backspace') && e.altKey && EditorState.selectionMask) {
          e.preventDefault();
          fillSelection();
        }
        // Tool shortcuts (no modifier — guard against text inputs handled above)
        if (!e.ctrlKey && !e.metaKey) {
          if (e.key === 'b' || e.key === 'B') setActiveTool('pencil');
          if (e.key === 'e' || e.key === 'E') setActiveTool('eraser');
          if (e.key === 'g' || e.key === 'G') setActiveTool('bucket');
          if (e.key === 'i' || e.key === 'I') setActiveTool('eyedropper');
          if (e.key === 'm' || e.key === 'M') setActiveTool('marquee');
          if (e.key === 'w' || e.key === 'W') setActiveTool('wand');
        }
        // Eyedropper cancel: Escape restores _prevTool
        if (e.key === 'Escape' && EditorState.activeTool === 'eyedropper') {
          setActiveTool(EditorState._prevTool || 'pencil');
        }
      });

      // ── Palette Panel: DOM event bindings ─────────────────────────────────────

      // paletteHeader click → toggle body visibility + chevron
      const paletteHeader = document.getElementById('paletteHeader');
      const paletteBody   = document.getElementById('paletteBody');
      if (paletteHeader && paletteBody) {
        paletteHeader.addEventListener('click', () => {
          const isOpen = !paletteBody.classList.contains('hidden');
          paletteBody.classList.toggle('hidden', isOpen);
          paletteHeader.classList.toggle('open', !isOpen);
        });
      }

      // paletteEnabled toggle: ON → auto-expand; update applyPaletteBtn gate
      const paletteEnabled = document.getElementById('paletteEnabled');
      if (paletteEnabled) {
        paletteEnabled.addEventListener('change', () => {
          const on = paletteEnabled.checked;
          if (on && paletteBody) {
            paletteBody.classList.remove('hidden');
            if (paletteHeader) paletteHeader.classList.add('open');
          }
          const applyBtn = document.getElementById('applyPaletteBtn');
          if (applyBtn) {
            applyBtn.disabled = !on || !EditorState.pixels || currentPalette.length === 0;
          }
        });
      }

      // Tabs: 自动生成 / 上传色卡
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          const pane = document.getElementById('tab-' + btn.dataset.tab);
          if (pane) pane.classList.add('active');
        });
      });

      // nColors slider ↔ number input sync
      const nColorsSlider = document.getElementById('nColors');
      const nColorsInput  = document.getElementById('nColorsInput');
      if (nColorsSlider && nColorsInput) {
        nColorsSlider.addEventListener('input', () => { nColorsInput.value = nColorsSlider.value; });
        nColorsInput.addEventListener('input', () => {
          const v = parseInt(nColorsInput.value);
          if (!isNaN(v) && v >= 1) nColorsSlider.value = Math.min(64, Math.max(2, v));
        });
      }

      // minRegionPct slider ↔ number input sync
      const minRegPctSlider = document.getElementById('minRegionPct');
      const minRegPctInput  = document.getElementById('minRegionPctInput');
      if (minRegPctSlider && minRegPctInput) {
        minRegPctSlider.addEventListener('input', () => { minRegPctInput.value = parseFloat(minRegPctSlider.value).toFixed(2); });
        minRegPctInput.addEventListener('input', () => {
          const v = parseFloat(minRegPctInput.value);
          if (!isNaN(v) && v >= 0.01) minRegPctSlider.value = Math.min(5, Math.max(0.01, v));
        });
      }

      // genAlgorithm → show/hide boost params
      const genAlgorithmEl = document.getElementById('genAlgorithm');
      const boostParamsEl  = document.getElementById('boostParams');
      if (genAlgorithmEl && boostParamsEl) {
        genAlgorithmEl.addEventListener('change', () => {
          boostParamsEl.style.display = genAlgorithmEl.value === 'boost' ? 'block' : 'none';
        });
      }

      // Generate palette button
      const generateBtn = document.getElementById('generateBtn');
      if (generateBtn) {
        const ALGO_NAMES = { fastoctree: '八叉树', mediancut: '中值切割', boost: '覆盖增强' };
        generateBtn.addEventListener('click', async () => {
          const algo = genAlgorithmEl ? genAlgorithmEl.value : 'fastoctree';
          palShowStatus(`正在生成色卡（${ALGO_NAMES[algo] || algo}）...`);
          const n = nColorsInput ? (parseInt(nColorsInput.value) || 16) : 16;
          const fd = new FormData();
          fd.append('algorithm', algo);
          fd.append('n_colors', n);
          if (algo === 'boost' && minRegPctInput) {
            fd.append('min_region_pct', minRegPctInput.value || '1.0');
          }
          // Use EditorState pixels as base64 if available, else no image available
          if (!EditorState.pixels) {
            palShowStatus('请先加载图像', 'warning'); return;
          }
          // Convert EditorState.pixels to base64 PNG via off-screen canvas
          const offCanvas = document.createElement('canvas');
          offCanvas.width = EditorState.width; offCanvas.height = EditorState.height;
          const offCtx = offCanvas.getContext('2d');
          // PAL-03: 写入前规范化 alpha — alpha >= 128 强制 255，alpha <= 127 清零（避免 Flask IMREAD_COLOR 合成出虚假黑色）
          const src = EditorState.pixels;
          const filtered = new Uint8ClampedArray(src.length);
          for (let i = 0; i < src.length; i += 4) {
            const a = src[i + 3];
            if (a >= 128) {
              filtered[i]   = src[i];
              filtered[i+1] = src[i+1];
              filtered[i+2] = src[i+2];
              filtered[i+3] = 255;
            } else {
              filtered[i] = filtered[i+1] = filtered[i+2] = filtered[i+3] = 0;
            }
          }
          offCtx.putImageData(new ImageData(filtered, EditorState.width, EditorState.height), 0, 0);
          const b64 = offCanvas.toDataURL('image/png').split(',')[1];
          fd.append('image', b64);
          try {
            const res = await fetch('/api/generate-palette', { method: 'POST', body: fd });
            const data = await res.json();
            if (!res.ok) { palShowStatus('生成失败：' + (data.error || ''), 'error'); return; }
            currentPaletteMeta = { name: '', source: 'generate', algorithm: algo, count: data.count };
            setCurrentPalette(data.palette);
            palShowStatus(`色卡已生成：${data.count} 色（${ALGO_NAMES[algo] || algo}）`, 'success');
          } catch (err) {
            palShowStatus('生成色卡失败：' + err.message, 'error');
          }
        });
      }

      // Palette file upload
      const palFileInputEl = document.getElementById('palFileInput');
      const palUploadZoneEl = document.getElementById('palUploadZone');
      if (palFileInputEl) {
        palFileInputEl.addEventListener('change', async () => {
          const file = palFileInputEl.files[0];
          if (file) await uploadPaletteFile(file);
        });
      }
      if (palUploadZoneEl) {
        palUploadZoneEl.addEventListener('dragover', e => { e.preventDefault(); palUploadZoneEl.classList.add('dragover'); });
        palUploadZoneEl.addEventListener('dragleave', () => palUploadZoneEl.classList.remove('dragover'));
        palUploadZoneEl.addEventListener('drop', async e => {
          e.preventDefault(); palUploadZoneEl.classList.remove('dragover');
          const file = e.dataTransfer.files[0];
          if (file) await uploadPaletteFile(file);
        });
      }

      // Add color button
      const addColorBtnEl = document.getElementById('addColorBtn');
      if (addColorBtnEl) {
        addColorBtnEl.addEventListener('click', () => {
          currentPalette.push([128, 128, 128]);
          EditorState.palette = currentPalette.slice();
          renderSwatches();
          const lastSwatch = document.getElementById('swatchesGrid').lastElementChild;
          if (lastSwatch) openColorEditor(currentPalette.length - 1, lastSwatch);
        });
      }

      // Color popup event bindings
      const popupColorPickerEl = document.getElementById('popupColorPicker');
      const popupREl = document.getElementById('popupR');
      const popupGEl = document.getElementById('popupG');
      const popupBEl = document.getElementById('popupB');
      const popupHexEl = document.getElementById('popupHex');
      const popupDoneEl = document.getElementById('popupDone');
      const popupDeleteEl = document.getElementById('popupDelete');
      if (popupColorPickerEl) popupColorPickerEl.addEventListener('input', _popupSyncFromPicker);
      if (popupREl) popupREl.addEventListener('input', _popupSyncFromRgb);
      if (popupGEl) popupGEl.addEventListener('input', _popupSyncFromRgb);
      if (popupBEl) popupBEl.addEventListener('input', _popupSyncFromRgb);
      if (popupHexEl) popupHexEl.addEventListener('input', _popupSyncFromHex);
      if (popupDoneEl) popupDoneEl.addEventListener('click', closeColorEditor);
      if (popupDeleteEl) popupDeleteEl.addEventListener('click', () => {
        if (editingSwatchIdx !== null) deleteSwatch(editingSwatchIdx);
      });

      // Close popup on outside click
      document.addEventListener('click', e => {
        const popup = document.getElementById('colorPopup');
        if (popup && !popup.contains(e.target) && !e.target.classList.contains('swatch')) {
          closeColorEditor();
        }
      });

      // Saved palettes dropdown
      const savedPalettesTriggerEl = document.getElementById('savedPaletteTrigger');
      const savedPalettesDropdownEl = document.getElementById('savedPalettesDropdown');
      if (savedPalettesTriggerEl && savedPalettesDropdownEl) {
        savedPalettesTriggerEl.addEventListener('click', e => {
          e.stopPropagation();
          savedPalettesDropdownEl.classList.toggle('open');
        });
        document.addEventListener('click', e => {
          if (!savedPalettesDropdownEl.contains(e.target)) {
            savedPalettesDropdownEl.classList.remove('open');
          }
        });
      }

      // Save palette button
      const savePaletteBtnEl = document.getElementById('savePaletteBtn');
      if (savePaletteBtnEl) {
        savePaletteBtnEl.addEventListener('click', () => {
          const nameEl = document.getElementById('paletteName');
          const name = nameEl ? nameEl.value.trim() : '';
          if (!name) { palShowStatus('请输入色卡名称', 'warning'); return; }
          if (currentPalette.length === 0) { palShowStatus('当前色卡为空', 'warning'); return; }
          const saved = getSavedPalettes();
          saved[name] = currentPalette;
          setSavedPalettes(saved);
          selectedPaletteKey = name;
          const trigText = document.getElementById('savedPaletteTriggerText');
          if (trigText) trigText.textContent = `${name}  (${currentPalette.length} 色)`;
          refreshSavedDropdown();
          palShowStatus(`色卡「${name}」已保存`, 'success');
        });
      }

      // Load palette button
      const loadPaletteBtnEl = document.getElementById('loadPaletteBtn');
      if (loadPaletteBtnEl) {
        loadPaletteBtnEl.addEventListener('click', () => {
          if (!selectedPaletteKey) { palShowStatus('请先选择一个已保存的色卡', 'warning'); return; }
          const saved = getSavedPalettes();
          if (!saved[selectedPaletteKey]) { palShowStatus('找不到该色卡', 'error'); return; }
          currentPaletteMeta = { name: selectedPaletteKey, source: 'upload', algorithm: '', count: saved[selectedPaletteKey].length };
          setCurrentPalette(saved[selectedPaletteKey]);
          const paletteNameEl = document.getElementById('paletteName');
          if (paletteNameEl) paletteNameEl.value = selectedPaletteKey;
          palShowStatus(`已加载色卡「${selectedPaletteKey}」：${saved[selectedPaletteKey].length} 色`, 'success');
        });
      }

      // Delete palette button
      const deletePaletteBtnEl = document.getElementById('deletePaletteBtn');
      if (deletePaletteBtnEl) {
        deletePaletteBtnEl.addEventListener('click', () => {
          if (!selectedPaletteKey) { palShowStatus('请先选择一个色卡', 'warning'); return; }
          const saved = getSavedPalettes();
          const name = selectedPaletteKey;
          delete saved[name];
          setSavedPalettes(saved);
          selectedPaletteKey = '';
          const trigText = document.getElementById('savedPaletteTriggerText');
          if (trigText) trigText.textContent = '— 选择已保存色卡 —';
          refreshSavedDropdown();
          palShowStatus(`已删除色卡「${name}」`, 'success');
        });
      }

      // Export buttons
      const exportActEl = document.getElementById('exportAct');
      const exportGplEl = document.getElementById('exportGpl');
      const exportPalEl = document.getElementById('exportPal');
      if (exportActEl) exportActEl.addEventListener('click', () => exportPalette('act'));
      if (exportGplEl) exportGplEl.addEventListener('click', () => exportPalette('gpl'));
      if (exportPalEl) exportPalEl.addEventListener('click', () => exportPalette('pal'));

      // Apply palette button (PAL-02 full implementation)
      const applyPaletteBtnEl = document.getElementById('applyPaletteBtn');
      if (applyPaletteBtnEl) {
        applyPaletteBtnEl.addEventListener('click', applyPalette);
      }

      // Initialize saved palettes dropdown on load
      refreshSavedDropdown();

    });
  </script>
</body>
</html>
