<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PerfectPixel Editor</title>
  <style>
    /* ── CSS Variables (copied verbatim from web_ui.html) ────────────────── */
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --accent: #7c6af7;
      --accent-hover: #9080ff;
      --text: #e8e6f0;
      --text-muted: #7a7890;
      --success: #4ade80;
      --error: #f87171;
      --warning: #fbbf24;
      --radius: 10px;
    }

    /* ── Reset ────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    /* ── Button styles (copied verbatim from web_ui.html) ─────────────────── */
    .btn { padding: 8px 12px; border-radius: 7px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s, opacity .2s; white-space: nowrap; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 5px 9px; font-size: 12px; }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

    /* ── Top Bar ──────────────────────────────────────────────────────────── */
    #top-bar {
      flex-shrink: 0;
      height: 44px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    /* ── Main Layout (CSS Grid) ───────────────────────────────────────────── */
    #layout {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr 48px;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Left Panel ───────────────────────────────────────────────────────── */
    #left-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }

    #left-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #left-scroll > * { flex-shrink: 0; }

    /* Custom scrollbar to match dark theme */
    #left-scroll::-webkit-scrollbar { width: 6px; }
    #left-scroll::-webkit-scrollbar-track { background: transparent; }
    #left-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    #left-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    #pixel-inspector {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      background: var(--surface);
      font-size: 12px;
    }

    /* ── Panel card (used for collapsible sections) ───────────────────────── */
    .panel-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface2);
    }

    /* ── Canvas Area ──────────────────────────────────────────────────────── */
    #canvas-area {
      display: flex;
      flex-direction: row;
      overflow: hidden;
      background: var(--bg);
    }

    /* Zoom scroll content fills remaining space, scrolls independently */
    #zoom-scroll-content {
      flex: 1;
      overflow: auto;
    }

    /* Scroll content element — sized by centerCanvas to create the scrollable area */
    #zoom-scroll-inner {
      position: relative;
    }

    /* Custom scrollbar for zoom-scroll-content */
    #zoom-scroll-content::-webkit-scrollbar { width: 8px; height: 8px; }
    #zoom-scroll-content::-webkit-scrollbar-track { background: var(--surface); }
    #zoom-scroll-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    #zoom-scroll-content::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    #zoom-scroll-content::-webkit-scrollbar-corner { background: var(--surface); }

    /* ── Zoom container (CSS transform target; contains 3-canvas stack) ────── */
    #zoom-container {
      position: absolute;
      transform-origin: top left;
      /* Checkerboard background — scales with CSS transform (16px canvas-pixels per cell at zoom=1) */
      background-color: var(--surface2);
      background-image:
        linear-gradient(45deg, var(--surface) 25%, transparent 25%),
        linear-gradient(-45deg, var(--surface) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--surface) 75%),
        linear-gradient(-45deg, transparent 75%, var(--surface) 75%);
      background-size: 32px 32px;
      background-position: 0 0, 0 16px, 16px -16px, -16px 0px;
    }

    /* Eyedropper mode: force crosshair everywhere (overrides button cursors etc.) */
    body.eyedropper-active, body.eyedropper-active * { cursor: crosshair !important; }

    /* ── Canvas elements: pixel-perfect rendering ─────────────────────────── */
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges; /* Firefox compat */
      display: block;
    }

    /* Three canvas layers stacked absolutely inside zoom-container */
    #pixel-canvas,
    #selection-canvas,
    #cursor-canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
    #pixel-canvas     { z-index: 1; }
    #selection-canvas { z-index: 2; }
    #cursor-canvas    { z-index: 3; cursor: crosshair; }

    /* ── Right Panel (tool strip) ─────────────────────────────────────────── */
    #right-panel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 4px;
      background: var(--surface);
    }

    .tool-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tool-btn:disabled { opacity: .3; cursor: not-allowed; }

    .tool-sep {
      width: 28px;
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }
    .tool-btn-active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Top-bar tool settings inputs ────────────────────────────────────────── */
    #top-bar input[type=number], #top-bar select {
      padding: 3px 6px; border-radius: 5px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: 12px;
    }
    #top-bar input[type=number]:focus, #top-bar select:focus {
      outline: none; border-color: var(--accent);
    }

    /* ── Palette section (ported from web_ui.html) ───────────────────────────── */
    .palette-section { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .palette-header {
      padding: 9px 12px; background: var(--surface2);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .palette-header .title { font-size: 12px; font-weight: 700; }
    .palette-header .chevron { font-size: 10px; color: var(--text-muted); transition: transform .2s; }
    .palette-header.open .chevron { transform: rotate(180deg); }
    .palette-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .palette-body.hidden { display: none; }

    /* Toggle switch */
    .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer; transition: background .2s;
    }
    .toggle-track::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--text-muted); transition: transform .2s, background .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); background: #fff; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; }
    .tab-btn {
      flex: 1; padding: 6px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Palette file upload zone */
    .pal-upload-zone {
      border: 2px dashed var(--border); border-radius: 7px;
      padding: 14px 10px; text-align: center; cursor: pointer;
      position: relative; transition: border-color .2s, background .2s;
      font-size: 12px; color: var(--text-muted);
    }
    .pal-upload-zone:hover, .pal-upload-zone.dragover { border-color: var(--accent); background: rgba(124,106,247,.06); }
    .pal-upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* Swatches — outer wrapper prevents glow clipping */
    .swatches-outer { max-height: 140px; overflow-y: auto; }
    .swatches-label { display: flex; align-items: center; justify-content: space-between; }
    .swatches-count { font-size: 11px; color: var(--text-muted); }
    .swatches-grid {
      display: flex; flex-wrap: wrap; gap: 4px;
      padding: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      overflow: visible;
    }
    .swatch {
      width: 28px; height: 28px; border-radius: 4px; cursor: pointer;
      border: 2px solid transparent; position: relative; flex-shrink: 0;
      transition: transform .1s, border-color .1s;
    }
    .swatch:hover { transform: scale(1.15); border-color: rgba(255,255,255,.5); z-index: 2; }
    .swatch .del-btn {
      display: none; position: absolute; top: -5px; right: -5px;
      width: 14px; height: 14px; border-radius: 50%; background: var(--error); color: #fff;
      font-size: 9px; font-weight: 900; align-items: center; justify-content: center;
      cursor: pointer; border: none; line-height: 1;
    }
    .swatch:hover .del-btn { display: flex; }
    .swatches-empty { color: var(--text-muted); font-size: 12px; padding: 8px; text-align: center; }

    /* Color editor popup */
    .color-popup {
      position: fixed; z-index: 999; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; display: flex; flex-direction: column; gap: 9px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5); min-width: 200px;
    }
    .color-popup .popup-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .color-popup input[type=color] { width: 100%; height: 36px; border: none; border-radius: 6px; cursor: pointer; padding: 2px; background: var(--surface2); }
    .color-popup .rgb-row { display: flex; gap: 5px; align-items: center; }
    .color-popup .rgb-row label { font-size: 11px; color: var(--text-muted); width: 12px; flex-shrink: 0; }
    .color-popup .rgb-row input { padding: 4px 6px; font-size: 12px; }
    .color-popup .hex-row { display: flex; gap: 5px; align-items: center; }
    .color-popup .hex-row label { font-size: 11px; color: var(--text-muted); }
    .color-popup .hex-row input { font-family: monospace; font-size: 12px; padding: 4px 6px; }
    .color-popup .popup-actions { display: flex; gap: 6px; }

    /* Save/load */
    .save-row { display: flex; gap: 6px; }
    .save-row input { flex: 1; }

    /* Custom dropdown for saved palettes */
    .custom-select { position: relative; }
    .custom-select-trigger {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 6px 9px; font-size: 13px;
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      user-select: none; transition: border-color .2s;
    }
    .custom-select-trigger:hover { border-color: var(--accent); }
    .custom-select.open .custom-select-trigger { border-color: var(--accent); }
    .custom-select-trigger .caret { font-size: 9px; color: var(--text-muted); transition: transform .2s; }
    .custom-select.open .caret { transform: rotate(180deg); }
    .custom-select-options {
      display: none; position: absolute; z-index: 200; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      max-height: 280px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }
    .custom-select.open .custom-select-options { display: block; }
    .custom-option {
      padding: 8px 12px; cursor: pointer; transition: background .1s; border-bottom: 1px solid var(--border);
    }
    .custom-option:last-child { border-bottom: none; }
    .custom-option:hover { background: rgba(124,106,247,.1); }
    .custom-option.selected { background: rgba(124,106,247,.15); }
    .custom-option-empty { padding: 10px 12px; color: var(--text-muted); font-size: 12px; text-align: center; }
    .option-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
    .option-swatches { display: flex; flex-wrap: wrap; gap: 2px; }
    .option-swatches span { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

    /* Export */
    .export-row { display: flex; gap: 5px; }
    .export-row .btn { flex: 1; font-size: 11px; padding: 6px 4px; }

    /* Mapping modes */
    .mode-group { display: flex; flex-direction: column; gap: 5px; }
    .mode-option {
      display: flex; align-items: flex-start; gap: 7px; cursor: pointer;
      padding: 5px 7px; border-radius: 6px; border: 1px solid transparent; transition: border-color .15s;
    }
    .mode-option:has(input:checked) { border-color: var(--accent); background: rgba(124,106,247,.06); }
    .mode-option input[type=radio] { accent-color: var(--accent); margin-top: 1px; cursor: pointer; flex-shrink: 0; }
    .mode-option .mode-label { font-size: 12px; font-weight: 600; }
    .mode-option .mode-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    /* section-label (sub-heading within palette body) */
    .section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }

    /* control-group / slider-row for nColors / minRegionPct */
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    .control-group label { font-size: 12px; color: var(--text-muted); }
    .slider-row { display: flex; gap: 6px; align-items: center; }
    .slider-row input[type=range] { flex: 1; accent-color: var(--accent); }
    .n-colors-input { width: 52px; padding: 3px 6px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; }

    /* Generic text input styling within palette body */
    .palette-body input[type=text] {
      padding: 6px 9px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-size: 13px; width: 100%;
    }
    .palette-body input[type=text]:focus { outline: none; border-color: var(--accent); }

    /* ── Color Picker ────────────────────────────────────────────────────────── */
    .pc-hex-row { display:flex; align-items:stretch; margin-bottom:10px; }
    .pc-hash { display:flex; align-items:center; padding:0 9px; background:var(--accent); color:#fff; font-size:14px; font-weight:700; border-radius:5px 0 0 5px; flex-shrink:0; cursor:pointer; }
    .pc-hex-input { flex:1; padding:5px 8px; border:1px solid var(--accent); border-left:none; background:var(--surface2); color:var(--text); font-size:13px; font-family:monospace; font-weight:600; outline:none; min-width:0; }
    .pc-hex-input:focus { border-color:var(--accent-hover); }
    .pc-channel-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .pc-channel-label { font-size:10px; font-family:monospace; color:var(--text-muted); min-width:10px; }
    .pc-channel-bar-wrap { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .pc-channel-bar { height:4px; border-radius:2px; transition:width .08s; }
    .pc-channel-num { width:36px; padding:2px 4px; border:1px solid var(--border); border-radius:4px; background:var(--surface2); color:var(--text); font-size:11px; font-family:monospace; text-align:center; outline:none; }
    .pc-channel-num:focus { border-color:var(--accent); }
    /* 去掉 Style C RGB 数值输入框的原生上下箭头，配合左右拖动交互 */
    .pc-channel-num::-webkit-outer-spin-button,
    .pc-channel-num::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .pc-channel-num[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body>

  <!-- ── Top Bar ──────────────────────────────────────────────────────────── -->
  <header id="top-bar">
    <span style="font-weight:700; font-size:15px;">PerfectPixel Editor</span>

    <!-- Tool settings: shown/hidden by setActiveTool -->
    <div id="tool-settings-pencil" style="display:none; align-items:center; gap:8px;">
      <label style="font-size:12px; color:var(--text-muted);">Size</label>
      <input id="opt-brush-size" type="number" min="1" max="32" value="1"
        style="width:48px; padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
      <label style="font-size:12px; color:var(--text-muted);">Shape</label>
      <select id="opt-brush-shape"
        style="padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
        <option value="round">Round</option>
        <option value="square">Square</option>
      </select>
      <label style="font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input id="opt-pixel-perfect" type="checkbox">Pixel-perfect
      </label>
    </div>

    <div id="tool-settings-eraser" style="display:none; align-items:center; gap:8px;">
      <label style="font-size:12px; color:var(--text-muted);">Size</label>
      <input id="opt-eraser-size" type="number" min="1" max="32" value="1"
        style="width:48px; padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
      <label style="font-size:12px; color:var(--text-muted);">Shape</label>
      <select id="opt-eraser-shape"
        style="padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
        <option value="round">Round</option>
        <option value="square">Square</option>
      </select>
      <label style="font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input id="opt-eraser-pixel-perfect" type="checkbox">Pixel-perfect
      </label>
    </div>

    <div id="tool-settings-bucket" style="display:none; align-items:center; gap:8px;">
      <label style="font-size:12px; color:var(--text-muted);">Tolerance</label>
      <input id="opt-bucket-tolerance" type="number" min="0" max="255" value="15"
        style="width:52px; padding:3px 6px; border-radius:5px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:12px;">
      <label style="font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input id="opt-contiguous" type="checkbox" checked>Contiguous
      </label>
    </div>

    <div id="tool-settings-wand" style="display:none; align-items:center; gap:8px;">
      <label style="font-size:12px; color:var(--text-muted);">Tolerance</label>
      <input id="opt-wand-tolerance" type="number" min="0" max="255" value="15"
        style="width:52px; padding:3px 6px; border-radius:5px; border:1px solid var(--border);
               background:var(--surface2); color:var(--text); font-size:12px;">
      <label style="font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer;">
        <input id="opt-wand-contiguous" type="checkbox" checked>Contiguous
      </label>
    </div>
    <div id="tool-settings-marquee" style="display:none; align-items:center; gap:8px;">
      <span style="font-size:12px; color:var(--text-muted);">Grid-snapped selection</span>
    </div>
    <button class="btn btn-ghost" id="btn-deselect" style="display:none" title="Deselect (Cmd+D)">Deselect</button>
    <button class="btn btn-ghost" id="btn-inverse"  style="display:none" title="Inverse (Shift+Cmd+I)">Inverse</button>
    <span style="flex:1"></span>
    <!-- Zoom controls (ACTIVE in Phase 1) -->
    <button class="btn btn-ghost" id="btn-zoom-out" title="Zoom out (Ctrl+-)">−</button>
    <span id="zoom-display" style="font-size:13px; min-width:36px; text-align:center; font-variant-numeric:tabular-nums;">4x</span>
    <button class="btn btn-ghost" id="btn-zoom-in"  title="Zoom in (Ctrl+=)">+</button>
    <!-- Undo/Redo (managed by updateHistoryButtons()) -->
    <button class="btn btn-ghost" id="btn-undo" disabled title="Undo (Cmd+Z)">↩ Undo</button>
    <button class="btn btn-ghost" id="btn-redo" disabled title="Redo (Shift+Cmd+Z)">↪ Redo</button>
  </header>

  <!-- ── Main Layout ─────────────────────────────────────────────────────── -->
  <div id="layout">

    <!-- Left Panel -->
    <div id="left-panel">

      <!-- Scrollable area: palette panel (ported from web_ui.html) -->
      <div id="left-scroll">

        <!-- ── 色卡限制 (Palette Restriction) Panel ── -->
        <div class="palette-section" id="paletteSection">
          <div class="palette-header" id="paletteHeader">
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="title">色卡限制</span>
              <label class="toggle-switch" onclick="event.stopPropagation()">
                <input type="checkbox" id="paletteEnabled">
                <div class="toggle-track"></div>
              </label>
            </div>
            <span class="chevron">▼</span>
          </div>

          <div class="palette-body hidden" id="paletteBody">

            <!-- Tabs: generate / upload -->
            <div class="tabs">
              <button class="tab-btn active" data-tab="generate">自动生成</button>

    <!-- Right Panel (tool strip — disabled in Phase 1) -->

      <button class="tool-btn" data-tool="bucket" title="Bucket (G)">&#9776;</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-tool="eraser" title="Eraser (E)">&#9633;</button>

  </div><!-- /#layout -->

  <!-- Color editor popup (position:fixed; z-index:999 — above all canvas layers) -->
  <div class="color-popup" id="colorPopup" style="display:none;">
    <div class="popup-title">编辑颜色</div>
    <input type="color" id="popupColorPicker">
    <div class="rgb-row">
      <label>R</label><input type="number" id="popupR" min="0" max="255">
      <label>G</label><input type="number" id="popupG" min="0" max="255">
      <label>B</label><input type="number" id="popupB" min="0" max="255">
    </div>
    <div class="hex-row">
      <label>#</label><input type="text" id="popupHex" maxlength="6" placeholder="RRGGBB">
    </div>
    <div class="popup-actions">
      <button class="btn btn-primary" id="popupDone" style="flex:1;">完成</button>
      <button class="btn btn-secondary" id="popupDelete" style="flex:1;color:var(--error);">删除</button>
    </div>
  </div>

  <script>
    // ── Color Utilities (HSL <-> RGB, no external library) ────────────────────
    function hslToRgb(h, s, l) {
      s /= 100; l /= 100;
      const k = n => (n + h / 30) % 12;
      const a = s * Math.min(l, 1 - l);
      const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
      return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
    }

    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      const l = (max + min) / 2;
      if (max === min) return [0, 0, Math.round(l * 100)];
      const d = max - min;
      const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      let h;
      if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
      else if (max === g) h = ((b - r) / d + 2) / 6;
      else h = ((r - g) / d + 4) / 6;
      return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
    }

    // ── Hex <-> RGB utilities (used by palette panel) ─────────────────────────
    function rgbToHex(r, g, b) {
      return [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    }
    function hexToRgb(hex) {
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const n = parseInt(hex, 16);
      return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }

    // ── Color Picker State ────────────────────────────────────────────────────
    let pickerCanvas = null, pickerCtx = null;
    let currentHue = 0, currentSat = 0, currentLit = 0;
    const PICKER_CX = 80, PICKER_CY = 80;
    const RING_OUTER = 75, RING_INNER = 55;
    const SQ_X = 41, SQ_Y = 41, SQ_W = 78, SQ_H = 78;
    let _pickerDragZone = null;  // 'ring' | 'square' | null
    let _slCursorX = 0, _slCursorY = 0;  // visual indicator position (0–1 each; x=sat, y=1-lit)
    let _syncFromDrag = false;  // true while handlePickerDrag is calling syncColorUI

    function drawHueRing(ctx) {
      const grad = ctx.createConicGradient(-Math.PI / 2, PICKER_CX, PICKER_CY);
      const stops = [
        [0, '#ff0000'], [1/6, '#ffff00'], [2/6, '#00ff00'],
        [3/6, '#00ffff'], [4/6, '#0000ff'], [5/6, '#ff00ff'], [1, '#ff0000']
      ];
      stops.forEach(([pos, color]) => grad.addColorStop(pos, color));
      ctx.beginPath();
      ctx.arc(PICKER_CX, PICKER_CY, RING_OUTER, 0, 2 * Math.PI);
      ctx.arc(PICKER_CX, PICKER_CY, RING_INNER, 0, 2 * Math.PI, true);
      ctx.fillStyle = grad;
      ctx.fill('evenodd');
    }

    function drawSLSquare(ctx) {
      // Pass 1: saturation gradient (gray left -> pure hue right)
      const satGrad = ctx.createLinearGradient(SQ_X, SQ_Y, SQ_X + SQ_W, SQ_Y);
      satGrad.addColorStop(0, 'hsl(' + currentHue + ', 0%, 50%)');
      satGrad.addColorStop(1, 'hsl(' + currentHue + ', 100%, 50%)');
      ctx.fillStyle = satGrad;
      ctx.fillRect(SQ_X, SQ_Y, SQ_W, SQ_H);
      // Pass 2: lightness overlay (white top -> transparent -> black bottom)
      const litGrad = ctx.createLinearGradient(SQ_X, SQ_Y, SQ_X, SQ_Y + SQ_H);
      litGrad.addColorStop(0, 'rgba(255,255,255,1)');
      litGrad.addColorStop(0.5, 'rgba(255,255,255,0)');
      litGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
      litGrad.addColorStop(1, 'rgba(0,0,0,1)');
      ctx.fillStyle = litGrad;
      ctx.fillRect(SQ_X, SQ_Y, SQ_W, SQ_H);
    }

    function drawPickerIndicators(ctx) {
      // Ring indicator: small circle on hue ring at currentHue angle
      const ringR = (RING_OUTER + RING_INNER) / 2;
      const hueRad = (currentHue - 90) * Math.PI / 180;
      const rx = PICKER_CX + ringR * Math.cos(hueRad);
      const ry = PICKER_CY + ringR * Math.sin(hueRad);
      ctx.beginPath();
      ctx.arc(rx, ry, 5, 0, 2 * Math.PI);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();

      // SL square indicator: use raw drag position, not recomputed sat/lit
      const sx = SQ_X + _slCursorX * SQ_W;
      const sy = SQ_Y + _slCursorY * SQ_H;
      ctx.beginPath();
      ctx.arc(sx, sy, 5, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    function redrawPicker() {
      if (!pickerCtx) return;
      pickerCtx.clearRect(0, 0, 160, 160);
      drawHueRing(pickerCtx);
      drawSLSquare(pickerCtx);
      drawPickerIndicators(pickerCtx);
    }

    // ── syncColorUI — updates all 3 panel styles; _syncLock prevents loops ────
    let _syncLock = false;
    function syncColorUI() {
      if (_syncLock) return;
      _syncLock = true;
      const [r, g, b] = EditorState.foregroundColor;
      const hex   = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
      const hexNH = hex.slice(1);  // 6-digit without '#'
      const rgb   = 'rgb(' + r + ',' + g + ',' + b + ')';

      // Style C
      const pcH = document.getElementById('pc-hex');
      if (pcH) {
        pcH.value = hexNH;
        // HEX 输入框：描边与基础底色跟随当前前景色
        pcH.style.borderColor = rgb;
        pcH.style.background = 'rgba(' + r + ',' + g + ',' + b + ',0.15)';
      }
      const pcR = document.getElementById('pc-r');      if (pcR) pcR.value = r;
      const pcG = document.getElementById('pc-g');      if (pcG) pcG.value = g;
      const pcB = document.getElementById('pc-b');      if (pcB) pcB.value = b;
      const brR = document.getElementById('pc-bar-r');  if (brR) brR.style.width = (r / 255 * 100).toFixed(1) + '%';
      const brG = document.getElementById('pc-bar-g');  if (brG) brG.style.width = (g / 255 * 100).toFixed(1) + '%';
      const brB = document.getElementById('pc-bar-b');  if (brB) brB.style.width = (b / 255 * 100).toFixed(1) + '%';
      // "#" 前缀跟随当前前景色，而不是固定主题色
      const pcHash = document.querySelector('.pc-hash');
      if (pcHash) {
        pcHash.style.background = rgb;
      }
      const pcCopy = document.getElementById('pc-copy');
      if (pcCopy) {
        pcCopy.style.borderColor = rgb;
      }

      // Update HSL state and redraw picker wheel
      const [h, s, l] = rgbToHsl(r, g, b);
      currentLit = l;
      if (!_syncFromDrag) {
        // External change: update cursor to canonical position.
        // Preserve hue at pure white/black (achromatic — no hue information there).
        if (l > 0 && l < 100) {
          currentHue = h;
          currentSat = s;
          _slCursorX = currentSat / 100;
        }
        _slCursorY = 1 - currentLit / 100;
      }
      // When _syncFromDrag: _slCursorX/Y, currentHue, currentSat already set by drag
      redrawPicker();
      _syncLock = false;
      highlightMatchingSwatches(); // PAL-02: 每次颜色变化后刷新高亮
    }

    // ── PAL-02: Highlight matching swatches ───────────────────────────────────
    // Called after every syncColorUI() — highlights swatches that exactly match
    // the current foreground color (RGB comparison, no tolerance).
    function highlightMatchingSwatches() {
      if (!EditorState.pixels) return;
      const [fr, fg, fb] = EditorState.foregroundColor;
      document.querySelectorAll('#swatchesGrid .swatch').forEach((sw, idx) => {
        if (idx >= currentPalette.length) return;
        const [r, g, b] = currentPalette[idx];
        if (r === fr && g === fg && b === fb) {
          sw.style.boxShadow = '0 0 0 2px #fff, 0 0 8px 4px rgb(' + r + ',' + g + ',' + b + ')';
          sw.style.zIndex = '3';
        } else {
          sw.style.boxShadow = '';
          sw.style.zIndex = '';
        }
      });
    }

    // ── getEditorImageB64: export current pixels as base64 PNG ───────────────
    function getEditorImageB64() {
      if (!EditorState.pixels || !EditorState.width || !EditorState.height) return null;
      const off = document.createElement('canvas');
      off.width = EditorState.width;
      off.height = EditorState.height;
      const octx = off.getContext('2d');
      octx.putImageData(
        new ImageData(EditorState.pixels.slice(), EditorState.width, EditorState.height),
        0, 0
      );
      return off.toDataURL('image/png').replace(/^data:image\/png;base64,/, '');
    }

    // ── EditorState — Single Source of Truth ─────────────────────────────────
    // Source: CLAUDE.md "EditorState" section / RESEARCH.md Pattern 4
    const EditorState = {
      width: 0, height: 0,
      pixels: null,               // Uint8ClampedArray, RGBA, length = w*h*4
      gridW: 0, gridH: 0,         // pixel art grid cell size (from Ver 1.1)
      zoom: 4, panX: 0, panY: 0,
      activeTool: 'pencil',       // 'pencil'|'eraser'|'bucket'|'wand'|'marquee'|'move'
      foregroundColor: [0, 0, 0, 255],
      toolOptions: {
        brushSize: 1, brushShape: 'round',
        pixelPerfect: false,
        eraserPixelPerfect: false,
        bucketTolerance: 15, wandTolerance: 15,
        contiguous: true,
        wandContiguous: true,
      },
      selection: null,            // null | {x, y, w, h} in canvas pixels
      selectionMask: null,        // Uint8Array, length = width*height; 1=selected, 0=not
      selectionPixels: null,      // Uint8ClampedArray for move/transform
      transformState: null,
      history: [],                // Uint8ClampedArray snapshots
      historyIndex: -1,
      MAX_HISTORY: 100,
      palette: [],                // [[r,g,b], ...] — same format as web_ui.html

      // Minimal pub/sub (no library needed)
      _listeners: {},
      on(event, fn) {
        if (!this._listeners[event]) this._listeners[event] = [];
        this._listeners[event].push(fn);
      },
      emit(event, data) {
        (this._listeners[event] || []).forEach(fn => fn(data));
      },
    };

    // ── Palette Panel State ───────────────────────────────────────────────────
    let currentPalette     = [];   // [[r,g,b], ...]
    let editingSwatchIdx   = null;
    let selectedPaletteKey = '';
    let currentPaletteMeta = { name: '', source: 'upload', algorithm: '', count: 0 };

    // ── Tool activation ───────────────────────────────────────────────────────
    function setActiveTool(name) {
      // Eyedropper: canvas picks use getPixel(EditorState.pixels); off-canvas
      // auto-triggers EyeDropper API after cursor leaves canvas for 300 ms.
      if (name === 'eyedropper' && EditorState.activeTool !== 'eyedropper') {
        EditorState._prevTool = EditorState.activeTool;
        document.body.classList.add('eyedropper-active');
      } else if (name !== 'eyedropper' && EditorState.activeTool === 'eyedropper') {
        document.body.classList.remove('eyedropper-active');
        // Abort any open EyeDropper API session
        if (_eyedropperAborter) { _eyedropperAborter.abort(); _eyedropperAborter = null; }
      }

      EditorState.activeTool = name;
      document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
        btn.classList.toggle('tool-btn-active', btn.dataset.tool === name);
      });
      // Show/hide tool settings panels
      const panelIds = ['tool-settings-pencil', 'tool-settings-eraser', 'tool-settings-bucket',
                        'tool-settings-marquee', 'tool-settings-wand'];
      panelIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const activePanel = document.getElementById('tool-settings-' + name);
      if (activePanel) activePanel.style.display = 'flex';
      // Cursor style follows active tool (eyedropper-active body class handles global cursor)
      if (cursorCanvas) {
        if (name === 'marquee' || name === 'wand' || name === 'eyedropper') {
          cursorCanvas.style.cursor = 'crosshair';
        } else if (name === 'pencil' || name === 'eraser' || name === 'bucket') {
          cursorCanvas.style.cursor = 'none';  // custom cursor drawn on canvas
        } else {
          cursorCanvas.style.cursor = 'default';
        }
      }
    }

    // ── Canvas context refs (set by initCanvases, used by all tools) ─────────
    let pixelCanvas = null;
    let selCanvas = null;
    let cursorCanvas = null;
    let pixelCtx = null;
    let selCtx = null;
    let cursorCtx = null;

    // ── Eyedropper: AbortController for open EyeDropper API session ──────────
    let _eyedropperAborter = null;

    // ── Selection state ───────────────────────────────────────────────────────
    let antsRafId = null;
    let antsDashOffset = 0;
    let _antsPath = null;  // Path2D cache; rebuilt on mask change, only offset animates

    function snapToGrid(v, gridSize) {
      if (gridSize <= 1) return v;
      return Math.round(v / gridSize) * gridSize;
    }

    function updateSelectionUI() {
      const hasSelection = !!EditorState.selectionMask;
      const btnDeselect = document.getElementById('btn-deselect');
      const btnInverse  = document.getElementById('btn-inverse');
      if (btnDeselect) btnDeselect.style.display = hasSelection ? '' : 'none';
      if (btnInverse)  btnInverse.style.display  = hasSelection ? '' : 'none';
    }

    function clearSelection() {
      EditorState.selectionMask = null;
      EditorState.selection = null;
      if (antsRafId) { cancelAnimationFrame(antsRafId); antsRafId = null; }
      _antsPath = null;
      if (selCtx) selCtx.clearRect(0, 0, selCanvas.width, selCanvas.height);
      updateSelectionUI();
    }

    function computeBoundingBox(mask, W, H) {
      let minX = W, minY = H, maxX = -1, maxY = -1;
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          if (mask[x + y * W]) {
            if (x < minX) minX = x; if (y < minY) minY = y;
            if (x > maxX) maxX = x; if (y > maxY) maxY = y;
          }
        }
      }
      if (maxX === -1) return null;
      return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
    }

    function setSelection(mask, bbox) {
      EditorState.selectionMask = mask;
      EditorState.selection = bbox;
      _antsPath = null;  // force Path2D rebuild
      rebuildAntsPath(mask, EditorState.width, EditorState.height);
      updateSelectionUI();
      scheduleAnts();
    }

    function isSelectedPixel(x, y) {
      if (!EditorState.selectionMask) return true;  // no selection → all pixels writable
      const bb = EditorState.selection;
      if (!bb || x < bb.x || x >= bb.x + bb.w || y < bb.y || y >= bb.y + bb.h) return false;
      return EditorState.selectionMask[x + y * EditorState.width] === 1;
    }

    function unionMasks(existingMask, newMask, totalPixels) {
      if (!existingMask) return newMask;
      const result = new Uint8Array(totalPixels);
      for (let i = 0; i < totalPixels; i++)
        result[i] = existingMask[i] | newMask[i];
      return result;
    }

    function invertSelection() {
      const W = EditorState.width, H = EditorState.height;
      const total = W * H;
      if (!EditorState.selectionMask) {
        // No selection → invert = select all pixels
        const allMask = new Uint8Array(total).fill(1);
        setSelection(allMask, { x: 0, y: 0, w: W, h: H });
      } else {
        const newMask = new Uint8Array(total);
        for (let i = 0; i < total; i++) newMask[i] = EditorState.selectionMask[i] ? 0 : 1;
        const bbox = computeBoundingBox(newMask, W, H);
        if (bbox) {
          setSelection(newMask, bbox);
        } else {
          clearSelection();  // inverting a full-canvas selection → empty
        }
      }
    }

    function deleteSelection() {
      if (!EditorState.selectionMask) return;
      pushHistory();  // bucket model: push before writes
      const W = EditorState.width;
      for (let i = 0; i < EditorState.selectionMask.length; i++) {
        if (EditorState.selectionMask[i]) {
          const x = i % W, y = (i / W) | 0;
          setPixel(x, y, [0, 0, 0, 0]);  // transparent — global constraint allows alpha=0
        }
      }
      flushPixels();
    }

    function fillSelection() {
      if (!EditorState.selectionMask) return;
      pushHistory();  // bucket model: push before writes
      const W = EditorState.width;
      const color = [...EditorState.foregroundColor];
      color[3] = 255;  // enforce fully opaque (global tool output constraint)
      for (let i = 0; i < EditorState.selectionMask.length; i++) {
        if (EditorState.selectionMask[i]) {
          const x = i % W, y = (i / W) | 0;
          setPixel(x, y, color);
        }
      }
      flushPixels();
    }

    function rebuildAntsPath(mask, W, H) {
      _antsPath = new Path2D();
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          if (!mask[x + y * W]) continue;
          if (y === 0   || !mask[x + (y-1) * W]) { _antsPath.moveTo(x, y);   _antsPath.lineTo(x+1, y);   }
          if (y === H-1 || !mask[x + (y+1) * W]) { _antsPath.moveTo(x, y+1); _antsPath.lineTo(x+1, y+1); }
          if (x === 0   || !mask[(x-1) + y * W]) { _antsPath.moveTo(x, y);   _antsPath.lineTo(x, y+1);   }
          if (x === W-1 || !mask[(x+1) + y * W]) { _antsPath.moveTo(x+1, y); _antsPath.lineTo(x+1, y+1); }
        }
      }
    }

    function drawAnts() {
      if (!EditorState.selectionMask || !_antsPath) { antsRafId = null; return; }
      const dpr = window.devicePixelRatio || 1;
      selCtx.clearRect(0, 0, selCanvas.width, selCanvas.height);
      selCtx.save();
      selCtx.scale(dpr, dpr);
      selCtx.lineWidth = 1;
      selCtx.setLineDash([4, 4]);
      selCtx.strokeStyle = '#ffffff';
      selCtx.lineDashOffset = antsDashOffset;
      selCtx.stroke(_antsPath);
      selCtx.strokeStyle = '#000000';
      selCtx.lineDashOffset = antsDashOffset + 4;
      selCtx.stroke(_antsPath);
      selCtx.restore();
      antsDashOffset = (antsDashOffset - 1 + 8) % 8;
      antsRafId = requestAnimationFrame(drawAnts);
    }

    function scheduleAnts() {
      if (antsRafId) { cancelAnimationFrame(antsRafId); antsRafId = null; }
      antsDashOffset = 0;
      antsRafId = requestAnimationFrame(drawAnts);
    }

    // ── History (undo/redo) ───────────────────────────────────────────────────

    let btnUndo = null;
    let btnRedo = null;

    function initHistoryButtons() {
      btnUndo = document.getElementById('btn-undo');
      btnRedo = document.getElementById('btn-redo');
      btnUndo.addEventListener('click', undo);
      btnRedo.addEventListener('click', redo);
      updateHistoryButtons();
    }

    function updateHistoryButtons() {
      if (!btnUndo || !btnRedo) return;
      // canUndo: historyIndex > 0 (index 0 is earliest snapshot; must have a prior state)
      btnUndo.disabled = EditorState.historyIndex <= 0;
      // canRedo: historyIndex < history.length - 1
      btnRedo.disabled = EditorState.historyIndex >= EditorState.history.length - 1;
    }

    /**
     * Save a snapshot of EditorState.pixels to the history stack.
     * Must be called in pointerdown only — never in pointermove.
     * One user action = one history entry.
     */
    function pushHistory() {
      // Truncate any redo branch
      EditorState.history.splice(EditorState.historyIndex + 1);
      // Push current pixels snapshot
      EditorState.history.push(EditorState.pixels.slice());
      // Overflow: keep stack at MAX_HISTORY
      if (EditorState.history.length > EditorState.MAX_HISTORY) {
        EditorState.history.shift();
        // historyIndex stays at MAX_HISTORY - 1 (pointing to last entry)
      } else {
        EditorState.historyIndex++;
      }
      updateHistoryButtons();
    }

    function undo() {
      if (EditorState.historyIndex <= 0) return;
      EditorState.historyIndex--;
      EditorState.pixels = EditorState.history[EditorState.historyIndex].slice();
      flushPixels();
      updateHistoryButtons();
    }

    function redo() {
      if (EditorState.historyIndex >= EditorState.history.length - 1) return;
      EditorState.historyIndex++;
      EditorState.pixels = EditorState.history[EditorState.historyIndex].slice();
      flushPixels();
      updateHistoryButtons();
    }

    // ── Phase 3: Brush Tools ──────────────────────────────────────────────────

    function getBrushStamp(size, shape) {
      if (size === 1) return [[0, 0]];
      const offsets = [];
      if (shape === 'round') {
        const r = (size - 1) / 2;
        for (let dy = -Math.ceil(r); dy <= Math.ceil(r); dy++)
          for (let dx = -Math.ceil(r); dx <= Math.ceil(r); dx++)
            if (Math.sqrt(dx * dx + dy * dy) <= r) offsets.push([dx, dy]);
      } else {
        const half = Math.floor(size / 2);
        for (let dy = -half; dy <= half; dy++)
          for (let dx = -half; dx <= half; dx++)
            offsets.push([dx, dy]);
      }
      return offsets;
    }

    function applyStamp(cx, cy, stamp, color) {
      for (const [dx, dy] of stamp) {
        const x = cx + dx, y = cy + dy;
        if (x >= 0 && x < EditorState.width && y >= 0 && y < EditorState.height) {
          if (isSelectedPixel(x, y)) setPixel(x, y, color);
        }
      }
      flushPixels();
    }

    function bresenhamLine(x0, y0, x1, y1) {
      const pts = [];
      let dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
      let sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
      let err = dx - dy;
      while (true) {
        pts.push([x0, y0]);
        if (x0 === x1 && y0 === y1) break;
        const e2 = 2 * err;
        if (e2 > -dy) { err -= dy; x0 += sx; }
        if (e2 <  dx) { err += dx; y0 += sy; }
      }
      return pts;
    }

    function drawCursorPreview(cx, cy, color) {
      cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
      if (!EditorState.pixels) return;
      const stamp = getBrushStamp(EditorState.toolOptions.brushSize, EditorState.toolOptions.brushShape);
      const [r, g, b, a] = color;
      for (const [dx, dy] of stamp) {
        cursorCtx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (a / 255) + ')';
        cursorCtx.fillRect(cx + dx, cy + dy, 1, 1);
      }
    }

    function clearCursorPreview() {
      if (cursorCtx) cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
    }

    let _ppHistory = [];  // last two placed pixels [[x,y],[x,y]]

    function resetPixelPerfect() { _ppHistory = []; }

    function shouldSkipPixelPerfect(cx, cy) {
      if (_ppHistory.length < 2) { _ppHistory.push([cx, cy]); return false; }
      const [p2, p1] = _ppHistory;
      const sharesAxisWithP2 = (p1[0] === p2[0] || p1[1] === p2[1]);
      const sharesAxisWithCur = (p1[0] === cx || p1[1] === cy);
      const curDiffersFromP2  = (p2[0] !== cx && p2[1] !== cy);
      const skip = sharesAxisWithP2 && sharesAxisWithCur && curDiffersFromP2;
      if (!skip) { _ppHistory = [p1, [cx, cy]]; }
      return skip;
    }

    // ── Canvas Initialization ─────────────────────────────────────────────────

    /**
     * Create and initialize the 3-canvas stack inside #zoom-container.
     * pixel-canvas: NO DPR, 1:1 with image coordinates.
     * overlay canvases: DPR-scaled for crisp cursor/selection rendering.
     * CRITICAL: willReadFrequently must be set on pixel-canvas's FIRST getContext call.
     */
    function initCanvases(width, height) {
      EditorState.width  = width;
      EditorState.height = height;

      // pixel-canvas: NO DPR — width/height = image pixel dimensions exactly
      pixelCanvas.width  = width;
      pixelCanvas.height = height;
      pixelCanvas.style.width  = width  + 'px';
      pixelCanvas.style.height = height + 'px';
      // willReadFrequently MUST be set on the FIRST getContext call (cannot be set later)
      pixelCtx = pixelCanvas.getContext('2d', { willReadFrequently: true, alpha: true });

      // overlay canvases: DPR-scaled for crisp rendering on Retina displays
      const dpr = window.devicePixelRatio || 1;
      [selCanvas, cursorCanvas].forEach(canvas => {
        canvas.width  = width  * dpr;
        canvas.height = height * dpr;
        canvas.style.width  = width  + 'px';
        canvas.style.height = height + 'px';
      });
      selCtx    = selCanvas.getContext('2d');
      cursorCtx = cursorCanvas.getContext('2d');
      selCtx.scale(dpr, dpr);
      cursorCtx.scale(dpr, dpr);

      // zoom-container needs explicit size so scrolling works correctly
      const zc = document.getElementById('zoom-container');
      zc.style.width  = width  + 'px';
      zc.style.height = height + 'px';
      // Center canvas in scroll space
      centerCanvas();
    }

    /**
     * Write EditorState.pixels to pixel-canvas via putImageData.
     * Never reads back from canvas (premultiplied alpha safety).
     */
    function flushPixels() {
      pixelCtx.putImageData(
        new ImageData(EditorState.pixels, EditorState.width, EditorState.height),
        0, 0
      );
    }

    /**
     * Convert browser pointer coordinates to canvas pixel coordinates,
     * accounting for CSS zoom transform. getBoundingClientRect() already
     * reflects the CSS transform scale in modern browsers.
     * Returns [canvasX, canvasY] clamped to image bounds.
     */
    function viewportToCanvas(clientX, clientY) {
      const rect = cursorCanvas.getBoundingClientRect();
      const scaleX = EditorState.width  / rect.width;
      const scaleY = EditorState.height / rect.height;
      return [
        Math.max(0, Math.min(EditorState.width  - 1, Math.floor((clientX - rect.left) * scaleX))),
        Math.max(0, Math.min(EditorState.height - 1, Math.floor((clientY - rect.top)  * scaleY))),
      ];
    }

    /**
     * Read a pixel from EditorState.pixels (never from canvas element).
     * Returns [r, g, b, a] at the given canvas coordinates.
     */
    function getPixel(x, y) {
      const i = (y * EditorState.width + x) * 4;
      return [
        EditorState.pixels[i],
        EditorState.pixels[i + 1],
        EditorState.pixels[i + 2],
        EditorState.pixels[i + 3],
      ];
    }

    /**
     * Write a pixel to EditorState.pixels. Does NOT call flushPixels().
     * Callers must call flushPixels() after batch operations complete.
     */
    function setPixel(x, y, [r, g, b, a]) {
      const i = (y * EditorState.width + x) * 4;
      EditorState.pixels[i]     = r;
      EditorState.pixels[i + 1] = g;
      EditorState.pixels[i + 2] = b;
      EditorState.pixels[i + 3] = a;
    }

    /**
     * Flood-fill starting at (startX, startY) with fillColor.
     * tolerance: per-channel axis-aligned box (0=exact, 255=fill all).
     * contiguous: true=BFS connected region, false=all matching pixels in image.
     * BFS uses Uint8Array visited bitmap — mark BEFORE push (O(n) guarantee).
     */
    function floodFill(startX, startY, fillColor, tolerance, contiguous) {
      const target = getPixel(startX, startY);
      // No-op: filling transparent with transparent
      if (target[3] === 0 && fillColor[3] === 0) return;

      function matches(px, py) {
        const [r, g, b, a] = getPixel(px, py);
        if (target[3] === 0 && a === 0) return true;
        if (target[3] === 0 || a === 0) return false;
        return Math.abs(r - target[0]) <= tolerance &&
               Math.abs(g - target[1]) <= tolerance &&
               Math.abs(b - target[2]) <= tolerance &&
               Math.abs(a - target[3]) <= tolerance;
      }

      if (contiguous) {
        // BFS: mark visited BEFORE pushing to prevent exponential revisit
        const visited = new Uint8Array(EditorState.width * EditorState.height);
        const startIdx = startX + startY * EditorState.width;
        visited[startIdx] = 1;
        const stack = [startIdx];
        while (stack.length) {
          const idx = stack.pop();
          const px = idx % EditorState.width;
          const py = (idx / EditorState.width) | 0;
          if (isSelectedPixel(px, py)) setPixel(px, py, fillColor);
          const neighbors = [
            [px - 1, py], [px + 1, py], [px, py - 1], [px, py + 1]
          ];
          for (const [nx, ny] of neighbors) {
            if (nx < 0 || nx >= EditorState.width || ny < 0 || ny >= EditorState.height) continue;
            const ni = nx + ny * EditorState.width;
            if (!visited[ni] && matches(nx, ny)) {
              visited[ni] = 1;  // mark BEFORE push — critical for O(n) performance
              stack.push(ni);
            }
          }
        }
      } else {
        // Non-contiguous: scan every pixel for color match
        for (let y = 0; y < EditorState.height; y++)
          for (let x = 0; x < EditorState.width; x++)
            if (matches(x, y) && isSelectedPixel(x, y)) setPixel(x, y, fillColor);
      }
      flushPixels();
    }

    /**
     * BFS flood-select — returns {mask, bbox} instead of painting pixels.
     * Same visited-before-push pattern as floodFill().
     * IMPORTANT: Uses getPixel() from EditorState.pixels (never ctx.getImageData).
     */
    function wandSelect(startX, startY, tolerance, contiguous) {
      const W = EditorState.width, H = EditorState.height;
      const mask = new Uint8Array(W * H);
      const target = getPixel(startX, startY);

      function matches(px, py) {
        const [r, g, b, a] = getPixel(px, py);
        if (target[3] === 0 && a === 0) return true;
        if (target[3] === 0 || a === 0) return false;
        return Math.abs(r - target[0]) <= tolerance &&
               Math.abs(g - target[1]) <= tolerance &&
               Math.abs(b - target[2]) <= tolerance &&
               Math.abs(a - target[3]) <= tolerance;
      }

      if (contiguous) {
        const startIdx = startX + startY * W;
        mask[startIdx] = 1;
        const stack = [startIdx];
        while (stack.length) {
          const idx = stack.pop();
          const px = idx % W, py = (idx / W) | 0;
          const neighbors = [[px-1,py],[px+1,py],[px,py-1],[px,py+1]];
          for (const [nx, ny] of neighbors) {
            if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
            const ni = nx + ny * W;
            if (!mask[ni] && matches(nx, ny)) {
              mask[ni] = 1;  // mark BEFORE push — O(n) guarantee
              stack.push(ni);
            }
          }
        }
      } else {
        // Non-contiguous: mark all matching pixels across entire canvas
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            if (matches(x, y)) mask[x + y * W] = 1;
          }
        }
      }

      const bbox = computeBoundingBox(mask, W, H);
      if (!bbox) return null;  // nothing matched
      return { mask, bbox };
    }

    /**
     * PAD: virtual scroll padding (px) around canvas in scroll-content.
     * Ensures scroll headroom exists even when canvas is smaller than viewport.
     * Must match the left/top set in centerCanvas().
     */
    const PAD = 2000;

    /**
     * Clamp scroll position so canvas is never fully off-screen.
     * At least Math.min(canvas_dim * zoom, 100) px of canvas remain visible.
     */
    function clampScroll(area) {
      const zoom = EditorState.zoom;
      const W = EditorState.width  * zoom;
      const H = EditorState.height * zoom;
      const minVisible = 100; // px of canvas that must stay on screen
      const minX = PAD - area.clientWidth  + Math.min(W, minVisible);
      const maxX = PAD + W - Math.min(W, minVisible);
      const minY = PAD - area.clientHeight + Math.min(H, minVisible);
      const maxY = PAD + H - Math.min(H, minVisible);
      area.scrollLeft = Math.max(minX, Math.min(maxX, area.scrollLeft));
      area.scrollTop  = Math.max(minY, Math.min(maxY, area.scrollTop));
    }

    /**
     * Set scroll-content dimensions and center the canvas in the viewport.
     * Call after initCanvases() and after loading a new image.
     */
    function centerCanvas() {
      const area = document.getElementById('zoom-scroll-content'); // scroll viewport
      const sc   = document.getElementById('zoom-scroll-inner');   // scroll content
      const zoom = EditorState.zoom;
      const W = EditorState.width  * zoom;
      const H = EditorState.height * zoom;
      // Size the scroll content so the viewport can scroll to reach the canvas
      sc.style.width  = (2 * PAD + W) + 'px';
      sc.style.height = (2 * PAD + H) + 'px';
      // Position zoom-container at (PAD, PAD) in scroll-content
      const zc = document.getElementById('zoom-container');
      zc.style.left = PAD + 'px';
      zc.style.top  = PAD + 'px';
      // Apply zoom transform (MUST happen before clampScroll uses EditorState.zoom)
      document.getElementById('zoom-container').style.transform = `scale(${zoom})`;
      const display = Number.isInteger(zoom) ? zoom + 'x' : zoom.toFixed(1) + 'x';
      document.getElementById('zoom-display').textContent = display;
      // Center scroll: pivot = canvas center → align to viewport center
      area.scrollLeft = PAD + W / 2 - area.clientWidth  / 2;
      area.scrollTop  = PAD + H / 2 - area.clientHeight / 2;
      clampScroll(area);
    }

    /**
     * Snap zoom levels for buttons and keyboard shortcuts (powers of 2).
     * Trackpad pinch bypasses this and uses continuous float zoom.
     */
    const SNAP_LEVELS = [0.25, 0.5, 1, 2, 4, 8, 16, 32, 64];
    function snapZoomIn(current) {
      return SNAP_LEVELS.find(l => l > current + 0.01) ?? SNAP_LEVELS[SNAP_LEVELS.length - 1];
    }
    function snapZoomOut(current) {
      return [...SNAP_LEVELS].reverse().find(l => l < current - 0.01) ?? SNAP_LEVELS[0];
    }

    /**
     * Apply a new zoom level, keeping the given viewport point stationary.
     * Uses CSS transform: scale() on #zoom-container. Range: 0.25x–64x (fractional).
     */
    function applyZoom(newZoom, pivotClientX, pivotClientY) {
      const oldZoom = EditorState.zoom;
      newZoom = Math.max(0.25, Math.min(64, newZoom));
      const area = document.getElementById('zoom-scroll-content'); // scroll viewport
      const sc   = document.getElementById('zoom-scroll-inner');   // scroll content
      // Update scroll-content size for new zoom (must happen BEFORE adjusting scroll)
      const newW = EditorState.width  * newZoom;
      const newH = EditorState.height * newZoom;
      sc.style.width  = (2 * PAD + newW) + 'px';
      sc.style.height = (2 * PAD + newH) + 'px';
      // Pivot in scroll-content coordinates
      const areaRect = area.getBoundingClientRect();
      const pxInArea = pivotClientX - areaRect.left;
      const pyInArea = pivotClientY - areaRect.top;
      const px = area.scrollLeft + pxInArea;  // position in scroll-content
      const py = area.scrollTop  + pyInArea;
      // Keep canvas pixel under pivot stationary:
      // canvas_x = (px - PAD) / oldZoom  →  new_scroll = canvas_x * newZoom + PAD - pxInArea
      area.scrollLeft = (px - PAD) * (newZoom / oldZoom) + PAD - pxInArea;
      area.scrollTop  = (py - PAD) * (newZoom / oldZoom) + PAD - pyInArea;
      EditorState.zoom = newZoom;
      document.getElementById('zoom-container').style.transform = `scale(${newZoom})`;
      clampScroll(area);
      const display = Number.isInteger(newZoom) ? newZoom + 'x' : newZoom.toFixed(1) + 'x';
      document.getElementById('zoom-display').textContent = display;
    }

    /**
     * Fetch /output.png, decode to ImageData, store in EditorState.pixels,
     * call initCanvases(), then flushPixels().
     * This is the only place getImageData is called — all subsequent reads
     * go through EditorState.pixels (avoids premultiplied alpha corruption).
     */
    async function loadPlaceholderImage() {
      try {
        const resp   = await fetch('/output.png');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const blob   = await resp.blob();
        const bitmap = await createImageBitmap(blob);
        const { width, height } = bitmap;
        // initCanvases must run first so pixelCtx exists before drawImage
        initCanvases(width, height);
        pixelCtx.drawImage(bitmap, 0, 0);
        // One-time getImageData — afterwards all reads go through EditorState.pixels
        const imageData = pixelCtx.getImageData(0, 0, width, height);
        EditorState.pixels = imageData.data.slice(); // Uint8ClampedArray copy
        clearSelection(); // Per CONTEXT.md: loading new image clears selection
        flushPixels(); // re-render from EditorState.pixels (establishes canonical path)
        bitmap.close();
      } catch (err) {
        console.warn('loadPlaceholderImage failed:', err);
      }
    }

    // ── Palette Panel: showStatus helper (editor version) ────────────────────
    // editor.html has no statusText element; use console.info as fallback
    function palShowStatus(msg, type) {
      console.info('[palette]', type || 'info', msg);
    }

    // ── Palette Panel: core functions (ported from web_ui.html) ───────────────

    function setCurrentPalette(palette) {
      currentPalette = palette.map(c => [
        Math.max(0, Math.min(255, Math.round(c[0]))),
        Math.max(0, Math.min(255, Math.round(c[1]))),
        Math.max(0, Math.min(255, Math.round(c[2]))),
      ]);
      // Sync to EditorState so tools can access palette
      EditorState.palette = currentPalette.slice();
      renderSwatches();
      const applyBtn = document.getElementById('applyPaletteBtn');
      const palEnabled = document.getElementById('paletteEnabled');
      if (applyBtn && palEnabled) {
        applyBtn.disabled = !palEnabled.checked || !EditorState.pixels || currentPalette.length === 0;
      }
    }

    function renderSwatches() {
      const grid = document.getElementById('swatchesGrid');
      const countEl = document.getElementById('swatchCount');
      if (!grid) return;
      if (countEl) countEl.textContent = currentPalette.length + ' 色';
      if (currentPalette.length === 0) {
        grid.innerHTML = '<span class="swatches-empty">色卡为空</span>';
        if (typeof highlightMatchingSwatches === 'function') highlightMatchingSwatches();
        return;
      }
      grid.innerHTML = '';
      currentPalette.forEach((color, idx) => {
        const [r, g, b] = color;
        const hex = rgbToHex(r, g, b);
        const sw = document.createElement('div');
        sw.className = 'swatch';
        sw.style.background = '#' + hex;
        sw.title = '#' + hex;
        const del = document.createElement('button');
        del.className = 'del-btn'; del.textContent = '×';
        del.onclick = e => { e.stopPropagation(); deleteSwatch(idx); };
        sw.appendChild(del);
        // PAL-01: single click → sync color to foreground palette
        sw.addEventListener('click', () => {
          const [r, g, b] = currentPalette[idx];
          EditorState.foregroundColor = [r, g, b, 255];
          syncColorUI();  // triggers PAL-02 highlight (Plan 02 adds tail hook)
        });
        // Double-click → open color editor popup
        sw.addEventListener('dblclick', e => { e.stopPropagation(); openColorEditor(idx, sw); });
        grid.appendChild(sw);
      });
      if (typeof highlightMatchingSwatches === 'function') highlightMatchingSwatches();
    }

    function deleteSwatch(idx) {
      currentPalette.splice(idx, 1);
      EditorState.palette = currentPalette.slice();
      closeColorEditor();
      renderSwatches();
    }

    // ── Color editor popup ────────────────────────────────────────────────────
    let _popupSyncLock = false;

    function openColorEditor(idx, anchorEl) {
      editingSwatchIdx = idx;
      const [r, g, b] = currentPalette[idx];
      const hex = rgbToHex(r, g, b);
      const popupColorPicker = document.getElementById('popupColorPicker');
      const popupR = document.getElementById('popupR');
      const popupG = document.getElementById('popupG');
      const popupB = document.getElementById('popupB');
      const popupHex = document.getElementById('popupHex');
      if (popupColorPicker) popupColorPicker.value = '#' + hex;
      if (popupR) popupR.value = r;
      if (popupG) popupG.value = g;
      if (popupB) popupB.value = b;
      if (popupHex) popupHex.value = hex;
      const popup = document.getElementById('colorPopup');
      if (!popup) return;
      const rect = anchorEl.getBoundingClientRect();
      let top = rect.bottom + 6, left = rect.left;
      if (left + 210 > window.innerWidth) left = window.innerWidth - 215;
      if (top + 220 > window.innerHeight) top = rect.top - 226;
      popup.style.top = top + 'px'; popup.style.left = left + 'px';
      popup.style.display = 'flex';
    }

    function closeColorEditor() {
      const popup = document.getElementById('colorPopup');
      if (popup) popup.style.display = 'none';
      editingSwatchIdx = null;
    }

    function _popupSyncFromRgb() {
      if (_popupSyncLock) return; _popupSyncLock = true;
      const r = Math.max(0, Math.min(255, parseInt(document.getElementById('popupR').value) || 0));
      const g = Math.max(0, Math.min(255, parseInt(document.getElementById('popupG').value) || 0));
      const b = Math.max(0, Math.min(255, parseInt(document.getElementById('popupB').value) || 0));
      const hex = rgbToHex(r, g, b);
      const pp = document.getElementById('popupColorPicker');
      const ph = document.getElementById('popupHex');
      if (pp) pp.value = '#' + hex;
      if (ph) ph.value = hex;
      if (editingSwatchIdx !== null) { currentPalette[editingSwatchIdx] = [r, g, b]; EditorState.palette = currentPalette.slice(); renderSwatches(); }
      _popupSyncLock = false;
    }

    function _popupSyncFromHex() {
      if (_popupSyncLock) return;
      const ph = document.getElementById('popupHex');
      if (!ph) return;
      const hex = ph.value.replace('#', '');
      if (!/^[0-9a-fA-F]{6}$/.test(hex)) return;
      _popupSyncLock = true;
      const [r, g, b] = hexToRgb(hex);
      const pp = document.getElementById('popupColorPicker');
      const pR = document.getElementById('popupR');
      const pG = document.getElementById('popupG');
      const pB = document.getElementById('popupB');
      if (pR) pR.value = r; if (pG) pG.value = g; if (pB) pB.value = b;
      if (pp) pp.value = '#' + hex.toUpperCase();
      if (editingSwatchIdx !== null) { currentPalette[editingSwatchIdx] = [r, g, b]; EditorState.palette = currentPalette.slice(); renderSwatches(); }
      _popupSyncLock = false;
    }

    function _popupSyncFromPicker() {
      if (_popupSyncLock) return;
      const pp = document.getElementById('popupColorPicker');
      if (!pp) return;
      const hex = pp.value.replace('#', '');
      _popupSyncLock = true;
      const [r, g, b] = hexToRgb(hex);
      const pR = document.getElementById('popupR');
      const pG = document.getElementById('popupG');
      const pB = document.getElementById('popupB');
      const ph = document.getElementById('popupHex');
      if (pR) pR.value = r; if (pG) pG.value = g; if (pB) pB.value = b;
      if (ph) ph.value = hex.toUpperCase();
      if (editingSwatchIdx !== null) { currentPalette[editingSwatchIdx] = [r, g, b]; EditorState.palette = currentPalette.slice(); renderSwatches(); }
      _popupSyncLock = false;
    }

    // ── Save / load palettes (localStorage) ──────────────────────────────────
    const PAL_LS_KEY = 'pp_saved_palettes';
    function getSavedPalettes() { try { return JSON.parse(localStorage.getItem(PAL_LS_KEY) || '{}'); } catch { return {}; } }
    function setSavedPalettes(obj) { localStorage.setItem(PAL_LS_KEY, JSON.stringify(obj)); }

    function refreshSavedDropdown() {
      const saved = getSavedPalettes();
      const keys  = Object.keys(saved);
      const opts  = document.getElementById('savedPaletteOptions');
      if (!opts) return;
      opts.innerHTML = '';

      if (keys.length === 0) {
        opts.innerHTML = '<div class="custom-option-empty">暂无已保存的色卡</div>';
        return;
      }

      keys.forEach(name => {
        const palette = saved[name];
        const div = document.createElement('div');
        div.className = 'custom-option' + (name === selectedPaletteKey ? ' selected' : '');
        div.dataset.key = name;

        const nameEl = document.createElement('div');
        nameEl.className = 'option-name';
        nameEl.textContent = `${name}  (${palette.length} 色)`;

        const swatchesEl = document.createElement('div');
        swatchesEl.className = 'option-swatches';
        palette.slice(0, 20).forEach(([r, g, b]) => {
          const s = document.createElement('span');
          s.style.background = `rgb(${r},${g},${b})`;
          swatchesEl.appendChild(s);
        });

        div.appendChild(nameEl);
        div.appendChild(swatchesEl);
        div.addEventListener('click', () => {
          selectedPaletteKey = name;
          const trigText = document.getElementById('savedPaletteTriggerText');
          if (trigText) trigText.textContent = `${name}  (${palette.length} 色)`;
          const dd = document.getElementById('savedPalettesDropdown');
          if (dd) dd.classList.remove('open');
          document.querySelectorAll('.custom-option').forEach(o =>
            o.classList.toggle('selected', o.dataset.key === name)
          );
        });
        opts.appendChild(div);
      });
    }

    // ── Palette file upload ────────────────────────────────────────────────────
    async function uploadPaletteFile(file) {
      palShowStatus('解析色卡文件...');
      const fd = new FormData();
      fd.append('file', file);
      try {
        const res = await fetch('/api/parse-palette', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) { palShowStatus('解析失败：' + (data.error || ''), 'error'); return; }
        currentPaletteMeta = { name: data.name, source: 'upload', algorithm: '', count: data.palette.length };
        setCurrentPalette(data.palette);
        const palFilenameEl = document.getElementById('palFilename');
        if (palFilenameEl) palFilenameEl.textContent = file.name;
        const paletteNameEl = document.getElementById('paletteName');
        if (data.name && paletteNameEl) paletteNameEl.value = data.name;
        palShowStatus(`已加载色卡「${data.name}」：${data.palette.length} 色`, 'success');
      } catch (err) {
        palShowStatus('上传失败：' + err.message, 'error');
      }
    }

    // ── Palette export ─────────────────────────────────────────────────────────
    async function exportPalette(fmt) {
      if (currentPalette.length === 0) { palShowStatus('色卡为空，无法导出', 'warning'); return; }
      const fd = new FormData();
      fd.append('palette', JSON.stringify(currentPalette));
      fd.append('format', fmt);
      const nameEl = document.getElementById('paletteName');
      fd.append('name', (nameEl ? nameEl.value.trim() : '') || 'Custom Palette');
      try {
        const res = await fetch('/api/export-palette', { method: 'POST', body: fd });
        if (!res.ok) { palShowStatus('导出失败', 'error'); return; }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const nm = nameEl ? nameEl.value.trim() : 'palette';
        a.href = url; a.download = (nm || 'palette') + '.' + fmt;
        a.click(); URL.revokeObjectURL(url);
        palShowStatus(`已导出 .${fmt} 文件`, 'success');
      } catch (err) { palShowStatus('导出失败：' + err.message, 'error'); }
    }

    // ── PAL-04: 最近色卡色匹配（RGB 欧氏距离平方，不开根号）──────────────────
    function nearestPaletteColor(r, g, b, palette) {
      let bestIdx = 0, bestDist = Infinity;
      for (let i = 0; i < palette.length; i++) {
        const dr = r - palette[i][0], dg = g - palette[i][1], db = b - palette[i][2];
        const dist = dr*dr + dg*dg + db*db;
        if (dist < bestDist) { bestDist = dist; bestIdx = i; }
      }
      return palette[bestIdx];  // [r, g, b]
    }

    // ── PAL-04: 破坏性应用色卡 — 直接写入 EditorState.pixels + pushHistory ──
    function applyPalette() {
      if (!EditorState.pixels || currentPalette.length === 0) return;
      const px = EditorState.pixels;
      const pal = currentPalette;
      for (let i = 0; i < px.length; i += 4) {
        const a = px[i + 3];
        if (a <= 127) {
          // 透明一侧 → 纯透明
          px[i] = 0; px[i+1] = 0; px[i+2] = 0; px[i+3] = 0;
        } else {
          // 不透明一侧 → 最近色卡色，alpha 强制 255
          const [nr, ng, nb] = nearestPaletteColor(px[i], px[i+1], px[i+2], pal);
          px[i] = nr; px[i+1] = ng; px[i+2] = nb; px[i+3] = 255;
        }
      }
      flushPixels();
      pushHistory();  // save-after: 应用后压入，保证与铅笔各占独立 undo 步骤
      palShowStatus('色卡已应用', 'success');
    }

    // ── DOM ready ─────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      // Acquire canvas element references before any operations
      pixelCanvas  = document.getElementById('pixel-canvas');
      selCanvas    = document.getElementById('selection-canvas');
      cursorCanvas = document.getElementById('cursor-canvas');

      // Load image; wire pixel-inspector and pointer events after image is ready
      loadPlaceholderImage().then(() => {
        // Save initial state as history[0] so undo can return to it
        pushHistory();
        // ── Pixel Inspector (reads EditorState.pixels — never canvas) ─────────
        cursorCanvas.addEventListener('pointermove', e => {
          if (!EditorState.pixels) return;
          const [cx, cy] = viewportToCanvas(e.clientX, e.clientY);
          const [r, g, b, a] = getPixel(cx, cy);
          document.getElementById('insp-x').textContent = cx;
          document.getElementById('insp-y').textContent = cy;
          document.getElementById('insp-r').textContent = r;
          document.getElementById('insp-g').textContent = g;
          document.getElementById('insp-b').textContent = b;
          document.getElementById('insp-a').textContent = a;
          document.getElementById('insp-swatch').style.background =
            `rgba(${r},${g},${b},${a / 255})`;
        });

        // Reset inspector when cursor leaves canvas
        cursorCanvas.addEventListener('pointerleave', () => {
          ['insp-x', 'insp-y', 'insp-r', 'insp-g', 'insp-b', 'insp-a'].forEach(id => {
            document.getElementById(id).textContent = '—';
          });
          document.getElementById('insp-swatch').style.background = 'transparent';
        });
      });

      // Initialize history button references and event listeners
      initHistoryButtons();

      // ── Tool dispatch — replaces Phase 2 TEMP SCAFFOLD ───────────────────────
      const tools = {
        pencil:     { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },
        eraser:     { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },
        bucket:     { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },
        eyedropper: { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },  // replaced below
        marquee:    { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },  // replaced below
        wand:       { onDown(x,y,e){}, onMove(x,y,e){}, onUp(x,y,e){}, onCursor(x,y){} },  // Phase 05-02
      };
      let isDrawing = false;

      cursorCanvas.addEventListener('pointerdown', e => {
        e.preventDefault();
        cursorCanvas.setPointerCapture(e.pointerId);
        if (!EditorState.pixels) return;
        isDrawing = true;
        const [cx, cy] = viewportToCanvas(e.clientX, e.clientY);
        tools[EditorState.activeTool]?.onDown(cx, cy, e);
      });
      cursorCanvas.addEventListener('pointermove', e => {
        if (!EditorState.pixels) return;
        const [cx, cy] = viewportToCanvas(e.clientX, e.clientY);
        tools[EditorState.activeTool]?.onCursor(cx, cy);
        if (isDrawing) tools[EditorState.activeTool]?.onMove(cx, cy, e);
      });
      cursorCanvas.addEventListener('pointerup', e => {
        if (!isDrawing) return;
        isDrawing = false;
        const [cx, cy] = viewportToCanvas(e.clientX, e.clientY);
        tools[EditorState.activeTool]?.onUp(cx, cy, e);
      });
      cursorCanvas.addEventListener('pointercancel', () => { isDrawing = false; });

      document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
        btn.addEventListener('click', () => setActiveTool(btn.dataset.tool));
      });
      setActiveTool('pencil');

      // ── Color Picker Panel init ───────────────────────────────────────────────

      pickerCanvas = document.getElementById('picker-canvas');
      pickerCtx = pickerCanvas.getContext('2d');
      // 基于当前默认前景色初始化 HSL 与指针位置
      [currentHue, currentSat, currentLit] = rgbToHsl(...EditorState.foregroundColor.slice(0, 3));
      _slCursorX = currentSat / 100;
      _slCursorY = 1 - currentLit / 100;
      redrawPicker();

      // handlePickerDrag: update color from drag position on ring or square
      function handlePickerDrag(px, py) {
        if (_pickerDragZone === 'ring') {
          const dx = px - PICKER_CX, dy = py - PICKER_CY;
          // Hue: atan2, offset +90 so top = 0°, normalized to 0–360
          currentHue = ((Math.atan2(dy, dx) * 180 / Math.PI) + 90 + 360) % 360;
          EditorState.foregroundColor = [...hslToRgb(currentHue, currentSat, currentLit), 255];
          syncColorUI();
        } else if (_pickerDragZone === 'square') {
          _slCursorX = Math.max(0, Math.min(1, (px - SQ_X) / SQ_W));
          _slCursorY = Math.max(0, Math.min(1, (py - SQ_Y) / SQ_H));
          currentSat = _slCursorX * 100;
          currentLit = (1 - _slCursorY) * 100;
          EditorState.foregroundColor = [...hslToRgb(currentHue, currentSat, currentLit), 255];
          _syncFromDrag = true;
          syncColorUI();
          _syncFromDrag = false;
        }
      }

      // Picker canvas pointer events (hue ring vs SL square)
      pickerCanvas.addEventListener('pointerdown', e => {
        e.preventDefault();
        pickerCanvas.setPointerCapture(e.pointerId);
        const rect = pickerCanvas.getBoundingClientRect();
        const px = e.clientX - rect.left, py = e.clientY - rect.top;
        const dx = px - PICKER_CX, dy = py - PICKER_CY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist >= RING_INNER && dist <= RING_OUTER) {
          _pickerDragZone = 'ring';
        } else if (px >= SQ_X && px <= SQ_X + SQ_W && py >= SQ_Y && py <= SQ_Y + SQ_H) {
          _pickerDragZone = 'square';
        } else {
          _pickerDragZone = null;
        }
        handlePickerDrag(px, py);
      });
      pickerCanvas.addEventListener('pointermove', e => {
        if (!_pickerDragZone) return;
        const rect = pickerCanvas.getBoundingClientRect();
        handlePickerDrag(e.clientX - rect.left, e.clientY - rect.top);
      });
      pickerCanvas.addEventListener('pointerup', () => { _pickerDragZone = null; });
      pickerCanvas.addEventListener('pointercancel', () => { _pickerDragZone = null; });

      // ── Multi-panel color picker bindings ─────────────────────────────────────

      // Parse hex (6-char with or without '#') → apply foreground color
      function applyHexStr(rawHex) {
        const v = rawHex.trim().replace(/^#/, '');
        if (!/^[0-9a-fA-F]{6}$/.test(v)) { syncColorUI(); return; }
        EditorState.foregroundColor = [
          parseInt(v.slice(0, 2), 16), parseInt(v.slice(2, 4), 16), parseInt(v.slice(4, 6), 16), 255,
        ];
        syncColorUI();
      }

      function bindHexInput(id) {
        const el = document.getElementById(id);
        if (!el) return;
